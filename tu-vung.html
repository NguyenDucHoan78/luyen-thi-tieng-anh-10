[data-theme="dark"] {

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; }
a { color: var(--primary); text-decoration: none; }
.header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; padding: 24px 20px; text-align: center; }
.header h1 { font-size: 22px; margin-bottom: 4px; }
.header p { font-size: 14px; opacity: 0.9; }
.nav { background: var(--card); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; gap: 0; flex-wrap: wrap; }
.nav a { padding: 12px 16px; font-size: 14px; color: var(--text); transition: .3s; border-bottom: 3px solid transparent; white-space: nowrap; }
.nav a:hover, .nav a.active { border-bottom-color: var(--primary); color: var(--primary); background: rgba(102,126,234,0.05); }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; transition: transform .3s, box-shadow .3s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
.btn { display: inline-block; padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: .3s; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--error); color: #fff; }
.btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; }
.progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin: 8px 0; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .5s; background: linear-gradient(90deg, var(--primary), var(--accent)); }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-success { background: #c6f6d5; color: #276749; }

.footer { text-align: center; padding: 20px; color: var(--text-light); font-size: 13px; margin-top: 40px; border-top: 1px solid #e2e8f0; }
.breadcrumb { padding: 12px 0; font-size: 14px; color: var(--text-light); }
.breadcrumb a { color: var(--primary); }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: #fff; z-index: 9999; animation: slideIn .3s; font-size: 14px; }
.toast-success { background: var(--success); }
.toast-error { background: var(--error); }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.dark-toggle { position: fixed; bottom: 20px; left: 20px; width: 44px; height: 44px; border-radius: 50%; background: var(--card); box-shadow: var(--shadow); border: none; cursor: pointer; font-size: 20px; z-index: 999; display: flex; align-items: center; justify-content: center; }
.quiz-option { display: block; padding: 12px 16px; margin: 6px 0; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: .2s; font-size: 16px; }
.quiz-option:hover { border-color: var(--primary); background: rgba(102,126,234,0.05); }
.quiz-option.selected { border-color: var(--primary); background: rgba(102,126,234,0.1); }
.quiz-option.correct { border-color: var(--success); background: #f0fff4; }
.quiz-option.wrong { border-color: var(--error); background: #fff5f5; }

.q-nav-btn { width: 32px; height: 32px; border: 2px solid #e2e8f0; border-radius: 6px; background: var(--card); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: .2s; }

@keyframes blink { 50% { opacity: 0.5; } }
.tab-bar { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
.tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-size: 14px; font-weight: 600; color: var(--text-light); border-bottom: 3px solid transparent; transition: .2s; }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.flashcard { perspective: 1000px; margin: 20px auto; max-width: 400px; }
.flashcard-inner { position: relative; width: 100%; min-height: 250px; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back { position: absolute; width: 100%; min-height: 250px; backface-visibility: hidden; border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; background: var(--card); }

.fill-input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin: 6px 0; background: var(--card); color: var(--text); font-family: inherit; }

textarea.fill-input { resize: vertical; min-height: 44px; line-height: 1.5; }

.quiz-option.correct { background: #c6f6d5 !important; border-color: var(--success) !important; color: #276749 !important; font-weight: 600; }
.quiz-option.wrong { background: #fed7d7 !important; border-color: var(--error) !important; color: #9b2c2c !important; text-decoration: line-through; }
.result-box { padding: 20px; border-radius: var(--radius); text-align: center; margin: 20px 0; }

.search-box { width: 100%; padding: 10px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 15px; background: var(--card); color: var(--text); }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }

<script>
const SM = {
  save(k,d) { try { localStorage.setItem(k, JSON.stringify(d)); } catch(e) { console.warn('Storage full'); } },
  load(k,def) { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : def; } catch(e) { return def; } },
  remove(k) { localStorage.removeItem(k); },
  saveResult(mod, id, score, total, answers) {
    const results = this.load('results_' + mod, {});
    results[id] = { score, total, answers, date: new Date().toISOString() };
    this.save('results_' + mod, results);
  },
  getResult(mod, id) { return (this.load('results_' + mod, {}))[id]; },
  getAllResults(mod) { return this.load('results_' + mod, {}); },
  getAvgScore(mod) {
    const r = this.getAllResults(mod);
    const vals = Object.values(r);
    if (!vals.length) return 0;
    return vals.reduce((s, v) => s + (v.score / v.total * 100), 0) / vals.length;
  },
  getCount(mod) { return Object.keys(this.getAllResults(mod)).length; },
  saveVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    if (!known[unit]) known[unit] = [];
    if (!known[unit].includes(wordId)) known[unit].push(wordId);
    this.save('vocab_known', known);
  },
  isVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    return known[unit] && known[unit].includes(wordId);
  },
  getVocabKnownCount(unit) {
    const known = this.load('vocab_known', {});
    return known[unit] ? known[unit].length : 0;
  },
  getTotalVocabKnown() {
    const known = this.load('vocab_known', {});
    return Object.values(known).reduce((s, arr) => s + arr.length, 0);
  },
  resetAll() { if(confirm('Xóa toàn bộ dữ liệu lưu?')) { localStorage.clear(); location.reload(); } }
};

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTheme() {
  const theme = SM.load('theme', 'light');
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  SM.save('theme', next);
}
initTheme();

class Timer {
  constructor(display, onComplete) {
    this.display = display;
    this.onComplete = onComplete;
    this.remaining = 0;
    this.interval = null;
    this.running = false;
  }
  start(minutes) {
    this.remaining = minutes * 60;
    this.running = true;
    this.tick();
    this.interval = setInterval(() => this.tick(), 1000);
  }
  tick() {
    if (this.remaining <= 0) {
      this.stop();
      if (this.onComplete) this.onComplete();
      return;
    }
    const m = Math.floor(this.remaining / 60);
    const s = this.remaining % 60;
    this.display.textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if (this.remaining <= 300) this.display.classList.add('warning');
    this.remaining--;
  }
  stop() { clearInterval(this.interval); this.running = false; }
  getElapsed(totalMinutes) {
    const elapsed = totalMinutes * 60 - this.remaining;
    return Math.floor(elapsed / 60) + ' phút ' + (elapsed % 60) + ' giây';
  }
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  for (const [key, unit] of Object.entries(DATA)) {
    const num = key.replace('unit','');
    const known = SM.getVocabKnownCount(key);
    const total = unit.words.length;
    const pct = total > 0 ? Math.round(known/total*100) : 0;
    const isActive = key === currentUnit ? 'active' : '';
    html += '<div class="unit-card ' + isActive + '" onclick="loadUnit(\'' + key + '\')">' +
      '<div><span class="unit-num">Unit ' + num + '</span> ' + unit.title + '</div>' +
      '<div style="font-size:12px;color:var(--text-light);margin-top:4px">' + known + '/' + total + ' từ (' + pct + '%)' +
      (pct === 100 ? ' ✅' : '') + '</div>' +
      '<div class="progress-bar" style="height:4px"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
  }
  sb.innerHTML = html;
}

function loadUnit(unitId) {
  currentUnit = unitId;
  renderSidebar();
  switchTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['list','flashcard','quiz'][i] === tab);
  });
  document.getElementById('searchBox').style.display = tab === 'list' ? '' : 'none';
  if (tab === 'list') renderList();
  else if (tab === 'flashcard') renderFlashcard();
  else renderQuiz();
}

function renderList(filter='') {
  const words = DATA[currentUnit].words;
  let html = '<table><thead><tr><th>STT</th><th>Từ vựng</th><th>Loại</th><th>Phiên âm</th><th>Nghĩa</th><th></th></tr></thead><tbody>';
  words.forEach(w => {
    if (filter && !w.word.toLowerCase().includes(filter) && !w.meaning.toLowerCase().includes(filter)) return;
    const known = SM.isVocabKnown(currentUnit, w.id);
    html += '<tr' + (known ? ' style="opacity:0.6"' : '') + '>' +
      '<td>' + w.id + '</td>' +
      '<td><strong>' + w.word + '</strong></td>' +
      '<td>' + w.type + '</td>' +
      '<td class="ipa">' + w.ipa + '</td>' +
      '<td>' + w.meaning + '</td>' +
      '<td>' + (known ? '<span class="word-known">✅</span>' : '<button class="btn btn-success" style="padding:4px 10px;font-size:12px" onclick="markKnown(' + w.id + ')">Thuộc</button>') + '</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tabContent').innerHTML = html;
}

function filterWords() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  renderList(q);
}

function markKnown(wordId) {
  SM.saveVocabKnown(currentUnit, wordId);
  renderList();
  renderSidebar();
  showToast('Đã đánh dấu thuộc!');
}

function renderFlashcard() {
  fcWords = shuffle(DATA[currentUnit].words);
  fcIndex = 0;
  fcFlipped = false;
  updateFlashcard();
}

function updateFlashcard() {
  if (!fcWords.length) return;
  const w = fcWords[fcIndex];
  const known = SM.getVocabKnownCount(currentUnit);
  document.getElementById('tabContent').innerHTML =
    '<div class="fc-counter">Từ ' + (fcIndex+1) + '/' + fcWords.length + ' | Đã biết: ' + known + '</div>' +
    '<div class="flashcard' + (fcFlipped ? ' flipped' : '') + '" onclick="flipCard()">' +
    '<div class="flashcard-inner">' +
    '<div class="flashcard-front"><div class="fc-word">' + w.word + '</div><div class="fc-ipa">' + w.ipa + '</div><div style="margin-top:16px;font-size:13px;color:var(--text-light)">Nhấn để lật</div></div>' +
    '<div class="flashcard-back"><div class="fc-meaning">' + w.meaning + '</div><div class="fc-type">' + w.type + '</div></div>' +
    '</div></div>' +
    '<div class="fc-controls">' +
    '<button class="btn btn-outline" onclick="prevCard()">← Trước</button>' +
    '<button class="btn btn-primary" onclick="flipCard()">🔄 Lật</button>' +
    '<button class="btn btn-outline" onclick="nextCard()">Sau →</button>' +
    '<button class="btn btn-success" onclick="fcMarkKnown()">✅ Biết</button>' +
    '<button class="btn btn-danger" onclick="nextCard()">❌ Chưa</button>' +
    '</div>';
}

function flipCard() { fcFlipped = !fcFlipped; updateFlashcard(); }
function nextCard() { fcIndex = (fcIndex + 1) % fcWords.length; fcFlipped = false; updateFlashcard(); }
function prevCard() { fcIndex = (fcIndex - 1 + fcWords.length) % fcWords.length; fcFlipped = false; updateFlashcard(); }
function fcMarkKnown() { SM.saveVocabKnown(currentUnit, fcWords[fcIndex].id); renderSidebar(); nextCard(); showToast('✅ Đã thuộc!'); }

function renderQuiz() {
  const words = DATA[currentUnit].words;
  if (words.length < 4) { document.getElementById('tabContent').innerHTML = '<p>Cần ít nhất 4 từ để tạo quiz.</p>'; return; }
  quizQuestions = shuffle(words).slice(0, Math.min(10, words.length));
  quizAnswers = {};
  let html = '<h3 style="margin-bottom:16px">Quiz Từ Vựng — ' + DATA[currentUnit].title + '</h3>';
  quizQuestions.forEach((w, qi) => {
    const others = shuffle(words.filter(o => o.id !== w.id)).slice(0, 3);
    const opts = shuffle([w, ...others]);
    html += '<div class="card" id="vq' + qi + '"><strong>Câu ' + (qi+1) + ':</strong> ' + w.meaning + ' (' + w.type + ')' +
      '<div style="margin-top:8px">';
    opts.forEach((o, oi) => {
      html += '<label class="quiz-option" id="vqo' + qi + '_' + oi + '" onclick="selectVocabAnswer(' + qi + ',' + oi + ',\'' + o.word + '\')">' +
        String.fromCharCode(65+oi) + '. ' + o.word + ' <span class="ipa">' + o.ipa + '</span></label>';
    });
    html += '</div></div>';
  });
  html += '<button class="btn btn-primary" onclick="submitVocabQuiz()" style="width:100%;padding:14px">NỘP BÀI</button>';
  document.getElementById('tabContent').innerHTML = html;
}

function selectVocabAnswer(qi, oi, word) {
  quizAnswers[qi] = word;
  for (let k = 0; k < 4; k++) {
    const el = document.getElementById('vqo' + qi + '_' + k);
    if (el) el.classList.toggle('selected', k === oi);
  }
}

function submitVocabQuiz() {
  let score = 0;
  quizQuestions.forEach((w, qi) => {
    if (quizAnswers[qi] === w.word) score++;
  });
  SM.saveResult('vocab_quiz', currentUnit + '_' + Date.now(), score, quizQuestions.length, quizAnswers);
  showToast('Kết quả: ' + score + '/' + quizQuestions.length + ' (' + Math.round(score/quizQuestions.length*100) + '%)', score >= quizQuestions.length * 0.7 ? 'success' : 'error');
  renderQuiz();
}

renderSidebar();
loadUnit('unit1');
</script>
</body>
</html>
