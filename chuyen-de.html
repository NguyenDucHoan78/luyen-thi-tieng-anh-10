<script>
const SM = {
  save(k,d) { try { localStorage.setItem(k, JSON.stringify(d)); } catch(e) { console.warn('Storage full'); } },
  load(k,def) { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : def; } catch(e) { return def; } },
  remove(k) { localStorage.removeItem(k); },
  saveResult(mod, id, score, total, answers) {
    const results = this.load('results_' + mod, {});
    results[id] = { score, total, answers, date: new Date().toISOString() };
    this.save('results_' + mod, results);
  },
  getResult(mod, id) { return (this.load('results_' + mod, {}))[id]; },
  getAllResults(mod) { return this.load('results_' + mod, {}); },
  getAvgScore(mod) {
    const r = this.getAllResults(mod);
    const vals = Object.values(r);
    if (!vals.length) return 0;
    return vals.reduce((s, v) => s + (v.score / v.total * 100), 0) / vals.length;
  },
  getCount(mod) { return Object.keys(this.getAllResults(mod)).length; },
  saveVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    if (!known[unit]) known[unit] = [];
    if (!known[unit].includes(wordId)) known[unit].push(wordId);
    this.save('vocab_known', known);
  },
  isVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    return known[unit] && known[unit].includes(wordId);
  },
  getVocabKnownCount(unit) {
    const known = this.load('vocab_known', {});
    return known[unit] ? known[unit].length : 0;
  },
  getTotalVocabKnown() {
    const known = this.load('vocab_known', {});
    return Object.values(known).reduce((s, arr) => s + arr.length, 0);
  },
  resetAll() { if(confirm('Xóa toàn bộ dữ liệu lưu?')) { localStorage.clear(); location.reload(); } }
};

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTheme() {
  const theme = SM.load('theme', 'light');
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  SM.save('theme', next);
}
initTheme();

class Timer {
  constructor(display, onComplete) {
    this.display = display;
    this.onComplete = onComplete;
    this.remaining = 0;
    this.interval = null;
    this.running = false;
  }
  start(minutes) {
    this.remaining = minutes * 60;
    this.running = true;
    this.tick();
    this.interval = setInterval(() => this.tick(), 1000);
  }
  tick() {
    if (this.remaining <= 0) {
      this.stop();
      if (this.onComplete) this.onComplete();
      return;
    }
    const m = Math.floor(this.remaining / 60);
    const s = this.remaining % 60;
    this.display.textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if (this.remaining <= 300) this.display.classList.add('warning');
    this.remaining--;
  }
  stop() { clearInterval(this.interval); this.running = false; }
  getElapsed(totalMinutes) {
    const elapsed = totalMinutes * 60 - this.remaining;
    return Math.floor(elapsed / 60) + ' phút ' + (elapsed % 60) + ' giây';
  }
}

ion": "In times of war, the Red Cross is dedicated to reducing the sufferings of wounded soldiers, civilians, and prisoners of war.", "options": {"A": "mounted", "B": "excited", "C": "devoted", "D": "interested"}, "answer": "C"}, {"id": 38, "question": "_______ is a situation in which large numbers of people have little or no food, and many of them die.", "options": {"A": "Disaster", "B": "Famine", "C": "Poverty", "D": "Flood."}, "answer": "B"}, {"id": 39, "question": "Within their home country, National Red Cross and Red Crescent societies assume the duties and responsibilities of a national relief society.", "options": {"A": "take on", "B": "get off", "C": "go about", "D": "put in"}, "answer": "A"}, {"id": 40, "question": "The bomb exploded in the garage; fortunately no one hurt.", "options": {"A": "put on", "B": "went off", "C": "got out", "D": "kept up"}, "answer": "B"}, {"id": 41, "question": "She sustained severe head _______ after being thrown from her horse.", "options": {"A": "injure", "B": "injured", "C": "injuries", "D": "injurious"}, "answer": "C"}, {"id": 42, "question": "According to World Bank figures, 41 per cent of Brazilians live in absolute _______.", "options": {"A": "poor", "B": "poorer", "C": "poorly", "D": "poverty"}, "answer": "D"}, {"id": 43, "question": "Up until the middle of the 19th century, there were no _______ and well established army nursing systems for casualties.", "options": {"A": "organize", "B": "organized", "C": "organizational", "D": "organizers"}, "answer": "B"}, {"id": 44, "question": "The AIDS _______ continues to spread around the world. Up to 4,000 people are infected with the HIV virus every single day.", "options": {"A": "treatment", "B": "epidemic", "C": "tsunami", "D": "damage"}, "answer": "B"}, {"id": 45, "question": "During World War II, the Red Cross organized relief assistance for _______ and wounded soldiers and administered the exchange of messages regarding prisoners and missing persons.", "options": {"A": "ci missions after ______, such as natural disasters, man- made disasters, and epidemics.", "options": {"A": "emergent", "B": "emergencies", "C": "emergently", "D": "emergence"}, "answer": "B"}, {"id": 55, "question": "One of the tasks of the Red Cross is also to support local _____ care projects.", "options": {"A": "health", "B": "healthy", "C": "healthful", "D": "healthily"}, "answer": "A"}, {"id": 56, "question": "The International Red Cross and Red Crescent _______ occurs once every four years.", "options": {"A": "Globe", "B": "Society", "C": "Conference", "D": "Nations"}, "answer": "C"}, {"id": 57, "question": "The mission of the Red Cross is also to supervise the _______ of prisoners of war.", "options": {"A": "education", "B": "encouragement", "C": "treatment", "D": "runaway"}, "answer": "C"}, {"id": 58, "question": "The total number of national Red Cross societies from all over the world has mounted to 186.", "options": {"A": "protected", "B": "devoted", "C": "increased", "D": "aimed"}, "answer": "C"}, {"id": 59, "question": "Henri Davison, president of the American Red Cross war Committee proposed forming a federation of these National Societies.", "options": {"A": "took", "B": "dedicated", "C": "carried", "D": "suggested"}, "answer": "D"}, {"id": 60, "question": "Fifty per cent of road accidents results in head injuries.", "options": {"A": "examines", "B": "heals", "C": "causes", "D": "treats"}, "answer": "C"}, {"id": 61, "question": "Jean Henri Dunant was appalled by the almost complete lack of care for wounded soldiers.", "options": {"A": "dedicated", "B": "shocked", "C": "interested", "D": "excited"}, "answer": "B"}, {"id": 62, "question": "The mission statement of the International Movement as formulated in the \"Strategy 2010\" document of the Federation is to improve the lives of vulnerable people by mobilizing the power of humanity.", "options": {"A": "weak and unprotected", "B": "wealthy and famous", "C": "poor and disabled", "D": "deaf and mute"}, "answer": "A"}, {"id": 63, "question": "The authority _______ down that building to build a supermarket.", "options": {"A": "knocked", "B": "came", "C": "went", "D": "fell"}, "answer": "A"}, {"id": 64, "question": "In some most Asian countries women are undervalued and they never have the same ___ as men.", "options": {"A": "formality", "B": "basis", "C": "limit", "D": "status"}, "answer": "D"}, {"id": 65, "question": "What does \"www\" ________ for? Is it short for “world wide web?”", "options": {"A": "sit", "B": "stand", "C": "lie", "D": "point"}, "answer": "B"}]}};
let currentCD = null;
let userAnswers = {};
let submitted = false;

function renderList() {
  currentCD = null;
  submitted = false;
  document.getElementById('bcTitle').textContent = '16 Chuyên đề';
  let html = '<div class="cd-grid">';
  for (let i = 1; i <= 16; i++) {
    const key = 'cd' + i;
    const cd = DATA[key];
    if (!cd) continue;
    const result = SM.getResult('cd', key);
    const qcount = cd.questions.length;
    html += '<div class="cd-card" onclick="loadCD(\'' + key + '\')">' +
      '<div style="display:flex;align-items:center;gap:12px">' +
      '<div class="cd-num">' + i + '</div>' +
      '<div><div class="cd-title">' + cd.title.split(': ').pop() + '</div>' +
      '<div class="cd-info">' + qcount + ' câu' +
      (result ? ' | Điểm: ' + result.score + '/' + result.total + ' ✅' : '') +
      '</div></div></div></div>';
  }
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function loadCD(key) {
  currentCD = key;
  userAnswers = {};
  submitted = false;
  const cd = DATA[key];
  document.getElementById('bcTitle').innerHTML = '<a href="#" onclick="renderList();return false">16 Chuyên đề</a> › ' + cd.title;
  
  const hasSections = cd.sections && cd.sections.length > 0;
  let html = '<h2 style="margin-bottom:8px">' + cd.title + '</h2>';
  html += '<p style="color:var(--text-light);margin-bottom:16px">' + cd.questions.length + ' câu trắc nghiệm</p>';
  
  // Question nav
  html += '<div class="question-nav" id="qNav">';
  cd.questions.forEach((q, i) => {
    html += '<button class="q-nav-btn" id="qnav' + i + '" onclick="scrollTo(\'q' + i + '\')">' + (i+1) + '</button>';
  });
  html += '</div>';
  
  // Questions
  let currentSection = '';
  cd.questions.forEach((q, i) => {
    // Section dividers for CD1 (Ngữ âm)
    if (hasSections && q.section && q.section !== currentSection) {
      currentSection = q.section;
      if (currentSection === 'sound') html += '<div class="section-divider">I. Different sound — Chọn từ có phần gạch chân phát âm khác</div>';
      else if (currentSection === 'stress') html += '<div class="section-divider">II. Stress — Chọn từ có trọng âm khác</div>';
    }
    
    const isErrorFinding = q.type === 'error_finding';
    // Question stem: for CD1 ngữ âm don't show q.question (it just repeats options)
    const hasQuestionText = q.question && q.question.trim() && !q.section;
    
    if (isErrorFinding) {
      // Error finding: show sentence with underlined parts labeled (A)(B)(C)(D)
      const displayHtml = q.question_html || q.question || '';
      html += '<div class="question-box" id="q' + i + '">' +
        '<strong>Câu ' + (i+1) + '.</strong> <span style="font-style:italic;color:var(--text-light);font-size:13px">Tìm lỗi sai</span>' +
        '<div style="margin:10px 0;font-size:15px;line-height:1.8">' + displayHtml + '</div>' +
        '<div style="margin-top:8px">';
      ['A','B','C','D'].forEach(letter => {
        const optText = q.options && q.options[letter] || '';
        if (optText) {
          html += '<label class="quiz-option" id="opt' + i + letter + '" onclick="selectAnswer(' + i + ',\'' + letter + '\')">' +
            letter + '. <u>' + optText + '</u></label>';
        }
      });
      html += '</div></div>';
    } else {
      html += '<div class="question-box" id="q' + i + '">' +
        '<strong>Câu ' + (i+1) + '.</strong> ' + (hasQuestionText ? q.question : '') + '<div style="margin-top:8px">';
      
      // Use options_html (with <u> tags) if available, otherwise plain
      ['A','B','C','D'].forEach(letter => {
        const useHtml = q.options_html && q.options_html[letter];
        const optText = useHtml ? q.options_html[letter] : (q.options && q.options[letter] || '');
        if (optText) {
          html += '<label class="quiz-option" id="opt' + i + letter + '" onclick="selectAnswer(' + i + ',\'' + letter + '\')">' +
            letter + '. ' + optText + '</label>';
        }
      });
      html += '</div></div>';
    }
  });
  
  html += '<div style="text-align:center;margin:24px 0">' +
    '<button class="btn btn-primary" id="submitBtn" onclick="submitCD()" style="padding:14px 48px;font-size:16px">📩 NỘP BÀI</button>' +
    '</div><div id="resultArea"></div>';
  document.getElementById('mainContent').innerHTML = html;
}

function selectAnswer(qi, letter) {
  if (submitted) return;
  userAnswers[qi] = letter;
  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById('opt' + qi + l);
    if (el) el.classList.toggle('selected', l === letter);
  });
  const nav = document.getElementById('qnav' + qi);
  if (nav) nav.classList.add('answered');
}

function submitCD() {
  if (submitted) return;
  const cd = DATA[currentCD];
  const total = cd.questions.length;
  const answered = Object.keys(userAnswers).length;
  if (answered < total && !confirm('Bạn mới trả lời ' + answered + '/' + total + ' câu. Nộp bài?')) return;
  
  submitted = true;
  let score = 0;
  let hasAnswerKey = false;
  
  cd.questions.forEach((q, i) => {
    const box = document.getElementById('q' + i);
    const userAns = userAnswers[i];
    const correct = q.answer;
    
    if (correct) {
      hasAnswerKey = true;
      if (userAns === correct) {
        score++;
        box.classList.add('correct');
      } else {
        box.classList.add('wrong');
      }
      // Always highlight correct answer green
      const correctEl = document.getElementById('opt' + i + correct);
      if (correctEl) {
        correctEl.classList.add('correct');
        correctEl.insertAdjacentHTML('beforeend', ' <span class="correct-label">✓ Đáp án đúng</span>');
      }
      // Mark wrong selection red
      if (userAns && userAns !== correct) {
        const wrongEl = document.getElementById('opt' + i + userAns);
        if (wrongEl) wrongEl.classList.add('wrong');
      }
      // Show phonetic hint if available
      if (q.hint) {
        let hintHtml = '<div class="hint-box">';
        hintHtml += '<div class="hint-explain">🔊 ' + q.hint.explanation + '</div>';
        if (q.hint.ipa) {
          hintHtml += '<div class="hint-ipa">';
          ['A','B','C','D'].forEach(l => {
            const ipa = q.hint.ipa[l] || '';
            if (ipa) {
              const isCor = (l === q.answer);
              hintHtml += '<span class="' + (isCor ? 'ipa-correct' : '') + '">' + l + '. ' + (q.options[l] || '') + ' <b>' + ipa + '</b></span>';
            }
          });
          hintHtml += '</div>';
        }
        const hintId = 'cdhint' + i;
        hintHtml += '<span class="hint-toggle" onclick="var el=document.getElementById(\'' + hintId + '\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">📖 Xem quy tắc & mẹo</span>';
        hintHtml += '<div id="' + hintId + '" style="display:none">';
        if (q.hint.rule) hintHtml += '<div class="hint-rule">' + q.hint.rule + '</div>';
        if (q.hint.trick) hintHtml += '<div class="hint-trick">' + q.hint.trick + '</div>';
        hintHtml += '</div></div>';
        box.insertAdjacentHTML('beforeend', hintHtml);
      }
    } else {
      // No answer key — just show user's selection
      if (userAns) {
        const selEl = document.getElementById('opt' + i + userAns);
        if (selEl) selEl.classList.add('selected');
      }
      // Add note
      box.insertAdjacentHTML('beforeend', '<div style="margin-top:8px;font-size:12px;color:var(--text-light)">⚠️ Chưa có đáp án — tự đối chiếu tài liệu</div>');
    }
  });
  
  if (hasAnswerKey) {
    SM.saveResult('cd', currentCD, score, total, userAnswers);
  }
  
  const pct = hasAnswerKey ? Math.round(score/total*100) : 0;
  const cls = (!hasAnswerKey || pct >= 70) ? 'good' : 'bad';
  document.getElementById('resultArea').innerHTML =
    '<div class="result-box ' + cls + '">' +
    '<div style="font-size:48px">' + (hasAnswerKey ? (pct >= 70 ? '🎉' : '💪') : '📝') + '</div>' +
    '<div style="font-size:28px;font-weight:800;margin:8px 0">' + 
    (hasAnswerKey ? score + '/' + total : 'Đã nộp bài') + '</div>' +
    (hasAnswerKey ? '<div style="font-size:16px">(' + pct + '% đúng)</div>' : '<div style="font-size:14px;color:var(--text-light)">Cuộn lên xem đáp án đúng (nếu có)</div>') +
    '<div style="margin-top:16px">' +
    '<button class="btn btn-primary" onclick="loadCD(\'' + currentCD + '\')">🔄 Làm lại</button> ' +
    '<button class="btn btn-outline" onclick="renderList()">📋 Danh sách</button></div></div>';
  
  document.getElementById('submitBtn').style.display = 'none';
  scrollTo('resultArea');
}

renderList();
</script>
</body>
</html>
