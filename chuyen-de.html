<script>
const SM = {
  save(k,d) { try { localStorage.setItem(k, JSON.stringify(d)); } catch(e) { console.warn('Storage full'); } },
  load(k,def) { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : def; } catch(e) { return def; } },
  remove(k) { localStorage.removeItem(k); },
  saveResult(mod, id, score, total, answers) {
    const results = this.load('results_' + mod, {});
    results[id] = { score, total, answers, date: new Date().toISOString() };
    this.save('results_' + mod, results);
  },
  getResult(mod, id) { return (this.load('results_' + mod, {}))[id]; },
  getAllResults(mod) { return this.load('results_' + mod, {}); },
  getAvgScore(mod) {
    const r = this.getAllResults(mod);
    const vals = Object.values(r);
    if (!vals.length) return 0;
    return vals.reduce((s, v) => s + (v.score / v.total * 100), 0) / vals.length;
  },
  getCount(mod) { return Object.keys(this.getAllResults(mod)).length; },
  saveVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    if (!known[unit]) known[unit] = [];
    if (!known[unit].includes(wordId)) known[unit].push(wordId);
    this.save('vocab_known', known);
  },
  isVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    return known[unit] && known[unit].includes(wordId);
  },
  getVocabKnownCount(unit) {
    const known = this.load('vocab_known', {});
    return known[unit] ? known[unit].length : 0;
  },
  getTotalVocabKnown() {
    const known = this.load('vocab_known', {});
    return Object.values(known).reduce((s, arr) => s + arr.length, 0);
  },
  resetAll() { if(confirm('Xóa toàn bộ dữ liệu lưu?')) { localStorage.clear(); location.reload(); } }
};

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTheme() {
  const savedTheme = SM.load('theme', null);
  const theme = savedTheme || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  syncThemeControls(theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  SM.save('theme', next);
  syncThemeControls(next);
}
function syncThemeControls(theme) {
  document.querySelectorAll('.dark-toggle').forEach(btn => {
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    btn.title = theme === 'dark' ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối';
    btn.setAttribute('aria-label', btn.title);
  });
}
initTheme();

class Timer {
  constructor(display, onComplete) {
    this.display = display;
    this.onComplete = onComplete;
    this.remaining = 0;
    this.interval = null;
    this.running = false;
  }
  start(minutes) {
    this.remaining = minutes * 60;
    this.running = true;
    this.tick();
    this.interval = setInterval(() => this.tick(), 1000);
  }
  tick() {
    if (this.remaining <= 0) {
      this.stop();
      if (this.onComplete) this.onComplete();
      return;
    }
    const m = Math.floor(this.remaining / 60);
    const s = this.remaining % 60;
    this.display.textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if (this.remaining <= 300) this.display.classList.add('warning');
    this.remaining--;
  }
  stop() { clearInterval(this.interval); this.running = false; }
  getElapsed(totalMinutes) {
    const elapsed = totalMinutes * 60 - this.remaining;
    return Math.floor(elapsed / 60) + ' phút ' + (elapsed % 60) + ' giây';
  }
}

", "ipa": {"A": "/aɪ/", "B": "/aɪ/", "C": "/ɜː/", "D": "/aɪ/"}}}, {"id": 48, "section": "sound", "question": "", "options": {"A": "compound", "B": "route", "C": "house", "D": "south"}, "options_html": {"A": "comp<u>ou</u>nd", "B": "r<u>ou</u>te", "C": "h<u>ou</u>se", "D": "s<u>ou</u>th"}, "answer": "B", "hint": {"explanation": "Đáp án B. route: phần gạch chân đọc /uː/, các từ còn lại đọc giống nhau.", "rule": "📌 Phát âm \"ou\":\n• /aʊ/: house, mouse, around, sound, south, our...\n• /ʌ/: country, enough, encourage, young, touch...\n• /əʊ/: though, soul, shoulder...\n• /ɔː/: course, four, your, pour...\n• /uː/: route, group, youth, soup...", "trick": "💡 Mẹo: \"ou\" + se/nd → thường /aʊ/ (house, sound). \"ou\" + gh → nhiều cách đọc: though /əʊ/, enough /ʌ/, through /uː/. \"our\" cuối từ → /ɔː/ (four) hoặc /aʊ/ (our).", "ipa": {"A": "/aʊ/", "B": "/uː/", "C": "/aʊ/", "D": "/aʊ/"}}}, {"id": 49, "section": "sound", "question": "", "options": {"A": "dune", "B": "hummock", "C": "shrub", "D": "buffalo"}, "options_html": {"A": "d<u>u</u>ne", "B": "h<u>u</u>mmock", "C": "shr<u>u</u>b", "D": "b<u>u</u>ffalo"}, "answer": "A", "hint": {"explanation": "Đáp án A. dune: phần gạch chân đọc /juː/, các từ còn lại đọc giống nhau.", "rule": "📌 Phát âm chữ \"u\":\n• /juː/ hoặc /uː/: dune, June, rule, tune...\n• /ʌ/: but, cut, hummock, shrub, buffalo, sun...\n• /ʊ/: put, pull, full, bush...", "trick": "💡 Mẹo: \"u\" + phụ âm + e → /juː/ (dune, tune). \"u\" trong âm tiết đóng → thường /ʌ/ (but, cut). Ngoại lệ: put, pull, bush → /ʊ/.", "ipa": {"A": "/juː/", "B": "/ʌ/", "C": "/ʌ/", "D": "/ʌ/"}}}, {"id": 50, "section": "sound", "question": "", "options": {"A": "west", "B": "between", "C": "growth", "D": "which"}, "options_html": {"A": "<u>w</u>est", "B": "bet<u>w</u>een", "C": "gro<u>w</u>th", "D": "<u>w</u>hich"}, "answer": "C", "hint": {"explanation": "Đáp án C. growth: phần gạch chân đọc câm, các từ còn lại đọc giống nhau.", "rule": "📌 Phát âm chữ \"w\":\n• /w/: west, between, worker, wipe, powerful, which...\n• Câm: answer, sword, two, write, wrong, growth, whom...", "trick": "💡 Mẹo: \"w\" câm trước r (write, wrong, wrist). \"w\" câm trong: answer, sword, two, toward. \"wh\" + o → /h/ (whom, who, whole). \"ow\" cuối từ → w câm nếu đọc /əʊ/ (grow, growth).", "ipa": {"A": "/w/", "B": "/w/", "C": "câm", "D": "/w/"}}}], "sections": ["sound", "stress"]}, "cd10": {"title": "Chuyên đề 10: MỆNH ĐỀ CHỈ MỤC ĐÍCH", "questions": [{"id": 1, "question": "The schoolboys are in a hurry ______ they will not be late for school.", "options": {"A": "so as to", "B": "to", "C": "for", "D": "in order that"}, "answer": "D", "hint": {"explanation": "Đáp án D. in order that. Câu hoàn chỉnh: The schoolboys are in a hurry in order that they will not be late for school.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 2, "question": "I gave him my e-mail address ______ he could keep in touch with me.", "options": {"A": "that", "B": "so that", "C": "such that", "D": "so as to"}, "answer": "B", "hint": {"explanation": "Đáp án B. so that. Câu hoàn chỉnh: I gave him my e-mail address so that he could keep in touch with me.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 3, "question": "We decided to join the English speaking club ______ improve our English.", "options": {"A": "so that", "B": "so to", "C": "in order", "D": "to"}, "answer": "D", "hint": {"explanation": "Đáp án D. to. Câu hoàn chỉnh: We decided to join the English speaking club to improve our English.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 4, "question": "______ learn how to use a computer, he decides to take lessons.", "options": {"A": "To", "B": "In order to", "C": "So as", "D": "A & B are correct"}, "answer": "D", "hint": {"explanation": "Đáp án D. Cả A (To) và B (In order to) đều đúng trong câu này.", "rule": "Khi chủ ngữ của hành động chính và hành động mục đích là một, có thể dùng to, in order to hoặc so as to + V.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, các cụm to-V thường là lựa chọn đúng."}}, {"id": 5, "question": "He walked silently ______ wake the other people.", "options": {"A": "to not", "B": "to avoid", "C": "so as to not", "D": "in order not to"}, "answer": "D", "hint": {"explanation": "Đáp án D. in order not to. Câu hoàn chỉnh: He walked silently in order not to wake the other people.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}, {"id": 6, "question": "She wore glasses and a wig ______ we couldn’t recognise her.", "options": {"A": "so that", "B": "so as to", "C": "in order to", "D": "B & C are correct"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: She wore glasses and a wig so that we couldn’t recognise her.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 7, "question": "He locked the door ______ be disturbed.", "options": {"A": "in order not", "B": "in order not to", "C": "in order to not", "D": "in order that he not"}, "answer": "B", "hint": {"explanation": "Đáp án B. in order not to. Câu hoàn chỉnh: He locked the door in order not to be disturbed.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}, {"id": 8, "question": "______ English fluently, we should practise speaking it whenever possible.", "options": {"A": "In order to speak", "B": "To speaking", "C": "In order speak", "D": "In order for speaking"}, "answer": "A", "hint": {"explanation": "Đáp án A. In order to speak. Câu hoàn chỉnh: In order to speak English fluently, we should practise speaking it whenever possible.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 9, "question": "The boy always does his homework before class ______ be punished by his teacher.", "options": {"A": "so as not to", "B": "so as to", "C": "so that not to", "D": "in order that not to"}, "answer": "A", "hint": {"explanation": "Đáp án A. so as not to. Câu hoàn chỉnh: The boy always does his homework before class so as not to be punished by his teacher.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}, {"id": 10, "question": "Seat belt laws were introduced ______ traffic fatalities would be reduced.", "options": {"A": "in order that", "B": "so as to", "C": "such that", "D": "provided that"}, "answer": "A", "hint": {"explanation": "Đáp án A. in order that. Câu hoàn chỉnh: Seat belt laws were introduced in order that traffic fatalities would be reduced.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 12, "question": "Mary took a taxi ______ she could arrive at the conference on time.", "options": {"A": "in order", "B": "that", "C": "so that", "D": "A & B are correct"}, "answer": "C", "hint": {"explanation": "Đáp án C. so that. Câu hoàn chỉnh: Mary took a taxi so that she could arrive at the conference on time.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 13, "question": "Mary put on her scarf ______ she ______ not get cold.", "options": {"A": "so that / will", "B": "to / would", "C": "so as to / will", "D": "so that / would"}, "answer": "D", "hint": {"explanation": "Đáp án D. so that / would. Câu hoàn chỉnh: Mary put on her scarf so that she would not get cold.", "rule": "So that thường đi với mệnh đề chỉ mục đích, trong đó hay dùng can/could/will/would để diễn tả khả năng hoặc ý định.", "trick": "Nếu đáp án gồm cả so that và một trợ động từ như can/would, hãy kiểm tra xem phía sau có chủ ngữ riêng không."}}, {"id": 14, "question": "I’ll give you my telephone number ______ phone me.", "options": {"A": "so that you can", "B": "to", "C": "want to", "D": "A & B are correct"}, "answer": "D", "hint": {"explanation": "Đáp án D. Cả A (so that you can) và B (to) đều đúng trong câu này.", "rule": "Cả mệnh đề chỉ mục đích so that + clause và cụm to + V đều đúng khi cùng diễn tả mục đích của hành động chính.", "trick": "Nếu câu có thể viết ngắn bằng to V hoặc viết rõ hơn bằng so that + subject + can, hai dạng này đôi khi cùng chấp nhận được."}}, {"id": 15, "question": "She worked hard ______ everything would be ready by 6 o’clock.", "options": {"A": "that", "B": "for", "C": "in order that", "D": "so as to"}, "answer": "C", "hint": {"explanation": "Đáp án C. in order that. Câu hoàn chỉnh: She worked hard in order that everything would be ready by 6 o’clock.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 16, "question": "I’m going to make an early start ______ get stuck in the traffic.", "options": {"A": "so that not", "B": "not to", "C": "so as to not", "D": "in order not"}, "answer": "B", "hint": {"explanation": "Đáp án B. not to. Câu hoàn chỉnh: I’m going to make an early start not to get stuck in the traffic.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}, {"id": 17, "question": "I work hard ______ help my family.", "options": {"A": "so as to", "B": "in order to", "C": "in order that", "D": "A & B are correct"}, "answer": "D", "hint": {"explanation": "Đáp án D. Cả A (so as to) và B (in order to) đều đúng trong câu này.", "rule": "Khi chủ ngữ của hành động chính và hành động mục đích là một, có thể dùng to, in order to hoặc so as to + V.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, các cụm to-V thường là lựa chọn đúng."}}, {"id": 18, "question": "My parents got up early this morning ______ park the car for our journey.", "options": {"A": "so that", "B": "in order to", "C": "because", "D": "in case"}, "answer": "B", "hint": {"explanation": "Đáp án B. in order to. Câu hoàn chỉnh: My parents got up early this morning in order to park the car for our journey.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 19, "question": "They got up ______ early in the morning that no one saw them leave the house.", "options": {"A": "too", "B": "so", "C": "in order to", "D": "such"}, "answer": "B", "hint": {"explanation": "Đáp án B. so. Câu hoàn chỉnh: They got up so early in the morning that no one saw them leave the house.", "rule": "So đứng trước tính từ/trạng từ trong cấu trúc so ... that để diễn tả kết quả xảy ra phía sau.", "trick": "Nếu sau chỗ trống là adjective/adverb và câu có that-clause chỉ kết quả, so là tín hiệu rất mạnh."}}, {"id": 20, "question": "She employed a secretary ______ type her letters and answer the phone.", "options": {"A": "in order that", "B": "so that", "C": "to", "D": "for"}, "answer": "C", "hint": {"explanation": "Đáp án C. to. Câu hoàn chỉnh: She employed a secretary to type her letters and answer the phone.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 21, "question": "He gave me his address __________ me to visit.", "options": {"A": "so that", "B": "in order for", "C": "in order to", "D": "in case"}, "answer": "B", "hint": {"explanation": "Đáp án B. in order for. Câu hoàn chỉnh: He gave me his address in order for me to visit.", "rule": "In order for phải theo sau bởi tân ngữ/chủ thể thực hiện hành động và to-infinitive: in order for somebody to V.", "trick": "Nếu mục đích gắn với một người/vật khác chủ ngữ chính, hãy nghĩ đến mẫu in order for + somebody + to V."}}, {"id": 22, "question": "They whispered __________ no one to hear their conversation.", "options": {"A": "so that", "B": "in order to", "C": "because", "D": "in order for"}, "answer": "D", "hint": {"explanation": "Đáp án D. in order for. Câu hoàn chỉnh: They whispered in order for no one to hear their conversation.", "rule": "In order for phải theo sau bởi tân ngữ/chủ thể thực hiện hành động và to-infinitive: in order for somebody to V.", "trick": "Nếu mục đích gắn với một người/vật khác chủ ngữ chính, hãy nghĩ đến mẫu in order for + somebody + to V."}}, {"id": 23, "question": "The piano was too heavy ______.", "options": {"A": "for nobody to move", "B": "for nobody to moving", "C": "for anyone to move", "D": "for anyone to moving"}, "answer": "C", "hint": {"explanation": "Đáp án C. for anyone to move. Câu hoàn chỉnh: The piano was too heavy for anyone to move.", "rule": "Sau too + adjective, ta có thể dùng for + somebody + to V để chỉ người thực hiện hành động trong cấu trúc too ... to.", "trick": "Nếu câu có dạng too heavy/too difficult/... và cần thêm người làm hành động, hãy kiểm tra mẫu too ... for somebody to V."}}, {"id": 24, "question": "_______ to go to the cinema.", "options": {"A": "it was late so that", "B": "that it was late", "C": "it was too late", "D": "such too late"}, "answer": "C", "hint": {"explanation": "Đáp án C. it was too late. Câu hoàn chỉnh: it was too late to go to the cinema.", "rule": "Cấu trúc too + adjective + to V diễn tả mức độ quá ... nên không thể làm việc gì.", "trick": "Khi ý câu là muộn/quá khó/quá xa để làm gì đó, rất hay dùng too + adjective + to V."}}, {"id": 25, "question": "It is such an important matter _______ I can’t decide anything about it myself.", "options": {"A": "so", "B": "because", "C": "that", "D": "so that to"}, "answer": "C", "hint": {"explanation": "Đáp án C. that. Câu hoàn chỉnh: It is such an important matter that I can’t decide anything about it myself.", "rule": "Such thường đi với mệnh đề kết quả theo sau bằng that: such + noun phrase + that-clause.", "trick": "Nếu trước chỗ trống đã có such + cụm danh từ, đáp án thường là that để mở mệnh đề kết quả."}}, {"id": 26, "question": "Mary jogs everyday ______ lose weight.", "options": {"A": "so she can", "B": "so that she can", "C": "because she can", "D": "so that to"}, "answer": "B", "hint": {"explanation": "Đáp án B. so that she can. Câu hoàn chỉnh: Mary jogs everyday so that she can lose weight.", "rule": "So that thường đi với mệnh đề chỉ mục đích, trong đó hay dùng can/could/will/would để diễn tả khả năng hoặc ý định.", "trick": "Nếu đáp án gồm cả so that và một trợ động từ như can/would, hãy kiểm tra xem phía sau có chủ ngữ riêng không."}}, {"id": 27, "question": "She got up early _________ miss the bus.", "options": {"A": "in order that", "B": "so that", "C": "not to", "D": "for"}, "answer": "C", "hint": {"explanation": "Đáp án C. not to. Câu hoàn chỉnh: She got up early not to miss the bus.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}, {"id": 28, "question": "Mr. Thompson is learning Vietnamese __________ to read Kim Van Kieu.", "options": {"A": "so that not", "B": "so as to", "C": "in order not to", "D": "so as not to"}, "answer": "B", "hint": {"explanation": "Đáp án B. so as to. Câu hoàn chỉnh: Mr. Thompson is learning Vietnamese so as to to read Kim Van Kieu.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 29, "question": "They hurried _______ catch the train.", "options": {"A": "to not", "B": "as not to", "C": "in order that not", "D": "to"}, "answer": "D", "hint": {"explanation": "Đáp án D. to. Câu hoàn chỉnh: They hurried to catch the train.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 30, "question": "Tom is saving up __________ he can buy a new car.", "options": {"A": "so that", "B": "as not to", "C": "in order that not", "D": "so as that"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: Tom is saving up so that he can buy a new car.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 31, "question": "Alice prepares her lesson carefully ___________ she will get high marks in class.", "options": {"A": "so that not", "B": "as not to", "C": "in order that not", "D": "in order that"}, "answer": "D", "hint": {"explanation": "Đáp án D. in order that. Câu hoàn chỉnh: Alice prepares her lesson carefully in order that she will get high marks in class.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 32, "question": "I went to see him ________ find out what had happened.", "options": {"A": "so that not", "B": "so as not to", "C": "in order that", "D": "so as to"}, "answer": "D", "hint": {"explanation": "Đáp án D. so as to. Câu hoàn chỉnh: I went to see him so as to find out what had happened.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 33, "question": "He does morning exercises regularly __________ improve his health.", "options": {"A": "so as to", "B": "and", "C": "to", "D": "so as not to"}, "answer": "A", "hint": {"explanation": "Đáp án A. so as to. Câu hoàn chỉnh: He does morning exercises regularly so as to improve his health.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 34, "question": "We learn English _________ we will have better communication with other people.", "options": {"A": "so that", "B": "in order for", "C": "in order to", "D": "in case"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: We learn English so that we will have better communication with other people.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 35, "question": "He lighted the candle ______ he might read the note.", "options": {"A": "so that", "B": "and", "C": "because", "D": "as a result"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: He lighted the candle so that he might read the note.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 36, "question": "He turned off the lights before going out _____ waste electricity.", "options": {"A": "so that not", "B": "as not to", "C": "in order that not", "D": "so as not to"}, "answer": "D", "hint": {"explanation": "Đáp án D. so as not to. Câu hoàn chỉnh: He turned off the lights before going out so as not to waste electricity.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}, {"id": 37, "question": "The teacher explained the lesson twice _____ the students could understand it clearly.", "options": {"A": "as long as", "B": "so that", "C": "because", "D": "as if"}, "answer": "B", "hint": {"explanation": "Đáp án B. so that. Câu hoàn chỉnh: The teacher explained the lesson twice so that the students could understand it clearly.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 38, "question": "He practises speaking English every day _________ he can speak it fluently.", "options": {"A": "so that", "B": "in order for", "C": "in order to", "D": "in case"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: He practises speaking English every day so that he can speak it fluently.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 39, "question": "They are learning English _______________ them to study in Singapore.", "options": {"A": "so as not to", "B": "in order for", "C": "in order to", "D": "in case"}, "answer": "B", "hint": {"explanation": "Đáp án B. in order for. Câu hoàn chỉnh: They are learning English in order for them to study in Singapore.", "rule": "In order for phải theo sau bởi tân ngữ/chủ thể thực hiện hành động và to-infinitive: in order for somebody to V.", "trick": "Nếu mục đích gắn với một người/vật khác chủ ngữ chính, hãy nghĩ đến mẫu in order for + somebody + to V."}}, {"id": 40, "question": "He was tired _____________ he could not continue his work.", "options": {"A": "so that", "B": "in order not to", "C": "in order to", "D": "in case"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: He was tired so that he could not continue his work.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 41, "question": "Those students are trying their best ____________ get the scholarship.", "options": {"A": "so that", "B": "in order for", "C": "in order to", "D": "in case"}, "answer": "C", "hint": {"explanation": "Đáp án C. in order to. Câu hoàn chỉnh: Those students are trying their best in order to get the scholarship.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 42, "question": "Sound is carried from the eardrum to the nerves _____________ we can hear it.", "options": {"A": "so as to", "B": "in order that", "C": "to", "D": "so as not to"}, "answer": "B", "hint": {"explanation": "Đáp án B. in order that. Câu hoàn chỉnh: Sound is carried from the eardrum to the nerves in order that we can hear it.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 43, "question": "In order to help human beings live longer and healthier, many scientists are working hard __________ they can invent new drugs.", "options": {"A": "so that", "B": "as not to", "C": "in order that not", "D": "in order to"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: In order to help human beings live longer and healthier, many scientists are working hard so that they can invent new drugs.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 44, "question": "Many bridges in London are covered with wooden roofs _________ it can be protected from rain and snow.", "options": {"A": "so that not", "B": "so as to", "C": "in order that not", "D": "in order that"}, "answer": "D", "hint": {"explanation": "Đáp án D. in order that. Câu hoàn chỉnh: Many bridges in London are covered with wooden roofs in order that it can be protected from rain and snow.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 45, "question": "Please arrive on time ________ us to be able to start the meeting punctually.", "options": {"A": "so that not", "B": "as not to", "C": "in order for", "D": "in order that"}, "answer": "C", "hint": {"explanation": "Đáp án C. in order for. Câu hoàn chỉnh: Please arrive on time in order for us to be able to start the meeting punctually.", "rule": "In order for phải theo sau bởi tân ngữ/chủ thể thực hiện hành động và to-infinitive: in order for somebody to V.", "trick": "Nếu mục đích gắn với một người/vật khác chủ ngữ chính, hãy nghĩ đến mẫu in order for + somebody + to V."}}, {"id": 46, "question": "The laser beam can attack directly and accurately the diseased cells ___________ the healthy neighbors are left unharmed.", "options": {"A": "so that", "B": "as not to", "C": "in order that not", "D": "in order to"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: The laser beam can attack directly and accurately the diseased cells so that the healthy neighbors are left unharmed.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 47, "question": "My father and I do morning exercises every day ___________ improve our health.", "options": {"A": "to not", "B": "as not to", "C": "in order that not", "D": "to"}, "answer": "D", "hint": {"explanation": "Đáp án D. to. Câu hoàn chỉnh: My father and I do morning exercises every day to improve our health.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 48, "question": "We learn English ________________ we can communicate with other people.", "options": {"A": "so that", "B": "because", "C": "that", "D": "so that to"}, "answer": "A", "hint": {"explanation": "Đáp án A. so that. Câu hoàn chỉnh: We learn English so that we can communicate with other people.", "rule": "So that / in order that đi với một mệnh đề có chủ ngữ riêng để diễn tả mục đích.", "trick": "Nếu sau chỗ trống có chủ ngữ riêng như he, they, we..., hãy ưu tiên mệnh đề chỉ mục đích."}}, {"id": 49, "question": "He studies very hard _______________ pass his final exam next month.", "options": {"A": "not to", "B": "in order to", "C": "so as not to", "D": "so that to"}, "answer": "B", "hint": {"explanation": "Đáp án B. in order to. Câu hoàn chỉnh: He studies very hard in order to pass his final exam next month.", "rule": "To / in order to / so as to đi với động từ nguyên mẫu để diễn tả mục đích.", "trick": "Nếu sau chỗ trống là động từ nguyên mẫu và không có chủ ngữ riêng, chọn cụm to-V."}}, {"id": 50, "question": "___________ waste electricity, we turn out the lights when there is enough light.", "options": {"A": "so", "B": "so as not to", "C": "that", "D": "so that to"}, "answer": "B", "hint": {"explanation": "Đáp án B. so as not to. Câu hoàn chỉnh: so as not to waste electricity, we turn out the lights when there is enough light.", "rule": "Khi diễn tả mục đích phủ định, ta dùng in order not to / so as not to + V.", "trick": "Phủ định trong cụm chỉ mục đích phải đặt not trước to-infinitive đúng mẫu."}}], "summary_hint": {"focus": "Cụm và mệnh đề chỉ mục đích.", "review": "Rà to / in order to / so as to + V và so that / in order that + clause.", "tip": "Nếu sau chỗ trống là một mệnh đề có chủ ngữ riêng, hãy ưu tiên so that hoặc in order that."}}, "cd11": {"title": "Chuyên đề 11: ĐỘNG TỪ KHUYẾT THIẾU", "questions": [{"id": 1, "question": "You have been reading for four hours. This book ___ be very interesting.", "options": {"A": "can", "B": "might", "C": "must", "D": "should"}, "answer": "C", "hint": {"explanation": "Đáp án C. must. Câu hoàn chỉnh: You have been reading for four hours. This book must be very interesting.", "rule": "Must trong câu này dùng để suy đoán gần như chắc chắn dựa trên dấu hiệu hiện có.", "trick": "Khi người nói suy ra điều gì với độ chắc cao, must thường phù hợp hơn might/may."}}, {"id": 2, "question": "Don’t phone Ann now. She ___ be having lunch.", "options": {"A": "might", "B": "can", "C": "must", "D": "has to"}, "answer": "A", "hint": {"explanation": "Đáp án A. might. Câu hoàn chỉnh: Don’t phone Ann now. She might be having lunch.", "rule": "Might diễn tả khả năng có thể đang xảy ra nhưng chưa chắc chắn.", "trick": "Nếu ngữ cảnh chỉ là một phỏng đoán nhẹ, might thường tự nhiên hơn must."}}, {"id": 3, "question": "This road is very narrow. It ___to be widened.", "options": {"A": "might", "B": "needs", "C": "mustn’t", "D": "may"}, "answer": "B", "hint": {"explanation": "Đáp án B. needs. Câu hoàn chỉnh: This road is very narrow. It needs to be widened.", "rule": "Need có thể dùng như động từ thường trong cấu trúc need + V-ing hoặc need + to be + V3/ed để diễn tả sự cần được làm.", "trick": "Với vật/đồ vật cần được xử lý, needs often behaves like a lexical verb rather than a modal."}}, {"id": 4, "question": "They have plenty of time, so they needn’t ___.", "options": {"A": "be hurry", "B": "to hurry", "C": "hurry", "D": "to be hurried"}, "answer": "C", "hint": {"explanation": "Đáp án C. hurry. Câu hoàn chỉnh: They have plenty of time, so they needn’t hurry.", "rule": "Sau needn't, động từ dùng ở dạng nguyên mẫu không to để diễn tả việc không cần làm.", "trick": "Needn't là modal verb, nên theo sau luôn là bare infinitive như needn't hurry."}}, {"id": 5, "question": "You’re having a sore throat. You’d better___ to the doctor.", "options": {"A": "to go", "B": "went", "C": "go", "D": "going"}, "answer": "C", "hint": {"explanation": "Đáp án C. go. Câu hoàn chỉnh: You’re having a sore throat. You’d better go to the doctor.", "rule": "Had better đi với động từ nguyên mẫu không to khi đưa ra lời khuyên mạnh.", "trick": "Đừng thêm to sau had better; mẫu đúng là had better + V."}}, {"id": 6, "question": "My mother permitted me to go out at night. She said, “You ___ go out tonight.”", "options": {"A": "may", "B": "have to", "C": "must", "D": "ought to"}, "answer": "A", "hint": {"explanation": "Đáp án A. may. Câu hoàn chỉnh: My mother permitted me to go out at night. She said, “You may go out tonight.”", "rule": "May thường dùng để diễn tả sự cho phép hoặc khả năng ở mức trung tính.", "trick": "Nếu câu là cho phép ai làm gì, may là lựa chọn tự nhiên."}}, {"id": 7, "question": "He advised me to take an English course. I ___ it early.", "options": {"A": "should have taken", "B": "should take", "C": "will have taken", "D": "may take"}, "answer": "A", "hint": {"explanation": "Đáp án A. should have taken. Câu hoàn chỉnh: He advised me to take an English course. I should have taken it early.", "rule": "Should have + V3/ed diễn tả lời khuyên lẽ ra nên làm trong quá khứ nhưng đã không làm.", "trick": "Khi nhìn lại quá khứ và đánh giá một hành động lẽ ra nên xảy ra, chọn should have + V3/ed."}}, {"id": 8, "question": "You ___ ring the bell; I have a key.", "options": {"A": "mustn’t", "B": "needn’t", "C": "couldn’t", "D": "shouldn’t"}, "answer": "B", "hint": {"explanation": "Đáp án B. needn’t. Câu hoàn chỉnh: You needn’t ring the bell; I have a key.", "rule": "Needn't diễn tả sự không cần thiết, khác với mustn't là không được phép.", "trick": "Phân biệt rõ: needn't = không cần; mustn't = cấm."}}, {"id": 9, "question": "It must ___ without delay.", "options": {"A": "be done", "B": "have been done", "C": "do", "D": "be doing"}, "answer": "A", "hint": {"explanation": "Đáp án A. be done. Câu hoàn chỉnh: It must be done without delay.", "rule": "Sau must, nếu câu cần bị động thì dùng must + be + V3/ed.", "trick": "Khi chủ ngữ là việc/điều gì đó cần được làm, hãy nghĩ đến must be done thay vì must do."}}, {"id": 10, "question": "By the time a baby has reached his first birthday, he should ___ sit up or even stand up.", "options": {"A": "to be able to", "B": "able to", "C": "to be able", "D": "be able to"}, "answer": "D", "hint": {"explanation": "Đáp án D. be able to. Câu hoàn chỉnh: By the time a baby has reached his first birthday, he should be able to sit up or even stand up.", "rule": "Sau should, ta dùng bare infinitive; với khả năng thực hiện hành động, cụm đúng là should be able to + V.", "trick": "Modal + be able to là mẫu quen thuộc khi cần diễn đạt khả năng mà không dùng trực tiếp can/could."}}, {"id": 11, "question": "Many birds will ___ more than 3,000 miles to reach their winter homes.", "options": {"A": "flying", "B": "fly", "C": "be fly", "D": "flew"}, "answer": "B", "hint": {"explanation": "Đáp án B. fly. Câu hoàn chỉnh: Many birds will fly more than 3,000 miles to reach their winter homes.", "rule": "Sau will, động từ phải ở dạng nguyên mẫu không to.", "trick": "Future simple có công thức will + V, nên loại các dạng V-ing, quá khứ hoặc be + V."}}, {"id": 12, "question": "The pen won’t write; It ___ out of ink.", "options": {"A": "must run", "B": "must be running", "C": "must have run", "D": "must have ran"}, "answer": "C", "hint": {"explanation": "Đáp án C. must have run. Câu hoàn chỉnh: The pen won’t write; It must have run out of ink.", "rule": "Must have + V3/ed diễn tả suy đoán gần như chắc chắn về một việc đã xảy ra trong quá khứ.", "trick": "Nếu đang nhìn dấu hiệu hiện tại để suy ra nguyên nhân trong quá khứ, rất hay dùng must have + V3/ed."}}, {"id": 14, "question": "She told me that she’d rather ___ on the committee.", "options": {"A": "not to serve", "B": "not serving", "C": "not serve", "D": "serving not"}, "answer": "C", "hint": {"explanation": "Đáp án C. not serve. Câu hoàn chỉnh: She told me that she’d rather not serve on the committee.", "rule": "Would rather đi với động từ nguyên mẫu không to; khi phủ định thì đặt not trước động từ.", "trick": "Nhớ mẫu would rather not serve, không dùng to serve hay serving sau would rather."}}, {"id": 15, "question": "“Are you still going to Florida for vacation?” “Yes, but I really ___because I don’t have much money.”", "options": {"A": "shouldn’t", "B": "can’t", "C": "mustn’t", "D": "won’t"}, "answer": "A", "hint": {"explanation": "Đáp án A. shouldn’t. Câu hoàn chỉnh: “Are you still going to Florida for vacation?” “Yes, but I really shouldn’t because I don’t have much money.”", "rule": "Shouldn't diễn tả lời khuyên rằng một hành động là không nên làm.", "trick": "Khi người nói thấy việc gì đó không hợp lý hoặc không nên, shouldn't thường tự nhiên hơn can't hay mustn't."}}, {"id": 16, "question": "“Did Peter go downtown by car or by train?” “He ___by train because his car was in the mechanics.”", "options": {"A": "must go", "B": "has to go", "C": "had gone", "D": "must have gone"}, "answer": "D", "hint": {"explanation": "Đáp án D. must have gone. Câu hoàn chỉnh: “Did Peter go downtown by car or by train?” “He must have gone by train because his car was in the mechanics.”", "rule": "Must have gone diễn tả suy đoán gần như chắc chắn về cách ai đó đã di chuyển trong quá khứ.", "trick": "Nếu có bằng chứng rõ như car was in the mechanics, hãy nghĩ đến must have + V3/ed để suy luận quá khứ."}}, {"id": 17, "question": "“Why are you so mad?” “You ___ me you weren’t coming to dinner. I waited for you for two hours.”", "options": {"A": "should tell", "B": "should have told", "C": "should told", "D": "should had told"}, "answer": "B", "hint": {"explanation": "Đáp án B. should have told. Câu hoàn chỉnh: “Why are you so mad?” “You should have told me you weren’t coming to dinner. I waited for you for two hours.”", "rule": "Should have + V3/ed diễn tả lời khuyên lẽ ra nên làm trong quá khứ nhưng đã không làm.", "trick": "Khi nhìn lại quá khứ và đánh giá một hành động lẽ ra nên xảy ra, chọn should have + V3/ed."}}, {"id": 18, "question": "“Do you like to play tennis?” “I ___, but now I prefer golf”", "options": {"A": "used to", "B": "used to do", "C": "used to played", "D": "used to playing"}, "answer": "A", "hint": {"explanation": "Đáp án A. used to. Câu hoàn chỉnh: “Do you like to play tennis?” “I used to, but now I prefer golf”", "rule": "Used to diễn tả thói quen hoặc trạng thái quen thuộc trong quá khứ mà hiện nay không còn nữa.", "trick": "Sau used to là động từ nguyên mẫu; nếu động từ chính đã lược bỏ vì ngữ cảnh rõ, bản thân used to vẫn có thể đứng một mình."}}, {"id": 19, "question": "“Have you seen Kate?” “No, but she ___ be at her desk.”", "options": {"A": "may", "B": "ought", "C": "would", "D": "can"}, "answer": "A", "hint": {"explanation": "Đáp án A. may. Câu hoàn chỉnh: “Have you seen Kate?” “No, but she may be at her desk.”", "rule": "May thường dùng để diễn tả sự cho phép hoặc khả năng ở mức trung tính.", "trick": "Nếu câu là cho phép ai làm gì, may là lựa chọn tự nhiên."}}, {"id": 20, "question": "“Can I borrow twenty dollars?” “No, you know I ___ lend you money any more.”", "options": {"A": "might not", "B": "shouldn’t have", "C": "won’t", "D": "not going to"}, "answer": "C", "hint": {"explanation": "Đáp án C. won’t. Câu hoàn chỉnh: “Can I borrow twenty dollars?” “No, you know I won’t lend you money any more.”", "rule": "Won't ở đây diễn tả sự từ chối hoặc không sẵn lòng làm điều gì trong hiện tại/tương lai gần.", "trick": "Đừng chỉ hiểu won't là tương lai phủ định; trong hội thoại nó còn dùng để nói ai đó không chịu làm gì."}}, {"id": 21, "question": "The plane ___ take off after the fog had lifted.", "options": {"A": "must", "B": "can", "C": "was able to", "D": "may"}, "answer": "C", "hint": {"explanation": "Đáp án C. was able to. Câu hoàn chỉnh: The plane was able to take off after the fog had lifted.", "rule": "Was able to dùng để nói đã thành công làm được một việc cụ thể trong quá khứ.", "trick": "Với một tình huống thành công cụ thể sau trở ngại, was/were able to thường tự nhiên hơn could."}}, {"id": 22, "question": "___ you remember what you were doing at this time yesterday?", "options": {"A": "Can", "B": "Must", "C": "May", "D": "Should"}, "answer": "A", "hint": {"explanation": "Đáp án A. Can. Câu hoàn chỉnh: Can you remember what you were doing at this time yesterday?", "rule": "Can ở đây dùng để hỏi hoặc nói về khả năng, năng lực thực hiện hành động.", "trick": "Nếu câu hỏi xoay quanh ability như remember, speak languages, can thường là lựa chọn trực tiếp nhất."}}, {"id": 23, "question": "I ___ understand this letter. Will you translate it for me?", "options": {"A": "mustn’t", "B": "may not", "C": "can’t", "D": "shouldn’t"}, "answer": "C", "hint": {"explanation": "Đáp án C. can’t. Câu hoàn chỉnh: I can’t understand this letter. Will you translate it for me?", "rule": "Can't diễn tả sự không thể hoặc không có khả năng làm điều gì trong ngữ cảnh này.", "trick": "Nếu người nói nói về việc không hiểu, không ở lại được, không làm nổi điều gì, can't rất hay xuất hiện."}}, {"id": 24, "question": "Daisy’s parents don’t let her go to late-night discos. She ___ be at home at 9 o’clock in the evening.", "options": {"A": "must", "B": "may", "C": "can", "D": "has to"}, "answer": "D", "hint": {"explanation": "Đáp án D. has to. Câu hoàn chỉnh: Daisy’s parents don’t let her go to late-night discos. She has to be at home at 9 o’clock in the evening.", "rule": "Has to diễn tả sự bắt buộc do hoàn cảnh hoặc quy định bên ngoài áp đặt.", "trick": "Khi nghĩa là bị buộc phải làm do cha mẹ, nội quy hay hoàn cảnh, has to thường phù hợp hơn must."}}, {"id": 25, "question": "___ you give me some advice about the language course?", "options": {"A": "Have", "B": "Should", "C": "May", "D": "Could"}, "answer": "D", "hint": {"explanation": "Đáp án D. Could. Câu hoàn chỉnh: Could you give me some advice about the language course?", "rule": "Could ở đây dùng để đưa ra lời đề nghị, khả năng trong quá khứ hoặc một phương án có thể xảy ra tùy ngữ cảnh câu.", "trick": "Hãy nhìn ngữ cảnh: could có thể là lịch sự hiện tại hoặc khả năng/cơ hội trong quá khứ."}}, {"id": 26, "question": "Why didn’t you give me a call yesterday? We ___ discuss everything together.", "options": {"A": "can", "B": "may", "C": "must", "D": "could"}, "answer": "D", "hint": {"explanation": "Đáp án D. could. Câu hoàn chỉnh: Why didn’t you give me a call yesterday? We could discuss everything together.", "rule": "Could ở đây dùng để đưa ra lời đề nghị, khả năng trong quá khứ hoặc một phương án có thể xảy ra tùy ngữ cảnh câu.", "trick": "Hãy nhìn ngữ cảnh: could có thể là lịch sự hiện tại hoặc khả năng/cơ hội trong quá khứ."}}, {"id": 27, "question": "Yesterday I ___ finish the work because I was very tired.", "options": {"A": "could", "B": "can’t", "C": "couldn’t", "D": "mustn’t"}, "answer": "C", "hint": {"explanation": "Đáp án C. couldn’t. Câu hoàn chỉnh: Yesterday I couldn’t finish the work because I was very tired.", "rule": "Couldn't diễn tả sự không thể làm được điều gì trong quá khứ.", "trick": "Nếu câu có mốc quá khứ rõ như yesterday, dùng couldn't để nói bất lực hoặc không hoàn thành được hành động."}}, {"id": 28, "question": "I would rather ___ poor but happy than become rich without happiness.", "options": {"A": "being", "B": "be", "C": "to be", "D": "was"}, "answer": "B", "hint": {"explanation": "Đáp án B. be. Câu hoàn chỉnh: I would rather be poor but happy than become rich without happiness.", "rule": "Would rather đi với động từ nguyên mẫu không to ở cả hai vế so sánh.", "trick": "Trong mẫu would rather A than B, cả A và B đều dùng bare infinitive."}}, {"id": 29, "question": "Sit down, please. ___ a cup of tea?", "options": {"A": "Do you like", "B": "Do you like to drink", "C": "Would you like", "D": "Will you like"}, "answer": "C", "hint": {"explanation": "Đáp án C. Would you like. Câu hoàn chỉnh: Sit down, please. Would you like a cup of tea?", "rule": "Would you like là mẫu lời mời hoặc đề nghị lịch sự rất thông dụng trong hội thoại.", "trick": "Khi mời ai uống gì hoặc đi đâu, ưu tiên Would you like ...? thay vì Do you like ...?"}}, {"id": 30, "question": "It could not tell the difference between Indian music and jazz. It ___ tell the difference between Indian music     and jazz.", "options": {"A": "might not", "B": "may not", "C": "mustn’t", "D": "wasn’t able to"}, "answer": "D", "hint": {"explanation": "Đáp án D. wasn’t able to. Câu hoàn chỉnh: It could not tell the difference between Indian music and jazz. It wasn’t able to tell the difference between Indian music and jazz.", "rule": "Wasn't able to diễn tả việc đã không làm được một hành động cụ thể trong quá khứ.", "trick": "Nếu câu đang nói về một lần không phân biệt nổi hay không thực hiện được một việc đã xảy ra, was/were not able to rất tự nhiên."}}, {"id": 31, "question": "I’d rather ___ in the field than ___ home.", "options": {"A": "to work- to stay", "B": "work – stay", "C": "working – staying", "D": "worked- stayed"}, "answer": "B", "hint": {"explanation": "Đáp án B. work – stay. Câu hoàn chỉnh: I’d rather work in the field than stay home.", "rule": "Would rather đi với động từ nguyên mẫu không to ở cả hai vế so sánh.", "trick": "Trong mẫu would rather A than B, cả A và B đều dùng bare infinitive."}}, {"id": 32, "question": "He spent all that money last week. He ___ so much.", "options": {"A": "didn’t need to spend", "B": "shouldn’t spend", "C": "needn’t have spent", "D": "didn’t have to spend"}, "answer": "C", "hint": {"explanation": "Đáp án C. needn’t have spent. Câu hoàn chỉnh: He spent all that money last week. He needn’t have spent so much.", "rule": "Needn't have + V3/ed diễn tả một việc đã làm trong quá khứ nhưng thật ra không cần thiết.", "trick": "Phân biệt needn't have done với didn't need to do: một bên là đã làm rồi nhưng thừa, bên kia là không cần và có thể đã không làm."}}, {"id": 33, "question": "Sorry, I ___ stay any longer. I really must go home.", "options": {"A": "mustn’t", "B": "can not", "C": "couldn’t", "D": "may not"}, "answer": "B", "hint": {"explanation": "Đáp án B. can not. Câu hoàn chỉnh: Sorry, I can not stay any longer. I really must go home.", "rule": "Can't diễn tả sự không thể hoặc không có khả năng làm điều gì trong ngữ cảnh này.", "trick": "Nếu người nói nói về việc không hiểu, không ở lại được, không làm nổi điều gì, can't rất hay xuất hiện."}}, {"id": 34, "question": "“It ___rain this evening. Why don’t you take an umbrella?” “That’s a good idea. May I borrow yours?”", "options": {"A": "had better", "B": "could be", "C": "must", "D": "might"}, "answer": "D", "hint": {"explanation": "Đáp án D. might. Câu hoàn chỉnh: “It might rain this evening. Why don’t you take an umbrella?” “That’s a good idea. May I borrow yours?”", "rule": "Might diễn tả khả năng có thể đang xảy ra nhưng chưa chắc chắn.", "trick": "Nếu ngữ cảnh chỉ là một phỏng đoán nhẹ, might thường tự nhiên hơn must."}}, {"id": 35, "question": "“___ taking me downtown on your way to work this morning?” “Not at all.”", "options": {"A": "Can you", "B": "Why don’t you", "C": "Would you mind", "D": "Could you please"}, "answer": "C", "hint": {"explanation": "Đáp án C. Would you mind. Câu hoàn chỉnh: “Would you mind taking me downtown on your way to work this morning?” “Not at all.”", "rule": "Would you mind là mẫu xin phép hoặc nhờ vả lịch sự; theo sau mind thường là V-ing hoặc possessive + V-ing.", "trick": "Khi câu có cấu trúc ... mind my/our/his + V-ing, đáp án mở đầu thường là Would."}}, {"id": 36, "question": "Tommy and Mary were mischievous children. They ___tricks on their teachers, which always got them into a lot of trouble.", "options": {"A": "could play", "B": "used to play", "C": "could have play", "D": "may have played"}, "answer": "B", "hint": {"explanation": "Đáp án B. used to play. Câu hoàn chỉnh: Tommy and Mary were mischievous children. They used to play tricks on their teachers, which always got them into a lot of trouble.", "rule": "Used to + V diễn tả thói quen lặp đi lặp lại trong quá khứ.", "trick": "Khi câu kể lại một thói quen thời nhỏ hoặc trước đây, used to play/used to go là cấu trúc rất quen thuộc."}}, {"id": 37, "question": "“Since we have to be there in a hurry, we ___ take a taxi.” “I agree.”", "options": {"A": "had better", "B": "may", "C": "have been used to", "D": "are able to"}, "answer": "A", "hint": {"explanation": "Đáp án A. had better. Câu hoàn chỉnh: “Since we have to be there in a hurry, we had better take a taxi.” “I agree.”", "rule": "Had better diễn tả lời khuyên mạnh hoặc cảnh báo nhẹ về việc nên làm ngay.", "trick": "Nếu ngữ cảnh có tính thúc giục như in a hurry, had better tự nhiên hơn may hay are able to."}}, {"id": 38, "question": "007 didn’t need ___ out of his room in Moscow.", "options": {"A": "go", "B": "to going", "C": "going", "D": "to go"}, "answer": "D", "hint": {"explanation": "Đáp án D. to go. Câu hoàn chỉnh: 007 didn’t need to go out of his room in Moscow.", "rule": "Need khi đi với trợ động từ did hoạt động như động từ thường, nên theo sau bởi to-infinitive: didn't need to go.", "trick": "Nếu câu đã có did/didn't, hãy nhớ mẫu need to V chứ không dùng bare infinitive."}}, {"id": 39, "question": "I couldn’t ___ it even though I had wanted.", "options": {"A": "had bought", "B": "buy", "C": "buying", "D": "have bought"}, "answer": "D", "hint": {"explanation": "Đáp án D. have bought. Câu hoàn chỉnh: I couldn’t have bought it even though I had wanted.", "rule": "Sau couldn't, để nói khả năng không thể xảy ra trong quá khứ, ta dùng couldn't have + V3/ed.", "trick": "Nếu câu nhắc đến một việc đã không thể thực hiện dù muốn, hãy nghĩ đến couldn't have + past participle."}}, {"id": 40, "question": "She ought not ___ him but she did.", "options": {"A": "to tell", "B": "to telling", "C": "tell", "D": "to have told"}, "answer": "D", "hint": {"explanation": "Đáp án D. to have told. Câu hoàn chỉnh: She ought not to have told him but she did.", "rule": "Ought not to have + V3/ed diễn tả điều lẽ ra không nên làm trong quá khứ nhưng đã làm.", "trick": "Muốn phê bình một hành động quá khứ, hãy dùng ought not to have + V3/ed."}}, {"id": 41, "question": "I’d rather you ___ that.", "options": {"A": "do", "B": "don’t do", "C": "won’t do", "D": "didn’t do"}, "answer": "D", "hint": {"explanation": "Đáp án D. didn’t do. Câu hoàn chỉnh: I’d rather you didn’t do that.", "rule": "I'd rather you + past simple dùng để diễn tả mong muốn ai đó làm khác đi ở hiện tại hoặc tương lai gần.", "trick": "Với would rather + somebody else, mệnh đề sau thường lùi về quá khứ đơn: I'd rather you didn't do that."}}, {"id": 42, "question": "___ you speak any foreign languages?", "options": {"A": "Could", "B": "Must", "C": "Can", "D": "Might"}, "answer": "C", "hint": {"explanation": "Đáp án C. Can. Câu hoàn chỉnh: Can you speak any foreign languages?", "rule": "Can ở đây dùng để hỏi hoặc nói về khả năng, năng lực thực hiện hành động.", "trick": "Nếu câu hỏi xoay quanh ability như remember, speak languages, can thường là lựa chọn trực tiếp nhất."}}, {"id": 43, "question": "We ___have gone away if we had enough money.", "options": {"A": "could", "B": "must", "C": "can", "D": "might"}, "answer": "A", "hint": {"explanation": "Đáp án A. could. Câu hoàn chỉnh: We could have gone away if we had enough money.", "rule": "Could ở đây dùng để đưa ra lời đề nghị, khả năng trong quá khứ hoặc một phương án có thể xảy ra tùy ngữ cảnh câu.", "trick": "Hãy nhìn ngữ cảnh: could có thể là lịch sự hiện tại hoặc khả năng/cơ hội trong quá khứ."}}, {"id": 44, "question": "“You ___ pay the bills today.” “I know, I promise. I won’t forget.”", "options": {"A": "would", "B": "shall", "C": "must", "D": "may"}, "answer": "C", "hint": {"explanation": "Đáp án C. must. Câu hoàn chỉnh: “You must pay the bills today.” “I know, I promise. I won’t forget.”", "rule": "Must trong câu này dùng để suy đoán gần như chắc chắn dựa trên dấu hiệu hiện có.", "trick": "Khi người nói suy ra điều gì với độ chắc cao, must thường phù hợp hơn might/may."}}, {"id": 45, "question": "___ you mind my staying here for some days?", "options": {"A": "Would", "B": "Could", "C": "Can", "D": "Should"}, "answer": "A", "hint": {"explanation": "Đáp án A. Would. Câu hoàn chỉnh: Would you mind my staying here for some days?", "rule": "Would you mind là mẫu xin phép hoặc nhờ vả lịch sự; theo sau mind thường là V-ing hoặc possessive + V-ing.", "trick": "Khi câu có cấu trúc ... mind my/our/his + V-ing, đáp án mở đầu thường là Would."}}], "summary_hint": {"focus": "Suy đoán, lời khuyên, sự cần thiết và mức độ bắt buộc với động từ khuyết thiếu.", "review": "Ôn must, might, may, should, needn't, had better, ought to và cấu trúc need + V-ing/V-ed.", "tip": "Hãy xác định người nói đang suy đoán, cho phép, khuyên nhủ hay nói về nghĩa vụ."}}, "cd12": {"title": "Chuyên đề 12: GIỚI TỪ + MẠO TỪ", "questions": [{"id": 1, "question": "Although the team was both mentally and physically exhausted, they ________ on walking.", "options": {"A": "stopped", "B": "kept", "C": "took", "D": "put"}, "answer": "B", "hint": {"explanation": "Đáp án B. kept. Câu hoàn chỉnh: Although the team was both mentally and physically exhausted, they kept on walking.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 2, "question": "Don't forget to ________ your gloves on. It is cold outside.", "options": {"A": "let", "B": "make", "C": "put", "D": "fix"}, "answer": "C", "hint": {"explanation": "Đáp án C. put. Câu hoàn chỉnh: Don't forget to put your gloves on. It is cold outside.", "rule": "Đây là cụm từ/phrasal verb cố định: put. Đáp án đúng vì nó khớp nghĩa và cấu trúc tự nhiên của câu.", "trick": "Hãy học các phrasal verb và collocation như một khối thay vì dịch từng từ riêng lẻ."}}, {"id": 3, "question": "If you don't pay your rent, your landlord is going to kick you out!", "options": {"A": "lend you some money", "B": "play football with you", "C": "give you a kick", "D": "force you to leave"}, "answer": "D", "hint": {"explanation": "Đáp án D. force you to leave. Trong câu, cụm 'kick you out' có nghĩa gần nhất là 'force you to leave'.", "rule": "Dạng bài này kiểm tra nghĩa của phrasal verb, collocation hoặc cách diễn đạt tương đương trong ngữ cảnh.", "trick": "Khi không có chỗ trống, hãy xác định cụm từ khóa trong câu rồi đối chiếu nghĩa gần nhất giữa các đáp án."}}, {"id": 4, "question": "Yesterday I ran into Sam at the grocery store. I had not seen him for years.", "options": {"A": "met", "B": "visited", "C": "said goodbye to", "D": "made friends with"}, "answer": "A", "hint": {"explanation": "Đáp án A. met. Trong câu, cụm 'ran into' có nghĩa gần nhất là 'met'.", "rule": "Dạng bài này kiểm tra nghĩa của phrasal verb, collocation hoặc cách diễn đạt tương đương trong ngữ cảnh.", "trick": "Khi không có chỗ trống, hãy xác định cụm từ khóa trong câu rồi đối chiếu nghĩa gần nhất giữa các đáp án."}}, {"id": 5, "question": "Let's go over that report again before we submit it.", "options": {"A": "dictate", "B": "print", "C": "read carefully", "D": "type"}, "answer": "C", "hint": {"explanation": "Đáp án C. read carefully. Trong câu, cụm 'go over' có nghĩa gần nhất là 'read carefully'.", "rule": "Dạng bài này kiểm tra nghĩa của phrasal verb, collocation hoặc cách diễn đạt tương đương trong ngữ cảnh.", "trick": "Khi không có chỗ trống, hãy xác định cụm từ khóa trong câu rồi đối chiếu nghĩa gần nhất giữa các đáp án."}}, {"id": 6, "question": "Who will __________ the children when you are away ?", "options": {"A": "take care on", "B": "take care of", "C": "take care", "D": "care on"}, "answer": "B", "hint": {"explanation": "Đáp án B. take care of. Câu hoàn chỉnh: Who will take care of the children when you are away?", "rule": "Đây là cụm từ/phrasal verb cố định: take care of. Đáp án đúng vì nó khớp nghĩa và cấu trúc tự nhiên của câu.", "trick": "Hãy học các phrasal verb và collocation như một khối thay vì dịch từng từ riêng lẻ."}}, {"id": 7, "question": "She is looking _______ a new place to live because she does not want to depend _______ her parents any more.", "options": {"A": "for / on", "B": "after / with", "C": "up / forward", "D": "at / into"}, "answer": "A", "hint": {"explanation": "Đáp án A. for / on. Câu hoàn chỉnh: She is looking for a new place to live because she does not want to depend on her parents any more.", "rule": "Đáp án đúng là cụm cố định: for / on. Câu này không thể chọn từng giới từ riêng lẻ theo nghĩa rời rạc.", "trick": "Với câu có hai chỗ trống, hãy kiểm tra từng cụm cố định một rồi mới ghép đáp án."}}, {"id": 8, "question": "I was brought _______ in the countryside by my aunt after my parents had passed _______.", "options": {"A": "on / over", "B": "for / on", "C": "on / off", "D": "up / away"}, "answer": "D", "hint": {"explanation": "Đáp án D. up / away. Câu hoàn chỉnh: I was brought up in the countryside by my aunt after my parents had passed away.", "rule": "Đáp án đúng là cụm cố định: up / away. Câu này không thể chọn từng giới từ riêng lẻ theo nghĩa rời rạc.", "trick": "Với câu có hai chỗ trống, hãy kiểm tra từng cụm cố định một rồi mới ghép đáp án."}}, {"id": 9, "question": "Due to industrialization, we have to cope _____the fact that many species are ____ danger ______extinction.", "options": {"A": "over / at / for", "B": "at / upon / over", "C": "for / on / with", "D": "with / in / of"}, "answer": "D", "hint": {"explanation": "Đáp án D. with / in / of. Câu hoàn chỉnh: Due to industrialization, we have to cope with the fact that many species are in danger of extinction.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 11, "question": "She intended to quit her job to stay _______ home and look _______ her sick mother.", "options": {"A": "in / at", "B": "at / after", "C": "for / over", "D": "up / on"}, "answer": "B", "hint": {"explanation": "Đáp án B. at / after. Câu hoàn chỉnh: She intended to quit her job to stay at home and look after her sick mother.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 12, "question": "He is very worried _______ his new job because he is not quite prepared _______ working.", "options": {"A": "on / over", "B": "to / off", "C": "about / for", "D": "in / at"}, "answer": "C", "hint": {"explanation": "Đáp án C. about / for. Câu hoàn chỉnh: He is very worried about his new job because he is not quite prepared for working.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 13, "question": "Instead _____ petrol, cars will only run ____ solar energy and electricity.", "options": {"A": "of / on", "B": "for / by", "C": "in / over", "D": "from/ upon"}, "answer": "A", "hint": {"explanation": "Đáp án A. of / on. Câu hoàn chỉnh: Instead of petrol, cars will only run on solar energy and electricity.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 14, "question": "She has a promising future ahead _______ her.", "options": {"A": "for", "B": "from", "C": "on", "D": "of"}, "answer": "D", "hint": {"explanation": "Đáp án D. of. Câu hoàn chỉnh: She has a promising future ahead of her.", "rule": "Giới từ đúng là of vì nó đi kèm với cụm hoặc cấu trúc cố định trong câu.", "trick": "Giới từ tiếng Anh thường phải học theo cụm: depend on, interested in, different from..."}}, {"id": 15, "question": "What are your plans for _______ future?", "options": {"A": "a", "B": "an", "C": "the", "D": "Ø"}, "answer": "C", "hint": {"explanation": "Đáp án C. the. Câu hoàn chỉnh: What are your plans for the future?", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 16, "question": "You have to study harder in order to _________________ your classmates.", "options": {"A": "keep pace into", "B": "keep pace on", "C": "keep pace at", "D": "keep pace with"}, "answer": "D", "hint": {"explanation": "Đáp án D. keep pace with. Câu hoàn chỉnh: You have to study harder in order to keep pace with your classmates.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 17, "question": "If you have ever watched television, you have seen plenty ___ drug ads.", "options": {"A": "with", "B": "of", "C": "for", "D": "about"}, "answer": "B", "hint": {"explanation": "Đáp án B. of. Đáp án này diễn đạt đúng nghĩa của cụm từ hoặc n f my little dog when I am on business?", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 22, "question": "According _______ Bill, there's something wrong _______ my computer.", "options": {"A": "after / for", "B": "on / about", "C": "to / with", "D": "upon / at"}, "answer": "C", "hint": {"explanation": "Đáp án C. to / with. Câu hoàn chỉnh: According to Bill, there's something wrong with my computer.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 23, "question": "He depends _______ his sister _______ assistance.", "options": {"A": "to / from", "B": "from / in", "C": "on / for", "D": "at / with"}, "answer": "C", "hint": {"explanation": "Đáp án C. on / for. Câu hoàn chỉnh: He depends on his sister for assistance.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 25, "question": "On _______ Internet and with cable television we can select information from _______ wide variety of sources.", "options": {"A": "the / a", "B": "an / the", "C": "the / Ø", "D": "Ø / the"}, "answer": "A", "hint": {"explanation": "Đáp án A. the / a. Câu hoàn chỉnh: On the Internet and with cable television we can select information from a wide variety of sources.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 27, "question": "Those workers are in difficulty because wage increases cannot keep up _______ inflation.", "options": {"A": "with", "B": "for", "C": "over", "D": "on"}, "answer": "A", "hint": {"explanation": "Đáp án A. with. Câu hoàn chỉnh: Those workers are in difficulty because wage increases cannot keep up with inflation.", "rule": "Giới từ đúng là with vì nó đi kèm với cụm hoặc cấu trúc cố định trong câu.", "trick": "Giới từ tiếng Anh thường phải học theo cụm: depend on, interested in, different from..."}}, {"id": 28, "question": "They argued _______ us _______ the problem last night, but we could not find _______ the solution.", "options": {"A": "with / about / out", "B": "on / for / off", "C": "upon / with / in", "D": "to / on / up"}, "answer": "A", "hint": {"explanation": "Đáp án A. with / about / out. Câu hoàn chỉnh: They argued with us about the problem last night, but we could not find out the solution.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 30, "question": "I didn't get to see the end of that mystery movie on TV last night. How did it ________ out?", "options": {"A": "go", "B": "make", "C": "bring", "D": "turn"}, "answer": "D", "hint": {"explanation": "Đáp án D. turn. Câu hoàn chỉnh: I didn't get to see the end of that mystery movie on TV last night. How did it turn out?", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống nghĩa nhau, hãy thử ghép từng đáp án vào câu hoàn chỉnh để kiểm tra độ tự nhiên."}}, {"id": 31, "question": "When you are finished using the computer, can you please ______ it off.", "options": {"A": "take", "B": "turn", "C": "do", "D": "go"}, "answer": "B", "hint": {"explanation": "Đáp án B. turn. Câu hoàn chỉnh: When you are finished using the computer, can you please turn it off.", "rule": "Đáp án đúng là cụm cố định hoặc lựa chọn nghĩa gần đúng nhất theo ngữ cảnh.", "trick": "Nếu các đáp án trông giống ng ", "options": {"A": "seeing", "B": "see", "C": "to see", "D": "saw"}, "answer": "A", "hint": {"explanation": "Đáp án A. seeing. Câu hoàn chỉnh: I am looking forward to seeing you.", "rule": "Trong look forward to, to là giới từ nên động từ theo sau phải ở dạng V-ing.", "trick": "Đừng nhầm to trong cụm này với to của infinitive; hãy nhớ nguyên cụm look forward to + V-ing."}}, {"id": 2, "question": "I arranged __________ them here.", "options": {"A": "to meet", "B": "meeting", "C": "met", "D": "meet"}, "answer": "A", "hint": {"explanation": "Đáp án A. to meet. Câu hoàn chỉnh: I arranged to meet them here.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 3, "question": "He urged us __________ faster.", "options": {"A": "working", "B": "work", "C": "to work", "D": "worked"}, "answer": "C", "hint": {"explanation": "Đáp án C. to work. Câu hoàn chỉnh: He urged us to work faster.", "rule": "Sau động từ này là tân ngữ + to-infinitive; nếu phủ định thì dùng not to V.", "trick": "Khi có người nhận tác động ngay sau động từ như tell, ask, advise, warn, encourage, remind, allow, hãy kiểm tra mẫu somebody + to V."}}, {"id": 4, "question": "I wish___________ the manager.", "options": {"A": "see", "B": "seeing", "C": "saw", "D": "to see"}, "answer": "D", "hint": {"explanation": "Đáp án D. to see. Câu hoàn chỉnh: I wish to see the manager.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 5, "question": "It’s no use ____________", "options": {"A": "wait", "B": "waiting", "C": "to wait", "D": "waited"}, "answer": "B", "hint": {"explanation": "Đáp án B. waiting. Câu hoàn chỉnh: It’s no use waiting.", "rule": "Sau cấu trúc it is no use, động từ phải ở dạng V-ing.", "trick": "It is no use + V-ing là mẫu cố định để nói làm gì đó là vô ích."}}, {"id": 6, "question": "He warned her ____________ the wire.", "options": {"A": "not touching", "B": "not touch", "C": "not to touch", "D": "to not touch"}, "answer": "C", "hint": {"explanation": "Đáp án C. not to touch. Câu hoàn chỉnh: He warned her not to touch the wire.", "rule": "Sau động từ này là tân ngữ + to-infinitive; nếu phủ định thì dùng not to V.", "trick": "Khi có người nhận tác động ngay sau động từ như tell, ask, advise, warn, encourage, remind, allow, hãy kiểm tra mẫu somebody + to V."}}, {"id": 7, "question": "Don’t forget ___________ the door before ____________ to bed.", "options": {"A": "to lock / going", "B": "locking / going", "C": "to lock / to go", "D": "lock / going"}, "answer": "A", "hint": {"explanation": "Đáp án A. to lock / going. Câu hoàn chỉnh: Don’t forget to lock the door before going to bed.", "rule": "Forget đi với to V khi nói việc cần nhớ phải làm, còn before là giới từ nên theo sau bởi V-ing.", "trick": "Hãy tách từng chỗ trống: forget to lock, nhưng before going to bed."}}, {"id": 8, "question": "My mother told me _____________ to anyone about it.", "options": {"A": "not speaking", "B": "not speak", "C": "to not speak", "D": "not to speak"}, "answer": "D", "hint": {"explanation": "Đáp án D. not to speak. Câu hoàn chỉnh: My mother told me not to speak to anyone about it.", "rule": "Sau động từ này là tân ngữ + to-infinitive; nếu phủ định thì dùng not to V.", "trick": "Khi có người nhận tác động ngay sau động từ như tell, ask, advise, warn, encourage, remind, allow, hãy kiểm tra mẫu somebody + to V."}}, {"id": 9, "question": "He tried _________ but she refused ____________.", "options": {"A": "to explain / listen", "B": "to explain / to listen", "C": "explain / listen", "D": "explaining / listening"}, "answer": "B", "hint": {"explanation": "
