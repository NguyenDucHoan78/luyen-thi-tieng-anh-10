: "Nếu sau as if/as though là một tình huống tưởng như đã xảy ra trước thời điểm nói, past perfect thường là lựa chọn tự nhiên."}}, {"id": 35, "question": "___ today, she would get home by Friday.", "options": {"A": "Would she leave", "B": "Was she leaving", "C": "Were she to leave", "D": "If she leaves"}, "answer": "C", "hint": {"explanation": "Đáp án C. Were she to leave. Câu hoàn chỉnh: Were she to leave today, she would get home by Friday.", "rule": "Câu điều kiện loại 2 diễn tả tình huống không có thật ở hiện tại: if + past simple, would + V.", "trick": "Nếu câu đang giả định một điều khác với thực tế hiện tại, thường là loại 2."}}, {"id": 36, "question": "“He’s a very brave man.” “Yes, I wish I ___ his courage.”", "options": {"A": "have", "B": "had", "C": "will have", "D": "would have"}, "answer": "B", "hint": {"explanation": "Đáp án B. had. Câu hoàn chỉnh: “He’s a very brave man.” “Yes, I wish I had his courage.”", "rule": "Sau wish, động từ thường lùi thì để diễn tả điều trái với thực tế hiện tại hoặc tương lai gần.", "trick": "Wish về hiện tại thường đi với past simple hoặc were cho mọi ngôi."}}, {"id": 37, "question": "___he___ hard last year, he would have lost the first prize.", "options": {"A": "Hadn’t – studied", "B": "Had- studied", "C": "Didn’t study", "D": "If – had studied"}, "answer": "A", "hint": {"explanation": "Đáp án A. Hadn’t – studied. Câu hoàn chỉnh: Hadn’t he studied hard last year, he would have lost the first prize.", "rule": "Đây là dạng đảo của câu điều kiện, lược bỏ if và đưa had lên đầu câu trong điều kiện loại 3.", "trick": "Khi thấy Had + subject + V3/ed ở đầu câu, hãy nhận ra đó là if-clause đảo ngữ của câu điều kiện loại 3."}}, {"id": 39, "question": "“I wish this city___ so noisy.” “I know. I wish we ___ in the countryside.”", "options": {"A": "isn’t – live", "B": "wasn’t – live", "C": "weren’t- live", "D": "weren’t – lived"}, "answer": "D", "hint": {"explanation": "Đáp án D. weren’t – lived. Câu hoàn chỉnh: “I wish this city weren’t so noisy.” “I know. I wish we lived in the countryside.”", "rule": "Sau wish, động từ thường lùi thì để diễn tả điều trái với thực tế hiện tại hoặc tương lai gần.", "trick": "Wish về hiện tại thường đi với past simple hoặc were cho mọi ngôi."}}, {"id": 40, "question": "He acted as though he___ for days.", "options": {"A": "not eat", "B": "hasn’t eaten", "C": "hadn’t eaten", "D": "didn’t eat"}, "answer": "C", "hint": {"explanation": "Đáp án C. hadn’t eaten. Câu hoàn chỉnh: He acted as though he hadn’t eaten for days.", "rule": "As if / as though thường đi với past perfect khi diễn tả cảm giác như một việc đã xảy ra trước đó, dù thực tế không chắc có thật.", "trick": "Nếu sau as if/as though là một tình huống tưởng như đã xảy ra trước thời điểm nói, past perfect thường là lựa chọn tự nhiên."}}, {"id": 41, "question": "We ___ the game if we’d had a few more minutes.", "options": {"A": "might have won", "B": "won", "C": "had won", "D": "will win"}, "answer": "A", "hint": {"explanation": "Đáp án A. might have won. Câu hoàn chỉnh: We might have won the game if we’d had a few more minutes.", "rule": "Đây là câu điều kiện loại 3, dùng để nói điều trái với thực tế trong quá khứ.", "trick": "Nhìn thấy had + V3/ed trong mệnh đề if, hãy nghĩ ngay đến would have + V3/ed ở mệnh đề chính."}}, {"id": 42, "question": "I ___ William with me if I had known you and he didn’t get along with each other.", "options": {"A": "hadn’t brought", "B": "didn’t bring", "C": "wouldn’t have brought", "D": "won’t bring"}, "answer": "C", "hint": {"explanation": "Đáp án C. wouldn’t have brought. Câu hoàn chỉnh: I wouldn’t have brought William with me if I had known you and he didn’t get along with each other.", "rule": "Đây là câu điều kiện loại 3, dùng để nói điều trái với thực tế trong quá khứ.", "trick": "Nhìn thấy had + V3/ed trong mệnh đề if, hãy nghĩ ngay đến would have + V3/ed ở mệnh đề chính."}}, {"id": 43, "question": "If you ___ to my advice in the first place, you wouldn’t be in this mess right now.", "options": {"A": "listen", "B": "will listen", "C": "had listened", "D": "listened"}, "answer": "C", "hint": {"explanation": "Đáp án C. had listened. Câu hoàn chỉnh: If you had listened to my advice in the first place, you wouldn’t be in this mess right now.", "rule": "Đây là câu điều kiện pha trộn: mệnh đề if nói về quá khứ, còn mệnh đề chính nói về kết quả ở hiện tại.", "trick": "Nếu điều kiện ở quá khứ nhưng hậu quả đang xét ở hiện tại như now, hãy nghĩ đến mixed conditional."}}, {"id": 44, "question": "___ interested in that subject, I would try to learn more about it.", "options": {"A": "Were I", "B": "Should I", "C": "I was", "D": "If I am"}, "answer": "A", "hint": {"explanation": "Đáp án A. Were I. Câu hoàn chỉnh: Were I interested in that subject, I would try to learn more about it.", "rule": "Câu điều kiện loại 2 diễn tả tình huống không có thật ở hiện tại: if + past simple, would + V.", "trick": "Nếu câu đang giả định một điều khác với thực tế hiện tại, thường là loại 2."}}, {"id": 45, "question": "I ___ you sooner had someone told me you were in the hospital.", "options": {"A": "would have visited", "B": "visited", "C": "had visited", "D": "visit"}, "answer": "A", "hint": {"explanation": "Đáp án A. would have visited. Câu hoàn chỉnh: I would have visited you sooner had someone told me you were in the hospital.", "rule": "Đây là câu điều kiện loại 3, dùng để nói điều trái với thực tế trong quá khứ.", "trick": "Nhìn thấy had + V3/ed trong mệnh đề if, hãy nghĩ ngay đến would have + V3/ed ở mệnh đề chính."}}, {"id": 46, "question": "___ then what I know today, I would have saved myself a lot of time and trouble over the years.", "options": {"A": "Had I known", "B": "Did I know", "C": "If I know", "D": "If I would know"}, "answer": "A", "hint": {"explanation": "Đáp án A. Had I known. Câu hoàn chỉnh: Had I known then what I know today, I would have saved myself a lot of time and trouble over the years.", "rule": "Đây là dạng đảo của câu điều kiện, lược bỏ if và đưa had lên đầu câu trong điều kiện loại 3.", "trick": "Khi thấy Had + subject + V3/ed ở đầu câu, hãy nhận ra đó là if-clause đảo ngữ của câu điều kiện loại 3."}}], "summary_hint": {"focus": "Câu điều kiện loại 1, 2, 3 và wish ở hiện tại/quá khứ.", "review": "Rà mẫu if + present, will; if + past, would; if + had V3, would have V3.", "tip": "Nhìn xem tình huống là thật, giả định hiện tại hay tiếc nuối quá khứ để chọn khung điều kiện đúng."}}, "cd5": {"title": "Chuyên đề 5: CÂU GIÁN TIẾP", "questions": [{"id": 1, "question": "Julia said that she ___________ there at noon.", "options": {"A": "is going to be", "B": "was going to be", "C": "will be", "D": "can be"}, "answer": "B", "hint": {"explanation": "Đáp án B. was going to be. Câu hoàn chỉnh: Julia said that she was going to be there at noon.", "rule": "Trong câu gián tiếp với reporting verb ở quá khứ, will thường lùi thành would hoặc be going to lùi thành was/were going to.", "trick": "Nếu câu trực tiếp nói về tương lai mà động từ dẫn ở quá khứ, hãy kiểm tra quy tắc will -> would, is going to -> was going to."}}, {"id": 2, "question": "He _______ that he was leaving way that afternoon.", "options": {"A": "told me", "B": "told to me", "C": "said me", "D": "says to me"}, "answer": "A", "hint": {"explanation": "Đáp án A. told me. Câu hoàn chỉnh: He told me that he was leaving way that afternoon.", "rule": "Tell cần có tân ngữ chỉ người nghe, khác với say thường không đi trực tiếp với tân ngữ người.", "trick": "Nhớ mẫu tell + somebody, còn say thường là say to somebody hoặc say that-clause."}}, {"id": 3, "question": "She said to me that she __________ to me the Sunday before.", "options": {"A": "wrote", "B": "has written", "C": "was writing", "D": "had writing"}, "answer": "D", "hint": {"explanation": "Đáp án D. had writing. Câu hoàn chỉnh: She said to me that she had writing to me the Sunday before.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 4, "question": "I _________ him to sell that old motorbike.", "options": {"A": "said to", "B": "suggested", "C": "advised", "D": "recommended"}, "answer": "C", "hint": {"explanation": "Đáp án C. advised. Câu hoàn chỉnh: I advised him to sell that old motorbike.", "rule": "Các động từ như advise, remind, ask thường đi với tân ngữ + to-infinitive trong lời tường thuật.", "trick": "Khi lời nói chuyển thành lời khuyên, nhắc nhở hay yêu cầu, hãy kiểm tra mẫu somebody + to V."}}, {"id": 5, "question": "My parents reminded me ________ the flowers.", "options": {"A": "remember to plant", "B": "not to plant to plant", "C": "to plant", "D": "planting"}, "answer": "C", "hint": {"explanation": "Đáp án C. to plant. Câu hoàn chỉnh: My parents reminded me to plant the flowers.", "rule": "Các động từ như advise, remind, ask thường đi với tân ngữ + to-infinitive trong lời tường thuật.", "trick": "Khi lời nói chuyển thành lời khuyên, nhắc nhở hay yêu cầu, hãy kiểm tra mẫu somebody + to V."}}, {"id": 6, "question": "I asked Martha ______ to enter law school.", "options": {"A": "are you planning", "B": "is she planning", "C": "was she planning", "D": "if she was planning"}, "answer": "D", "hint": {"explanation": "Đáp án D. if she was planning. Câu hoàn chỉnh: I asked Martha if she was planning to enter law school.", "rule": "Với câu hỏi yes/no ở lời gián tiếp, ta dùng if hoặc whether và đổi trật tự về câu kể.", "trick": "Sau asked, wondered, wanted to know..., hãy bỏ đảo trợ động từ và thêm if/whether nếu là câu hỏi yes/no."}}, {"id": 7, "question": "Nam wanted to know what time ________.", "options": {"A": "does the movie begin", "B": "did the movie begin", "C": "the movie begins", "D": "the movie began"}, "answer": "D", "hint": {"explanation": "Đáp án D. the movie began. Câu hoàn chỉnh: Nam wanted to know what time the movie began.", "rule": "Wh-question gián tiếp giữ từ để hỏi nhưng đổi trật tự về chủ ngữ + động từ như câu kể.", "trick": "Ở câu hỏi gián tiếp, không giữ dạng đảo của câu hỏi trực tiếp; hãy viết what/where/when/how + subject + verb."}}, {"id": 8, "question": "I wondered_______ the right thing.", "options": {"A": "whether I was doing", "B": "if I am doing", "C": "was I doing", "D": "am I doing"}, "answer": "A", "hint": {"explanation": "Đáp án A. whether I was doing. Câu hoàn chỉnh: I wondered whether I was doing the right thing.", "rule": "Với câu hỏi yes/no ở lời gián tiếp, ta dùng if hoặc whether và đổi trật tự về câu kể.", "trick": "Sau asked, wondered, wanted to know..., hãy bỏ đảo trợ động từ và thêm if/whether nếu là câu hỏi yes/no."}}, {"id": 9, "question": "The scientist said the earth ________ the sun.", "options": {"A": "goes around", "B": "is going around", "C": "went around", "D": "was going around"}, "answer": "A", "hint": {"explanation": "Đáp án A. goes around. Câu hoàn chỉnh: The scientist said the earth goes around the sun.", "rule": "Sự thật hiển nhiên, chân lý khoa học hoặc điều vẫn đúng ở hiện tại thường không cần lùi thì trong câu gián tiếp.", "trick": "Nếu nội dung là fact hoặc vẫn đúng ở hiện tại, có thể giữ present simple thay vì lùi thì máy móc."}}, {"id": 11, "question": "They said that they had been driving through the desert__________.", "options": {"A": "the previous day", "B": "yesterday", "C": "the last day", "D": "Sunday previously"}, "answer": "A", "hint": {"explanation": "Đáp án A. the previous day. Câu hoàn chỉnh: They said that they had been driving through the desert the previous day.", "rule": "Khi đổi sang câu gián tiếp, trạng ngữ thời gian và nơi chốn thường phải lùi theo ngôi nói như yesterday -> the previous day, here -> there.", "trick": "Đừng chỉ đổi thì; hãy soát cả các từ chỉ thời gian và nơi chốn như now, today, yesterday, tomorrow, here."}}, {"id": 12, "question": "He asked the children _________too much noise.", "options": {"A": "not to make", "B": "not making", "C": "don’t make", "D": "if they don’t make"}, "answer": "A", "hint": {"explanation": "Đáp án A. not to make. Câu hoàn chỉnh: He asked the children not to make too much noise.", "rule": "Khi tường thuật lời yêu cầu, khuyên bảo hay nhờ vả, ta thường dùng tân ngữ + to-infinitive; phủ định là not to V.", "trick": "Các động từ ask, tell, advise, remind thường kéo theo somebody + (not) to V trong câu gián tiếp."}}, {"id": 13, "question": "The man said that the days _________longer in summer.", "options": {"A": "will be", "B": "are", "C": "were", "D": "can be"}, "answer": "B", "hint": {"explanation": "Đáp án B. are. Câu hoàn chỉnh: The man said that the days are longer in summer.", "rule": "Sự thật hiển nhiên, chân lý khoa học hoặc điều vẫn đúng ở hiện tại thường không cần lùi thì trong câu gián tiếp.", "trick": "Nếu nội dung là fact hoặc vẫn đúng ở hiện tại, có thể giữ present simple thay vì lùi thì máy móc."}}, {"id": 14, "question": "The teacher said Columbus _________America in 1942.", "options": {"A": "discovered", "B": "had discovered", "C": "was discovering", "D": "would discover"}, "answer": "A", "hint": {"explanation": "Đáp án A. discovered. Câu hoàn chỉnh: The teacher said Columbus discovered America in 1942.", "rule": "Sự thật hiển nhiên, chân lý khoa học hoặc điều vẫn đúng ở hiện tại thường không cần lùi thì trong câu gián tiếp.", "trick": "Nếu nội dung là fact hoặc vẫn đúng ở hiện tại, có thể giữ present simple thay vì lùi thì máy móc."}}, {"id": 15, "question": "John said he _________ her since they ________ school.", "options": {"A": "hasn’t met – left", "B": "hadn’t met - had left", "C": "hadn’t met – left", "D": "didn’t meet – has left"}, "answer": "C", "hint": {"explanation": "Đáp án C. hadn’t met – left. Câu hoàn chỉnh: John said he hadn’t met her since they left school.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 16, "question": "The woman asked __________get lunch at school.", "options": {"A": "can the children", "B": "whether the children could", "C": "if the children can", "D": "could the children"}, "answer": "B", "hint": {"explanation": "Đáp án B. whether the children could. Câu hoàn chỉnh: The woman asked whether the children could get lunch at school.", "rule": "Với câu hỏi yes/no ở lời gián tiếp, ta dùng if hoặc whether và đổi trật tự về câu kể.", "trick": "Sau asked, wondered, wanted to know..., hãy bỏ đảo trợ động từ và thêm if/whether nếu là câu hỏi yes/no."}}, {"id": 17, "question": "Laura said that when she_________ to school, she saw an accident.", "options": {"A": "was walking", "B": "has walked", "C": "had been walking", "D": "has been walking"}, "answer": "C", "hint": {"explanation": "Đáp án C. had been walking. Câu hoàn chỉnh: Laura said that when she had been walking to school, she saw an accident.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 18, "question": "He asked, “Why didn’t she take the final exam?” - He asked why __________ the final exam.", "options": {"A": "she took", "B": "did she take", "C": "she hadn’t taken", "D": "she had taken"}, "answer": "C", "hint": {"explanation": "Đáp án C. she hadn’t taken. Câu hoàn chỉnh: He asked, “Why didn’t she take the final exam?” - He asked why she hadn’t taken the final exam.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 19, "question": "Ba said he__________ some good marks last semester.", "options": {"A": "gets", "B": "got", "C": "getting", "D": "have got"}, "answer": "B", "hint": {"explanation": "Đáp án B. got. Câu hoàn chỉnh: Ba said he got some good marks last semester.", "rule": "Nếu reporting verb ở quá khứ, hiện tại đơn hoặc quá khứ đơn trong câu trực tiếp thường lùi về quá khứ đơn trong lời gián tiếp khi không phải chân lý hiển nhiên.", "trick": "Với thông tin không còn mang tính luôn đúng, đừng quên lùi thì về past simple khi động từ dẫn ở quá khứ."}}, {"id": 20, "question": "They told their parents that they___________ their best to do the test.", "options": {"A": "try", "B": "will try", "C": "are trying", "D": "would try"}, "answer": "D", "hint": {"explanation": "Đáp án D. would try. Câu hoàn chỉnh: They told their parents that they would try their best to do the test.", "rule": "Trong câu gián tiếp với reporting verb ở quá khứ, will thường lùi thành would hoặc be going to lùi thành was/were going to.", "trick": "Nếu câu trực tiếp nói về tương lai mà động từ dẫn ở quá khứ, hãy kiểm tra quy tắc will -> would, is going to -> was going to."}}, {"id": 21, "question": "She asked me where I___________ from.", "options": {"A": "come", "B": "coming", "C": "to come", "D": "came"}, "answer": "D", "hint": {"explanation": "Đáp án D. came. Câu hoàn chỉnh: She asked me where I came from.", "rule": "Wh-question gián tiếp giữ từ để hỏi nhưng đổi trật tự về chủ ngữ + động từ như câu kể.", "trick": "Ở câu hỏi gián tiếp, không giữ dạng đảo của câu hỏi trực tiếp; hãy viết what/where/when/how + subject + verb."}}, {"id": 22, "question": "She_________ me whether I liked classical music or not.", "options": {"A": "ask", "B": "asks", "C": "asked", "D": "asking"}, "answer": "C", "hint": {"explanation": "Đáp án C. asked. Câu hoàn chỉnh: She asked me whether I liked classical music or not.", "rule": "Các động từ như advise, remind, ask thường đi với tân ngữ + to-infinitive trong lời tường thuật.", "trick": "Khi lời nói chuyển thành lời khuyên, nhắc nhở hay yêu cầu, hãy kiểm tra mẫu somebody + to V."}}, {"id": 23, "question": "He asked me who____________ the editor of that book.", "options": {"A": "was", "B": "were", "C": "is", "D": "has been"}, "answer": "A", "hint": {"explanation": "Đáp án A. was. Câu hoàn chỉnh: He asked me who was the editor of that book.", "rule": "Wh-question gián tiếp giữ từ để hỏi nhưng đổi trật tự về chủ ngữ + động từ như câu kể.", "trick": "Ở câu hỏi gián tiếp, không giữ dạng đảo của câu hỏi trực tiếp; hãy viết what/where/when/how + subject + verb."}}, {"id": 24, "question": "He wants to know whether I ___________ back tomorrow.", "options": {"A": "come", "B": "came", "C": "will come", "D": "would come"}, "answer": "C", "hint": {"explanation": "Đáp án C. will come. Câu hoàn chỉnh: He wants to know whether I will come back tomorrow.", "rule": "Khi động từ tường thuật ở hiện tại hoặc hiện tại hoàn thành, thường không cần lùi thì trong lời gián tiếp.", "trick": "Hãy nhìn động từ dẫn: nếu vẫn ở hiện tại như wants, wonder, have told, đừng tự động lùi thì."}}, {"id": 25, "question": "I wonder why he___________ love his family.", "options": {"A": "doesn’t", "B": "don’t", "C": "didn’t", "D": "hasn’t"}, "answer": "A", "hint": {"explanation": "Đáp án A. doesn’t. Câu hoàn chỉnh: I wonder why he doesn’t love his family.", "rule": "Khi động từ tường thuật ở hiện tại, hiện tại tiếp diễn hoặc hiện tại hoàn thành, thường không cần lùi thì trong câu gián tiếp.", "trick": "Hãy nhìn reporting verb trước tiên: wonder, says, tells, has said... ở hiện tại thường giữ nguyên thì của ý được tường thuật nếu ngữ cảnh không đổi."}}, {"id": 26, "question": "They asked me how many children___________.", "options": {"A": "I had", "B": "had I", "C": "I have", "D": "have I"}, "answer": "A", "hint": {"explanation": "Đáp án A. I had. Câu hoàn chỉnh: They asked me how many children I had.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 27, "question": "Thu said she had been___________ the day before.", "options": {"A": "here", "B": "there", "C": "in this place", "D": "where"}, "answer": "B", "hint": {"explanation": "Đáp án B. there. Câu hoàn chỉnh: Thu said she had been there the day before.", "rule": "Khi đổi sang câu gián tiếp, trạng ngữ thời gian và nơi chốn thường phải lùi theo ngôi nói như yesterday -> the previous day, here -> there.", "trick": "Đừng chỉ đổi thì; hãy soát cả các từ chỉ thời gian và nơi chốn như now, today, yesterday, tomorrow, here."}}, {"id": 28, "question": "The student said that the English test_______ the most difficult.", "options": {"A": "is", "B": "was", "C": "will be", "D": "have been"}, "answer": "B", "hint": {"explanation": "Đáp án B. was. Câu hoàn chỉnh: The student said that the English test was the most difficult.", "rule": "Wh-question gián tiếp giữ từ để hỏi nhưng đổi trật tự về chủ ngữ + động từ như câu kể.", "trick": "Ở câu hỏi gián tiếp, không giữ dạng đảo của câu hỏi trực tiếp; hãy viết what/where/when/how + subject + verb."}}, {"id": 29, "question": "He wanted to know _______ shopping during the previous morning.", "options": {"A": "if we had been going", "B": "that if we had been going", "C": "we were going", "D": "that we were going"}, "answer": "A", "hint": {"explanation": "Đáp án A. if we had been going. Câu hoàn chỉnh: He wanted to know if we had been going shopping during the previous morning.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 31, "question": "The mother asked her son _______.", "options": {"A": "where he has been", "B": "where he had been", "C": "where has he been", "D": "where had he been"}, "answer": "B", "hint": {"explanation": "Đáp án B. where he had been. Câu hoàn chỉnh: The mother asked her son where he had been.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 32, "question": "Martin asked me _______.", "options": {"A": "how is my father", "B": "how my father is", "C": "how was my father", "D": "how my father was"}, "answer": "D", "hint": {"explanation": "Đáp án D. how my father was. Câu hoàn chỉnh: Martin asked me how my father was.", "rule": "Wh-question gián tiếp giữ từ để hỏi nhưng đổi trật tự về chủ ngữ + động từ như câu kể.", "trick": "Ở câu hỏi gián tiếp, không giữ dạng đảo của câu hỏi trực tiếp; hãy viết what/where/when/how + subject + verb."}}, {"id": 35, "question": "He advised _______ too far.", "options": {"A": "her did not go", "B": "her do not go", "C": "her not to go", "D": "she did not go"}, "answer": "C", "hint": {"explanation": "Đáp án C. her not to go. Câu hoàn chỉnh: He advised her not to go too far.", "rule": "Khi tường thuật lời yêu cầu, khuyên bảo hay nhờ vả, ta thường dùng tân ngữ + to-infinitive; phủ định là not to V.", "trick": "Các động từ ask, tell, advise, remind thường kéo theo somebody + (not) to V trong câu gián tiếp."}}, {"id": 36, "question": "John often says he _______ boxing because it _______ a cruel sport.", "options": {"A": "does not like / is", "B": "did not like / were", "C": "not liked / had been", "D": "had not liked / was"}, "answer": "A", "hint": {"explanation": "Đáp án A. does not like / is. Câu hoàn chỉnh: John often says he does not like boxing because it is a cruel sport.", "rule": "Khi động từ tường thuật ở hiện tại, hiện tại tiếp diễn hoặc hiện tại hoàn thành, thường không cần lùi thì trong câu gián tiếp.", "trick": "Hãy nhìn reporting verb trước tiên: wonder, says, tells, has said... ở hiện tại thường giữ nguyên thì của ý được tường thuật nếu ngữ cảnh không đổi."}}, {"id": 37, "question": "Nancy asked me why I had not gone to New York the summer _______.", "options": {"A": "before", "B": "ago", "C": "last", "D": "previous"}, "answer": "A", "hint": {"explanation": "Đáp án A. before. Câu hoàn chỉnh: Nancy asked me why I had not gone to New York the summer before.", "rule": "Khi đổi sang câu gián tiếp, trạng ngữ thời gian và nơi chốn thường phải lùi theo ngôi nói như yesterday -> the previous day, here -> there.", "trick": "Đừng chỉ đổi thì; hãy soát cả các từ chỉ thời gian và nơi chốn như now, today, yesterday, tomorrow, here."}}, {"id": 38, "question": "He asked _______ him some money.", "options": {"A": "her to lend", "B": "she to lend", "C": "she has lent", "D": "she lends"}, "answer": "A", "hint": {"explanation": "Đáp án A. her to lend. Câu hoàn chỉnh: He asked her to lend him some money.", "rule": "Khi tường thuật lời yêu cầu, khuyên bảo hay nhờ vả, ta thường dùng tân ngữ + to-infinitive; phủ định là not to V.", "trick": "Các động từ ask, tell, advise, remind thường kéo theo somebody + (not) to V trong câu gián tiếp."}}, {"id": 39, "question": "Andrew told me that they _______ fish two _______ days.", "options": {"A": "have not eaten / ago", "B": "had not eaten / previous", "C": "did not eat / before", "D": "would not eat / last"}, "answer": "B", "hint": {"explanation": "Đáp án B. had not eaten / previous. Câu hoàn chỉnh: Andrew told me that they had not eaten fish two previous days.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 42, "question": "The mother told her son _______ so impolitely.", "options": {"A": "not behave", "B": "not to behave", "C": "not behaving", "D": "did not behave"}, "answer": "B", "hint": {"explanation": "Đáp án B. not to behave. Câu hoàn chỉnh: The mother told her son not to behave so impolitely.", "rule": "Khi tường thuật lời yêu cầu, khuyên bảo hay nhờ vả, ta thường dùng tân ngữ + to-infinitive; phủ định là not to V.", "trick": "Các động từ ask, tell, advise, remind thường kéo theo somebody + (not) to V trong câu gián tiếp."}}, {"id": 43, "question": "She said she _______ collect it for me after work.", "options": {"A": "would", "B": "did", "C": "must", "D": "had"}, "answer": "A", "hint": {"explanation": "Đáp án A. would. Câu hoàn chỉnh: She said she would collect it for me after work.", "rule": "Trong câu gián tiếp với reporting verb ở quá khứ, will thường lùi thành would hoặc be going to lùi thành was/were going to.", "trick": "Nếu câu trực tiếp nói về tương lai mà động từ dẫn ở quá khứ, hãy kiểm tra quy tắc will -> would, is going to -> was going to."}}, {"id": 44, "question": "She said I _______ an angel.", "options": {"A": "am", "B": "was", "C": "were", "D": "have been"}, "answer": "B", "hint": {"explanation": "Đáp án B. was. Câu hoàn chỉnh: She said I was an angel.", "rule": "Wh-question gián tiếp giữ từ để hỏi nhưng đổi trật tự về chủ ngữ + động từ như câu kể.", "trick": "Ở câu hỏi gián tiếp, không giữ dạng đảo của câu hỏi trực tiếp; hãy viết what/where/when/how + subject + verb."}}, {"id": 45, "question": "I have ever told you he _______ unreliable.", "options": {"A": "is", "B": "were", "C": "had been", "D": "would Be"}, "answer": "A", "hint": {"explanation": "Đáp án A. is. Câu hoàn chỉnh: I have ever told you he is unreliable.", "rule": "Sự thật hiển nhiên, chân lý khoa học hoặc điều vẫn đúng ở hiện tại thường không cần lùi thì trong câu gián tiếp.", "trick": "Nếu nội dung là fact hoặc vẫn đúng ở hiện tại, có thể giữ present simple thay vì lùi thì máy móc."}}, {"id": 46, "question": "I told him _______ the word to Jane somehow that I _______ to reach her during the early hours.", "options": {"A": "passing / will try", "B": "he will pass / tried", "C": "to pass / would be trying", "D": "he passed / have tried"}, "answer": "C", "hint": {"explanation": "Đáp án C. to pass / would be trying. Câu hoàn chỉnh: I told him to pass the word to Jane somehow that I would be trying to reach her during the early hours.", "rule": "Khi tường thuật lời yêu cầu, khuyên bảo hay nhờ vả, ta thường dùng tân ngữ + to-infinitive; phủ định là not to V.", "trick": "Các động từ ask, tell, advise, remind thường kéo theo somebody + (not) to V trong câu gián tiếp."}}, {"id": 47, "question": "Laura said she had worked on the assignment since _______.", "options": {"A": "yesterday", "B": "two days ago", "C": "the day before", "D": "the next day"}, "answer": "C", "hint": {"explanation": "Đáp án C. the day before. Câu hoàn chỉnh: Laura said she had worked on the assignment since the day before.", "rule": "Khi đổi sang câu gián tiếp, trạng ngữ thời gian và nơi chốn thường phải lùi theo ngôi nói như yesterday -> the previous day, here -> there.", "trick": "Đừng chỉ đổi thì; hãy soát cả các từ chỉ thời gian và nơi chốn như now, today, yesterday, tomorrow, here."}}, {"id": 48, "question": "John asked me _______ interested in any kind of sports.", "options": {"A": "if I were", "B": "if were I", "C": "if was I", "D": "if I was"}, "answer": "D", "hint": {"explanation": "Đáp án D. if I was. Câu hoàn chỉnh: John asked me if I was interested in any kind of sports.", "rule": "Với câu hỏi yes/no ở lời gián tiếp, ta dùng if hoặc whether và đổi trật tự về câu kể.", "trick": "Sau asked, wondered, wanted to know..., hãy bỏ đảo trợ động từ và thêm if/whether nếu là câu hỏi yes/no."}}, {"id": 49, "question": "John asked me _______ that film the night before.", "options": {"A": "that I saw", "B": "had I seen", "C": "if I had seen", "D": "if had I seen"}, "answer": "C", "hint": {"explanation": "Đáp án C. if I had seen. Câu hoàn chỉnh: John asked me if I had seen that film the night before.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}, {"id": 50, "question": "The guest told the host that _______.", "options": {"A": "I must go now", "B": "he must go now", "C": "he had to go now", "D": "he had to go then"}, "answer": "D", "hint": {"explanation": "Đáp án D. he had to go then. Câu hoàn chỉnh: The guest told the host that he had to go then.", "rule": "Khi lùi thì trong câu gián tiếp, quá khứ đơn thường đổi thành quá khứ hoàn thành nếu động từ tường thuật ở quá khứ.", "trick": "Hãy kiểm tra xem câu trực tiếp ban đầu ở thì nào rồi lùi lại một bậc khi chuyển sang indirect speech."}}], "summary_hint": {"focus": "Lùi thì, đổi đại từ và chọn đúng động từ tường thuật trong câu gián tiếp.", "review": "Ôn lại tell, say, advise, remind, suggest, ask và cấu trúc đi sau từng động từ.", "tip": "Khi đổi sang câu gián tiếp, hãy xử lý theo thứ tự: động từ tường thuật, đại từ, thời gian rồi mới đến thì."}}, "cd6": {"title": "Chuyên đề 6: MỆNH ĐỀ QUAN HỆ", "questions": [{"id": 1, "question": "The man ________ spoke to John is my brother.", "options": {"A": "whom", "B": "who", "C": "whose", "D": "which"}, "answer": "B", "hint": {"explanation": "Đáp án B. who. Câu hoàn chỉnh: The man who spoke to John is my brother.", "rule": "Who dùng để thay cho người khi từ quan hệ làm chủ ngữ trong mệnh đề quan hệ.", "trick": "Nếu danh từ đứng trước là người và phía sau thiếu chủ ngữ, who thường là đáp án đúng."}}, {"id": 2, "question": "I must thank the man from _____ I got the present.", "options": {"A": "who", "B": "whom", "C": "that", "D": "which"}, "answer": "B", "hint": {"explanation": "Đáp án B. whom. Câu hoàn chỉnh: I must thank the man from whom I got the present.", "rule": "Whom dùng cho người khi từ quan hệ làm tân ngữ, đặc biệt hay xuất hiện sau giới từ.", "trick": "Thấy giới từ đứng trước chỗ trống như from/about/to, hãy nghĩ đến whom hoặc which."}}, {"id": 4, "question": "He is the man _______ son is a doctor", "options": {"A": "whom", "B": "which", "C": "who", "D": "whose"}, "answer": "D", "hint": {"explanation": "Đáp án D. whose. Câu hoàn chỉnh: He is the man whose son is a doctor.", "rule": "Whose diễn tả quan hệ sở hữu giữa danh từ đứng trước và danh từ theo sau trong mệnh đề phụ.", "trick": "Nếu sau chỗ trống là một danh từ như son, car, house..., hãy kiểm tra whose."}}, {"id": 5, "question": "I come from a city _______ is located in the southern part of the country.", "options": {"A": "who", "B": "whom", "C": "that", "D": "whose"}, "answer": "C", "hint": {"explanation": "Đáp án C. that. Câu hoàn chỉnh: I come from a city that is located in the southern part of the country.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 6, "question": "The film about _____ they are talking is fantastic.", "options": {"A": "who", "B": "which", "C": "whom", "D": "that"}, "answer": "B", "hint": {"explanation": "Đáp án B. which. Câu hoàn chỉnh: The film about which they are talking is fantastic.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 7, "question": "That ’s the woman to _______ Jim used to be married.", "options": {"A": "who", "B": "whom", "C": "which", "D": "that"}, "answer": "B", "hint": {"explanation": "Đáp án B. whom. Câu hoàn chỉnh: That ’s the woman to whom Jim used to be married.", "rule": "Whom dùng cho người khi từ quan hệ làm tân ngữ, đặc biệt hay xuất hiện sau giới từ.", "trick": "Thấy giới từ đứng trước chỗ trống như from/about/to, hãy nghĩ đến whom hoặc which."}}, {"id": 8, "question": "The people ________ for the bus in the rain are getting well", "options": {"A": "waiting", "B": "to wait", "C": "waited", "D": "wait"}, "answer": "A", "hint": {"explanation": "Đáp án A. waiting. Câu hoàn chỉnh: The people waiting for the bus in the rain are getting well.", "rule": "Waiting là cụm phân từ hiện tại rút gọn từ mệnh đề quan hệ, bổ nghĩa cho people đang chờ xe buýt.", "trick": "Khi danh từ chủ động thực hiện hành động và mệnh đề quan hệ được rút gọn, thường dùng V-ing."}}, {"id": 9, "question": "He is the boy _______ is my best friend.", "options": {"A": "that", "B": "whom", "C": "who", "D": "A & C"}, "answer": "D", "hint": {"explanation": "Đáp án D. Cả A (that) và C (who) đều đúng trong câu này.", "rule": "Với mệnh đề quan hệ xác định chỉ người, cả who và that đều có thể dùng khi từ quan hệ làm chủ ngữ.", "trick": "Nếu danh từ trước chỗ trống là người và mệnh đề sau thiếu chủ ngữ, who và that thường cùng đúng."}}, {"id": 10, "question": "I have a message for people __________ by the traffic chaos.", "options": {"A": "to delay", "B": "who delay", "C": "delayed", "D": "who delaying"}, "answer": "C", "hint": {"explanation": "Đáp án C. delayed. Câu hoàn chỉnh: I have a message for people delayed by the traffic chaos.", "rule": "Delayed là phân từ II rút gọn từ mệnh đề bị động, chỉ những người bị ảnh hưởng bởi tình trạng giao thông.", "trick": "Nếu danh từ bị tác động bởi hành động chứ không tự làm hành động, hãy nghĩ đến V3/ed trong mệnh đề quan hệ rút gọn."}}, {"id": 11, "question": "I live in a pleasant room ____________ the garden.", "options": {"A": "to overlook", "B": "overlooking", "C": "overlooked", "D": "which overlooking"}, "answer": "B", "hint": {"explanation": "Đáp án B. overlooking. Câu hoàn chỉnh: I live in a pleasant room overlooking the garden.", "rule": "Overlooking là cụm phân từ hiện tại rút gọn, bổ nghĩa cho room với nghĩa căn phòng nhìn ra khu vườn.", "trick": "Danh từ chỉ vật vẫn có thể đi với V-ing khi cụm rút gọn mang nghĩa chủ động như a room overlooking the garden."}}, {"id": 12, "question": "Melanie was the only person __________ a letter of thanks.", "options": {"A": "wrote", "B": "written", "C": "to write", "D": "writing"}, "answer": "C", "hint": {"explanation": "Đáp án C. to write. Câu hoàn chỉnh: Melanie was the only person to write a letter of thanks.", "rule": "Sau the only, ta thường dùng to-infinitive để chỉ người duy nhất làm một việc nào đó.", "trick": "Các cụm the first, the last, the only thường kéo theo to V trong phần bổ nghĩa rút gọn."}}, {"id": 13, "question": "The pilot was the only man __________ after the crash.", "options": {"A": "was rescued", "B": "rescued", "C": "rescuing", "D": "to be rescued"}, "answer": "D", "hint": {"explanation": "Đáp án D. to be rescued. Câu hoàn chỉnh: The pilot was the only man to be rescued after the crash.", "rule": "Sau the only và khi mang nghĩa bị động, ta dùng to be + V3/ed để chỉ người duy nhất được cứu.", "trick": "Nếu cấu trúc là the only + noun và ý nghĩa là bị động, hãy kiểm tra mẫu to be + V3/ed."}}, {"id": 14, "question": "I met a lot of new people at the party ________ names I can’t remember.", "options": {"A": "whose", "B": "which", "C": "who", "D": "whom"}, "answer": "A", "hint": {"explanation": "Đáp án A. whose. Câu hoàn chỉnh: I met a lot of new people at the party whose names I can’t remember.", "rule": "Whose diễn tả quan hệ sở hữu giữa danh từ đứng trước và danh từ theo sau trong mệnh đề phụ.", "trick": "Nếu sau chỗ trống là một danh từ như son, car, house..., hãy kiểm tra whose."}}, {"id": 15, "question": "I talked to a woman __________ car had broken down on the way to the party.", "options": {"A": "which", "B": "who", "C": "whose", "D": "whom"}, "answer": "C", "hint": {"explanation": "Đáp án C. whose. Câu hoàn chỉnh: I talked to a woman whose car had broken down on the way to the party.", "rule": "Whose diễn tả quan hệ sở hữu giữa danh từ đứng trước và danh từ theo sau trong mệnh đề phụ.", "trick": "Nếu sau chỗ trống là một danh từ như son, car, house..., hãy kiểm tra whose."}}, {"id": 16, "question": "Vicky, __________ name was missed off the list, wasn’t very pleased.", "options": {"A": "which", "B": "whose", "C": "who", "D": "whom"}, "answer": "B", "hint": {"explanation": "Đáp án B. whose. Câu hoàn chỉnh: Vicky, whose name was missed off the list, wasn’t very pleased.", "rule": "Whose diễn tả quan hệ sở hữu giữa danh từ đứng trước và danh từ theo sau trong mệnh đề phụ.", "trick": "Nếu sau chỗ trống là một danh từ như son, car, house..., hãy kiểm tra whose."}}, {"id": 17, "question": "The picture was painted by Laura, ____________ is being shown in an exhibition.", "options": {"A": "which", "B": "whose", "C": "who", "D": "whom"}, "answer": "A", "hint": {"explanation": "Đáp án A. which. Câu hoàn chỉnh: The picture was painted by Laura, which is being shown in an exhibition.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 18, "question": "The concert ___________ we are looking forward is next Saturday.", "options": {"A": "which", "B": "that", "C": "whom", "D": "A & B"}, "answer": "D", "hint": {"explanation": "Đáp án D. Cả A (which) và B (that) đều đúng trong câu này.", "rule": "Với mệnh đề quan hệ xác định chỉ vật/sự việc, cả which và that đều có thể dùng tự nhiên.", "trick": "Khi danh từ trước chỗ trống là vật và không có dấu phẩy, which và that thường thay thế cho nhau được."}}, {"id": 19, "question": "I’ll see you near the post office ___________ we met the other day.", "options": {"A": "which", "B": "where", "C": "when", "D": "why"}, "answer": "B", "hint": {"explanation": "Đáp án B. where. Câu hoàn chỉnh: I’ll see you near the post office where we met the other day.", "rule": "Where thay cho một nơi chốn và tương đương với in/at which trong mệnh đề quan hệ.", "trick": "Nếu danh từ trước chỗ trống chỉ địa điểm như post office, Alaska, city, house..., where thường là lựa chọn tự nhiên."}}, {"id": 20, "question": "The success of shared holidays depends on __________ you shared it with.", "options": {"A": "whose", "B": "who", "C": "whom", "D": "which"}, "answer": "C", "hint": {"explanation": "Đáp án C. whom. Câu hoàn chỉnh: The success of shared holidays depends on whom you shared it with.", "rule": "Whom dùng cho người khi từ quan hệ làm tân ngữ, đặc biệt hay xuất hiện sau giới từ.", "trick": "Thấy giới từ đứng trước chỗ trống như from/about/to, hãy nghĩ đến whom hoặc which."}}, {"id": 21, "question": "The sun, ____ is one of millions of stars in the universe, provides us with heat an light.", "options": {"A": "which", "B": "that", "C": "who", "D": "A & B are correct"}, "answer": "A", "hint": {"explanation": "Đáp án A. which. Câu hoàn chỉnh: The sun, which is one of millions of stars in the universe, provides us with heat an light.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 22, "question": "Tom made a number of suggestions, most of ____ were very helpful.", "options": {"A": "them", "B": "which", "C": "that", "D": "B & C are correct"}, "answer": "B", "hint": {"explanation": "Đáp án B. which. Câu hoàn chỉnh: Tom made a number of suggestions, most of which were very helpful.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 23, "question": "Alaska, __________ my brother lives, is the largest state in the United States.", "options": {"A": "which", "B": "where", "C": "w ho", "D": "All are correct"}, "answer": "B", "hint": {"explanation": "Đáp án B. where. Câu hoàn chỉnh: Alaska, where my brother lives, is the largest state in the United States.", "rule": "Where thay cho một nơi chốn và tương đương với in/at which trong mệnh đề quan hệ.", "trick": "Nếu danh từ trước chỗ trống chỉ địa điểm như post office, Alaska, city, house..., where thường là lựa chọn tự nhiên."}}, {"id": 24, "question": "Tell me the reason ____________ you were absent yesterday.", "options": {"A": "where", "B": "when", "C": "why", "D": "that"}, "answer": "C", "hint": {"explanation": "Đáp án C. why. Câu hoàn chỉnh: Tell me the reason why you were absent yesterday.", "rule": "Why thường đi sau reason để nối mệnh đề giải thích lý do.", "trick": "Gặp the reason trước chỗ trống thì đáp án quen thuộc nhất thường là why."}}, {"id": 25, "question": "There was a time __________ dinosaurs dominated the earth.", "options": {"A": "which", "B": "when", "C": "that", "D": "A & B are correct"}, "answer": "B", "hint": {"explanation": "Đáp án B. when. Câu hoàn chỉnh: There was a time when dinosaurs dominated the earth.", "rule": "When thay cho mốc thời gian và tương đương với at/on which trong mệnh đề quan hệ.", "trick": "Nếu danh từ trước chỗ trống chỉ thời gian như time, day, year, summer..., hãy nghĩ đến when."}}, {"id": 26, "question": "The house in ___________ I was born and grew up was destroyed in an earthquake ten years ago.", "options": {"A": "which", "B": "where", "C": "that", "D": "All are correct"}, "answer": "A", "hint": {"explanation": "Đáp án A. which. Câu hoàn chỉnh: The house in which I was born and grew up was destroyed in an earthquake ten years ago.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 27, "question": "Summer is the time of the year _________ the weather is the hottest.", "options": {"A": "when", "B": "which", "C": "that", "D": "B & C are correct"}, "answer": "A", "hint": {"explanation": "Đáp án A. when. Câu hoàn chỉnh: Summer is the time of the year when the weather is the hottest.", "rule": "When thay cho mốc thời gian và tương đương với at/on which trong mệnh đề quan hệ.", "trick": "Nếu danh từ trước chỗ trống chỉ thời gian như time, day, year, summer..., hãy nghĩ đến when."}}, {"id": 28, "question": "Sunday is the day on ___________ I am least busy.", "options": {"A": "where", "B": "when", "C": "which", "D": "that"}, "answer": "C", "hint": {"explanation": "Đáp án C. which. Câu hoàn chỉnh: Sunday is the day on which I am least busy.", "rule": "Which/that thay cho vật hoặc sự việc; chọn theo loại danh từ đứng trước và cấu trúc của mệnh đề.", "trick": "Nếu danh từ đứng trước là vật, loại ngay who/whom/whose trước khi cân nhắc which/that."}}, {"id": 29, "question": "Do you know the man about ___________ they’re talking?", "options": {"A": "whom", "B": "whose", "C": "that", "D": "A & C are correct"}, "answer": "A", "hint": {"explanation": "Đáp án A. whom. Câu hoàn chỉnh: Do you know the man about whom they’re talking?", "rule": "Whom dùng cho người khi từ quan hệ làm tân ngữ, đặc biệt hay xuất hiện sau giới từ.", "trick": "Thấy giới từ đứng trước chỗ trống như from/about/to, hãy nghĩ đến whom hoặc which."}}, {"id": 30, "question": "What’s the name of the blonde girl ___________ just came in?", "options": {"A": "who", "B": "whose", "C": "whom", "D": "A & B are correct"}, "answer": "A", "hint": {"explanation": "Đáp án A. who. Câu hoàn chỉnh: What’s the name of the blonde girl who just came in?", "rule": "Who dùng để thay cho người khi từ quan hệ làm chủ ngữ trong mệnh đề quan hệ.", "trick": "Nếu danh từ đứng trước là người và phía sau thiếu chủ ngữ, who thường là đáp án đúng."}}, {"id": 31, "question": "I don’t like people ___________ lose their tempers easily.", "options": {"A": "who", "B": "whose", "C": "that", "D": "A & C are correct"}, "answer": "D", "hint": {"explanation": "Đáp án D. Cả A (who) và C (that) đều đúng trong câu này.", "rule": "Với mệnh đề quan hệ xác định chỉ người, cả who và that đều có thể dùng khi từ quan hệ làm chủ ngữ.", "trick": "Nếu danh từ trước chỗ trống là người và mệnh đề sau thiếu chủ ngữ, who và that thường cùng đúng."}}, {"id": 32, "question": "Mexico City, _________ ren in his family have received the best of anything.", "rule": "Because of / due to / owing to đi với cụm danh từ hoặc V-ing để chỉ nguyên nhân.", "trick": "Nếu ngay sau chỗ trống là danh từ/cụm danh từ, hãy ưu tiên because of hoặc due to thay vì because."}}, {"id": 20, "question": "___ she has a job, she is able to pay her rent and provide food for her family.", "options": {"A": "Since", "B": "Due to", "C": "Because of", "D": "Owing to"}, "answer": "A", "hint": {"explanation": "Đáp án A. Since. Câu hoàn chỉnh: Since she has a job, she is able to pay her rent and provide food for her family.", "rule": "Because of / due to / owing to đi với cụm danh từ hoặc V-ing để chỉ nguyên nhân.", "trick": "Nếu ngay sau chỗ trống là danh từ/cụm danh từ, hãy ưu tiên because of hoặc due to thay vì because."}}, {"id": 21, "question": "We didn’t go to France last summer______ we couldn’t afford to.", "options": {"A": "Owing to", "B": "due to", "C": "because", "D": "because of"}, "answer": "C", "hint": {"explanation": "Đáp án C. because. Câu hoàn chỉnh: We didn’t go to France last summer because we couldn’t afford to.", "rule": "Các liên từ này đi với một mệnh đề đầy đủ chủ ngữ và động từ để chỉ nguyên nhân.", "trick": "Sau because/since/as/now that phải là một clause, không phải chỉ là cụm danh từ."}}, {"id": 22, "question": "______the flight delay, they didn’t attend the conference.", "options": {"A": "Because", "B": "For", "C": "owing to", "D": "Because of"}, "answer": "D", "hint": {"explanation": "Đáp án D. Because of. Câu hoàn chỉnh: Because of the flight delay, they didn’t attend the conference.", "rule": "Because of / due to / owing to đi với cụm danh từ hoặc V-ing để chỉ nguyên nhân.", "trick": "Nếu ngay sau chỗ trống là danh từ/cụm danh từ, hãy ưu tiên because of hoặc due to thay vì because."}}, {"id": 23, "question": "The flight from New York to London was delayed ______ the heavy fog.", "options": {"A": "because of", "B": "because", "C": "since", "D": "due to the fact that"}, "answer": "A", "hint": {"explanation": "Đáp án A. because of. Câu hoàn chỉnh: The flight from New York to London was delayed because of the heavy fog.", "rule": "Because of / due to / owing to đi với cụm danh từ hoặc V-ing để chỉ nguyên nhân.", "trick": "Nếu ngay sau chỗ trống là danh từ/cụm danh từ, hãy ưu tiên because of hoặc due to thay vì because."}}, {"id": 24, "question": "Hoa was late _____ her car was broken down.", "options": {"A": "because of", "B": "due to", "C": "because", "D": "owing to"}, "answer": "C", "hint": {"explanation": "Đáp án C. because. Câu hoàn chỉnh: Hoa was late because her car was broken down.", "rule": "Các liên từ này đi với một mệnh đề đầy đủ chủ ngữ và động từ để chỉ nguyên nhân.", "trick": "Sau because/since/as/now that phải là một clause, không phải chỉ là cụm danh từ."}}], "summary_hint": {"focus": "Phân biệt mệnh đề chỉ nguyên nhân với cụm nguyên nhân.", "review": "Ôn because/since/as/now that đi với mệnh đề và because of/due to/owing to đi với cụm danh từ.", "tip": "Nhìn ngay sau chỗ trống: nếu là mệnh đề đủ chủ-vị thì chọn liên từ; nếu là cụm danh từ thì chọn giới từ/cụm giới từ."}}, "cd8": {"title": "Chuyên đề 8: MỆNH ĐỀ CHỈ KẾT QUẢ", "questions": [{"id": 1, "question": "My mouth is burning! This is ___________ spicy food that I don’t think I can finish it.", "options": {"A": "such", "B": "so", "C": "very", "D": "too"}, "answer": "A", "hint": {"explanation": "Đáp án A. such. Câu hoàn chỉnh: My mouth is burning! This is such spicy food that I don’t think I can finish it.", "rule": "Such thường đi với cụm danh từ: such + (a/an) + adjective + noun.", "trick": "Nếu phía sau còn có danh từ chính, hãy nghĩ đến such trước."}}, {"id": 2, "question": "Our village had ____________ money available for education that the school had to close.", "options": {"A": "so little", "B": "such little", "C": "so much", "D": "such much"}, "answer": "A", "hint": {"explanation": "Đáp án A. so little. Câu hoàn chỉnh: Our village had so little money available for education that the school had to close.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 3, "question": "Timmy spent __________ money buying movie tickets that he didn’t have enough left to buy a soft drink.", "options": {"A": "such", "B": "a lot of", "C": "too much", "D": "so much"}, "answer": "D", "hint": {"explanation": "Đáp án D. so much. Câu hoàn chỉnh: Timmy spent so much money buying movie tickets that he didn’t have enough left to buy a soft drink.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 4, "question": "It was _________that we went for a hike in the mountain.", "options": {"A": "so a nice day", "B": "such nice a day", "C": "so nice a day", "D": "such a day nice"}, "answer": "C", "hint": {"explanation": "Đáp án C. so nice a day. Câu hoàn chỉnh: It was so nice a day that we went for a hike in the mountain.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 5, "question": "There are not __________ jobs for all of us.", "options": {"A": "such", "B": "so", "C": "enough", "D": "too"}, "answer": "C", "hint": {"explanation": "Đáp án C. enough. Câu hoàn chỉnh: There are not enough jobs for all of us.", "rule": "Enough diễn tả mức độ vừa đủ và vị trí của nó phụ thuộc vào loại từ đi kèm.", "trick": "Enough thường đứng sau tính từ/trạng từ nhưng đứng trước danh từ."}}, {"id": 6, "question": "The T- shirt in the window was ________ expensive for me to buy.", "options": {"A": "too", "B": "enough", "C": "so", "D": "very"}, "answer": "A", "hint": {"explanation": "Đáp án A. too. Câu hoàn chỉnh: The T- shirt in the window was too expensive for me to buy.", "rule": er": "D", "hint": {"explanation": "Đáp án D. such a nice. Câu hoàn chỉnh: “The new mathematics teacher seems very pleasant” “Yes, he’s such a nice person”", "rule": "Such đi với cụm danh từ có mạo từ: such + a/an + adjective + singular noun.", "trick": "Nếu phía sau là danh từ đếm được số ít như person, story, girl, hãy nghĩ đến such a/an + adjective + noun."}}, {"id": 22, "question": "“I find the local newspapers to be __________ uninformative” “Yes, there is hardly any international news”", "options": {"A": "so", "B": "such", "C": "so much", "D": "such much"}, "answer": "A", "hint": {"explanation": "Đáp án A. so. Câu hoàn chỉnh: “I find the local newspapers to be so uninformative” “Yes, there is hardly any international news”", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 22, "question": "“Do you know why Eric failed her test? “I don’t know. She spent_________ time studying.”", "options": {"A": "so", "B": "such", "C": "so much", "D": "such much"}, "answer": "C", "hint": {"explanation": "Đáp án C. so much. Câu hoàn chỉnh: “Do you know why Eric failed her test? “I don’t know. She spent so much time studying.”", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 23, "question": "“Wendy is really tall for her age.” “She is ______tall that her friends make fun of her.”", "options": {"A": "so", "B": "as", "C": "that", "D": "much"}, "answer": "A", "hint": {"explanation": "Đáp án A. so. Câu hoàn chỉnh: “Wendy is really tall for her age.” “She is so tall that her friends make fun of her.”", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 24, "question": "“What is your opinion of the Smiths?” “They are _________ people”", "options": {"A": "such an interesting", "B": "so interesting a", "C": "so interesting", "D": "such interesting"}, "answer": "D", "hint": {"explanation": "Đáp án D. such interesting. Câu hoàn chỉnh: “What is your opinion of the Smiths?” “They are such interesting people”", "rule": "Such đi trực tiếp với danh từ số nhiều hoặc không đếm được khi không có mạo từ a/an.", "trick": "Nếu noun phía sau không đi với a/an như people, clothes, music, hãy ưu tiên such thay vì so."}}, {"id": 25, "question": "“Did you like the band last night?” “Yes, __________ I bought their records.”", "options": {"A": "so much that", "B": "such much", "C": "very much that", "D": "too much that"}, "answer": "A", "hint": {"explanation": "Đáp án A. so much that. Câu hoàn chỉnh: “Did you like the band last night?” “Yes, so much that I bought their records.”", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 26, "question": "“That is a beautiful dress Jean has on.” “She always wears ___________ clothes.”", "options": {"A": "such a lovely", "B": "so lovely", "C": "such lovely", "D": "so much lovely"}, "answer": "C", "hint": {"explanation": "Đáp án C. such lovely. Câu hoàn chỉnh: “That is a beautiful dress Jean has on.” “She always wears such lovely clothes.”", "rule": "Such đi trực tiếp với danh từ số nhiều hoặc không đếm được khi không có mạo từ a/an.", "trick": "Nếu noun phía sau không đi với a/an như people, clothes, music, hãy ưu tiên such thay vì so."}}, {"id": 27, "question": "“I enjoy this particular radio station.” “So do I. it always has _________ music.”", "options": {"A": "so good", "B": "such a good", "C": "such good", "D": "a so good"}, "answer": "C", "hint": {"explanation": "Đáp án C. such good. Câu hoàn chỉnh: “I enjoy this particular radio station.” “So do I. it always has such good music.”", "rule": "Such đi trực tiếp : "such interesting a", "C": "so an interesting", "D": "a so interesting"}, "answer": "A", "hint": {"explanation": "Đáp án A. such an interesting. Câu hoàn chỉnh: She told us such an interesting story that we all forgot about the time.", "rule": "Such đi với cụm danh từ có mạo từ: such + a/an + adjective + singular noun.", "trick": "Nếu phía sau là danh từ đếm được số ít như person, story, girl, hãy nghĩ đến such a/an + adjective + noun."}}, {"id": 32, "question": "I have never seen __________ people in one place.", "options": {"A": "so much", "B": "so many", "C": "so much of", "D": "this many of"}, "answer": "B", "hint": {"explanation": "Đáp án B. so many. Câu hoàn chỉnh: I have never seen so many people in one place.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 33, "question": "We have heard __________about you.", "options": {"A": "so many news", "B": "so much news", "C": "a lot news", "D": "few news"}, "answer": "B", "hint": {"explanation": "Đáp án B. so much news. Câu hoàn chỉnh: We have heard so much news about you.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 34, "question": "They were ______busy studying ______ they couldn’t go to the restaurant with us.", "options": {"A": "so – that", "B": "such – that", "C": "very – that", "D": "to - that"}, "answer": "A", "hint": {"explanation": "Đáp án A. so – that. Câu hoàn chỉnh: They were so busy studying that they couldn’t go to the restaurant with us.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 35, "question": "If a house plant is given __________ water, its lower leaves turn yellow.", "options": {"A": "too many", "B": "very many", "C": "very much", "D": "too much"}, "answer": "D", "hint": {"explanation": "Đáp án D. too much. Câu hoàn chỉnh: If a house plant is given too much water, its lower leaves turn yellow.", "rule": "Too nhấn mạnh mức độ vượt quá giới hạn, thường đi với to-infinitive phía sau.", "trick": "Nhìn xem câu có ý không thể làm gì đó vì quá ... hay không để nhận ra too."}}, {"id": 36, "question": "The runners are ______exhausted that none of them finished the race.", "options": {"A": "too", "B": "such", "C": "enough", "D": "so"}, "answer": "D", "hint": {"explanation": "Đáp án D. so. Câu hoàn chỉnh: The runners are so exhausted that none of them finished the race.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 37, "question": "So _________ people came that we had to cancel the meeting.", "options": {"A": "a few", "B": "many", "C": "little", "D": "few"}, "answer": "D", "hint": {"explanation": "Đáp án D. few. Câu hoàn chỉnh: So few people came that we had to cancel the meeting.", "rule": "So có thể đi với few hoặc little trong cấu trúc so few/little + noun + that để chỉ kết quả.", "trick": "Nếu phía sau so là danh từ đếm được số nhiều nhưng mang nghĩa ít đến mức..., so few ... that là mẫu rất hay gặp."}}, {"id": 38, "question": "The novel is _________ I have read many times.", "options": {"A": "so boring that", "B": "so interesting that", "C": "such an interesting that", "D": "so interesting that"}, "answer": "B", "hint": {"explanation": "Đáp án B. so interesting that. Câu hoàn chỉnh: The novel is so interesting that I have read many times.", "rule": "So đi với tính từ hoặc trạng từ: so + adjective/adverb + that-clause.", "trick": "Nếu sau chỗ trống là một tính từ/trạng từ chứ không phải danh từ, ưu tiên so."}}, {"id": 39, "question": "She is not ___________ to get married.", "options": {"A": "enough old", "B": "old enough", "C": let currentCD = null;
let userAnswers = {};
let submitted = false;

function renderList() {
  currentCD = null;
  submitted = false;
  const cdCount = Object.keys(DATA).filter(k => k.startsWith('cd')).length;
  document.getElementById('bcTitle').textContent = cdCount + ' Chuyên đề';
  let html = '<div class="cd-grid">';
  const cdKeys = Object.keys(DATA).filter(k => k.startsWith('cd')).sort((a,b) => {
    // Sort cd1, cd1b, cd2, cd2b ... properly
    const aMatch = a.match(/cd(\d+)([a-z]?)/);
    const bMatch = b.match(/cd(\d+)([a-z]?)/);
    if (aMatch[1] !== bMatch[1]) return parseInt(aMatch[1]) - parseInt(bMatch[1]);
    return aMatch[2].localeCompare(bMatch[2]);
  });
  cdKeys.forEach((key, idx) => {
    const cd = DATA[key];
    const result = SM.getResult('cd', key);
    const qcount = cd.questions.length;
    html += '<div class="cd-card" onclick="loadCD(\'' + key + '\')">' +
      '<div style="display:flex;align-items:center;gap:12px">' +
      '<div class="cd-num" style="font-size:20px">' + key.replace('cd','') + '</div>' +
      '<div><div class="cd-title">' + cd.title.split(': ').pop() + '</div>' +
      '<div class="cd-info">' + qcount + ' câu' +
      (result ? ' | Điểm: ' + result.score + '/' + result.total + ' ✅' : '') +
      '</div></div></div></div>';
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function loadCD(key) {
  currentCD = key;
  userAnswers = {};
  submitted = false;
  const cd = DATA[key];
  document.getElementById('bcTitle').innerHTML = '<a href="#" onclick="renderList();return false">' + Object.keys(DATA).filter(k => k.startsWith('cd')).length + ' Chuyên đề</a> › ' + cd.title;
  
  const hasSections = cd.sections && cd.sections.length > 0;
  let html = '<h2 style="margin-bottom:8px">' + cd.title + '</h2>';
  html += '<p style="color:var(--text-light);margin-bottom:16px">' + cd.questions.length + ' câu trắc nghiệm</p>';
  
  // Question nav
  html += '<div class="question-nav" id="qNav">';
  cd.questions.forEach((q, i) => {
    html += '<button class="q-nav-btn" id="qnav' + i + '" onclick="scrollTo(\'q' + i + '\')">' + (i+1) + '</button>';
  });
  html += '</div>';
  
  // Questions
  let currentSection = '';
  cd.questions.forEach((q, i) => {
    // Section dividers for CD1 (Ngữ âm)
    if (hasSections && q.section && q.section !== currentSection) {
      currentSection = q.section;
      if (currentSection === 'sound') html += '<div class="section-divider">I. Different sound — Chọn từ có phần gạch chân phát âm khác</div>';
      else if (currentSection === 'stress') html += '<div class="section-divider">II. Stress — Chọn từ có trọng âm khác</div>';
    }
    
    const isErrorFinding = q.type === 'error_finding';
    // Question stem: for CD1 ngữ âm don't show q.question (it just repeats options)
    const hasQuestionText = q.question && q.question.trim() && !q.section;
    
    if (isErrorFinding) {
      // Error finding: show sentence with underlined parts labeled (A)(B)(C)(D)
      const displayHtml = q.question_html || q.question || '';
      html += '<div class="question-box" id="q' + i + '">' +
        '<strong>Câu ' + (i+1) + '.</strong> <span style="font-style:italic;color:var(--text-light);font-size:13px">Tìm lỗi sai</span>' +
        '<div style="margin:10px 0;font-size:15px;line-height:1.8">' + displayHtml + '</div>' +
        '<div style="margin-top:8px">';
      ['A','B','C','D'].forEach(letter => {
        const optText = q.options && q.options[letter] || '';
        if (optText) {
          html += '<label class="quiz-option" id="opt' + i + letter + '" onclick="selectAnswer(' + i + ',\'' + letter + '\')">' +
            letter + '. <u>' + optText + '</u></label>';
        }
      });
      html += '</div></div>';
    } else {
      html += '<div class="question-box" id="q' + i + '">' +
        '<strong>Câu ' + (i+1) + '.</strong> ' + (hasQuestionText ? q.question : '') + '<div style="margin-top:8px">';
      
      // Use options_html (with <u> tags) if available, otherwise plain
      ['A','B','C','D'].forEach(letter => {
        const useHtml = q.options_html && q.options_html[letter];
        const optText = useHtml ? q.options_html[letter] : (q.options && q.options[letter] || '');
        if (optText) {
          html += '<label class="quiz-option" id="opt' + i + letter + '" onclick="selectAnswer(' + i + ',\'' + letter + '\')">' +
            letter + '. ' + optText + '</label>';
        }
      });
      html += '</div></div>';
    }
  });
  
  html += '<div style="text-align:center;margin:24px 0">' +
    '<button class="btn btn-primary" id="submitBtn" onclick="submitCD()" style="padding:14px 48px;font-size:16px">📩 NỘP BÀI</button>' +
    '</div><div id="resultArea"></div>';
  document.getElementById('mainContent').innerHTML = html;
}

function selectAnswer(qi, letter) {
  if (submitted) return;
  userAnswers[qi] = letter;
  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById('opt' + qi + l);
    if (el) el.classList.toggle('selected', l === letter);
  });
  const nav = document.getElementById('qnav' + qi);
  if (nav) nav.classList.add('answered');
}

function submitCD() {
  if (submitted) return;
  const cd = DATA[currentCD];
  const total = cd.questions.length;
  const answered = Object.keys(userAnswers).length;
  if (answered < total && !confirm('Bạn mới trả lời ' + answered + '/' + total + ' câu. Nộp bài?')) return;
  
  submitted = true;
  let score = 0;
  let hasAnswerKey = false;
  
  cd.questions.forEach((q, i) => {
    const box = document.getElementById('q' + i);
    const userAns = userAnswers[i];
    const correct = q.answer;
    
    if (correct) {
      hasAnswerKey = true;
      if (userAns === correct) {
        score++;
        box.classList.add('correct');
      } else {
        box.classList.add('wrong');
      }
      // Always highlight correct answer green
      const correctEl = document.getElementById('opt' + i + correct);
      if (correctEl) {
        correctEl.classList.add('correct');
        correctEl.insertAdjacentHTML('beforeend', ' <span class="correct-label">✓ Đáp án đúng</span>');
      }
      // Mark wrong selection red
      if (userAns && userAns !== correct) {
        const wrongEl = document.getElementById('opt' + i + userAns);
        if (wrongEl) wrongEl.classList.add('wrong');
      }
      // Show phonetic hint if available
      if (q.hint) {
        let hintHtml = '<div class="hint-box">';
        hintHtml += '<div class="hint-explain">🔊 ' + q.hint.explanation + '</div>';
        if (q.hint.ipa) {
          hintHtml += '<div class="hint-ipa">';
          ['A','B','C','D'].forEach(l => {
            const ipa = q.hint.ipa[l] || '';
            if (ipa) {
              const isCor = (l === q.answer);
              hintHtml += '<span class="' + (isCor ? 'ipa-correct' : '') + '">' + l + '. ' + (q.options[l] || '') + ' <b>' + ipa + '</b></span>';
            }
          });
          hintHtml += '</div>';
        }
        const hintId = 'cdhint' + i;
        hintHtml += '<span class="hint-toggle" onclick="var el=document.getElementById(\'' + hintId + '\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">📖 Xem quy tắc & mẹo</span>';
        hintHtml += '<div id="' + hintId + '" style="display:none">';
        if (q.hint.rule) hintHtml += '<div class="hint-rule">' + q.hint.rule + '</div>';
        if (q.hint.trick) hintHtml += '<div class="hint-trick">' + q.hint.trick + '</div>';
        hintHtml += '</div></div>';
        box.insertAdjacentHTML('beforeend', hintHtml);
      }
    } else {
      // No answer key — just show user's selection
      if (userAns) {
        const selEl = document.getElementById('opt' + i + userAns);
        if (selEl) selEl.classList.add('selected');
      }
      // Add note
      box.insertAdjacentHTML('beforeend', '<div style="margin-top:8px;font-size:12px;color:var(--text-light)">⚠️ Chưa có đáp án — tự đối chiếu tài liệu</div>');
    }
  });
  
  if (hasAnswerKey) {
    SM.saveResult('cd', currentCD, score, total, userAnswers);
  }

  let summaryHtml = '';
  if (cd.summary_hint) {
    summaryHtml =
      '<div class="hint-box" style="margin-top:16px;text-align:left">' +
      '<div class="hint-explain">📚 Gợi ý ôn tập sau khi làm xong phần này</div>' +
      '<div class="hint-rule"><b>Trọng tâm:</b> ' + cd.summary_hint.focus + '</div>' +
      '<div class="hint-rule"><b>Cần rà lại:</b> ' + cd.summary_hint.review + '</div>' +
      '<div class="hint-trick"><b>Mẹo ghi nhớ:</b> ' + cd.summary_hint.tip + '</div>' +
      '</div>';
  }
  
  const pct = hasAnswerKey ? Math.round(score/total*100) : 0;
  const cls = (!hasAnswerKey || pct >= 70) ? 'good' : 'bad';
  document.getElementById('resultArea').innerHTML =
    '<div class="result-box ' + cls + '">' +
    '<div style="font-size:48px">' + (hasAnswerKey ? (pct >= 70 ? '🎉' : '💪') : '📝') + '</div>' +
    '<div style="font-size:28px;font-weight:800;margin:8px 0">' + 
    (hasAnswerKey ? score + '/' + total : 'Đã nộp bài') + '</div>' +
    (hasAnswerKey ? '<div style="font-size:16px">(' + pct + '% đúng)</div>' : '<div style="font-size:14px;color:var(--text-light)">Cuộn lên xem đáp án đúng (nếu có)</div>') +
    '<div style="margin-top:16px">' +
    '<button class="btn btn-primary" onclick="loadCD(\'' + currentCD + '\')">🔄 Làm lại</button> ' +
    '<button class="btn btn-outline" onclick="renderList()">📋 Danh sách</button></div></div>' +
    summaryHtml;
  
  document.getElementById('submitBtn').style.display = 'none';
  scrollTo('resultArea');
}

renderList();
</script>
</body>
</html>
