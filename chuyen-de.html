 hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'technology' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 33, "question": "What will the relationship between computing and _______ bring us over the next 15 years?", "options": {"A": "science", "B": "scientific", "C": "scientifically", "D": "scientist"}, "answer": "A", "hint": {"explanation": "Đáp án A. science = khoa học.", "rule": "Câu hoàn chỉnh: What will the relationship between computing and science bring us over the next 15 years?\n'science' mang nghĩa 'khoa học', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. scientific; C. scientifically; D. scientist) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 34, "question": "Someone who is _______ thinks that bad things are going to happen.", "options": {"A": "optimistic", "B": "pessimistic", "C": "threatened", "D": "hopeful"}, "answer": "B", "hint": {"explanation": "Đáp án B. pessimistic = bi quan.", "rule": "Câu hoàn chỉnh: Someone who is pessimistic thinks that bad things are going to happen.\n'pessimistic' mang nghĩa 'bi quan', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. optimistic; C. threatened; D. hopeful) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 35, "question": "Domestic chores will no longer be a burden thanks to the inventions of laborsaving devices.", "options": {"A": "Official", "B": "Household", "C": "Schooling", "D": "Foreign"}, "answer": "B", "hint": {"explanation": "Đáp án B. Household = thuộc gia đình, nội trợ.", "rule": "Câu hoàn chỉnh: Domestic chores will no longer be a burden thanks to the inventions of laborsaving devices. -> Household\n'Household' mang nghĩa 'thuộc gia đình, nội trợ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. Official; C. Schooling; D. Foreign) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'Household' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 36, "question": "The idea of building a _______ with human intelligence is not only ambitious but also highly unconventional.", "options": {"A": "robot", "B": "corporation", "C": "line", "D": "road"}, "answer": "A", "hint": {"explanation": "Đáp án A. robot = rô-bốt.", "rule": "Câu hoàn chỉnh: The idea of building a robot with human intelligence is not only ambitious but also highly unconventional.\n'robot' mang nghĩa 'rô-bốt', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. corporation; C. line; D. road) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'robot' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 37, "question": "Washing machines, vacuum cleaners, and dish washers are labor _______ devices which help us do housework easily and quickly.", "options": {"A": "improving", "B": "making", "C": "saving", "D": "employing"}, "answer": "C", "hint": {"explanation": "Đáp án C. saving = tiết kiệm.", "rule": "Câu hoàn chỉnh: Washing machines, vacuum cleaners, and dish washers are labor saving devices which help us do housework easily and quickly.\n'saving' mang nghĩa 'tiết kiệm', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. improving; B. making; D. employing) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 38, "question": "Those companies were closed due to some seriously financial problems.", "options": {"A": "taken off", "B": "put away", "C": "wiped out", "D": "gone over"}, "answer": "C", "hint": {"explanation": "Đáp án C. wiped out = bị xóa sổ, bị loại bỏ hoàn toàn.", "rule": "Câu hoàn chỉnh: Those companies were closed due to some seriously financial problems. -> wiped out\n'wiped out' mang nghĩa 'bị xóa sổ, bị loại bỏ hoàn toàn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. taken off; B. put away; D. gone over) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: học nguyên cụm 'wiped out' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 39, "question": "The computer allows us to work fast and _______.", "options": {"A": "efficiently", "B": "differently", "C": "variously", "D": "freshly"}, "answer": "A", "hint": {"explanation": "Đáp án A. efficiently = một cách hiệu quả.", "rule": "Câu hoàn chỉnh: The computer allows us to work fast and efficiently.\n'efficiently' mang nghĩa 'một cách hiệu quả', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. differently; C. variously; D. freshly) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi -ly thường báo hiệu trạng từ, hay đứng sau động từ hoặc bổ nghĩa cho cả mệnh đề."}}, {"id": 40, "question": "Many people think that in some more years we will see the complete _______ of newspapers and magazines due to the Internet.", "options": {"A": "disappear", "B": "disappearance", "C": "appear", "D": "appearing"}, "answer": "B", "hint": {"explanation": "Đáp án B. disappearance = sự biến mất.", "rule": "Câu hoàn chỉnh: Many people think that in some more years we will see the complete disappearance of newspapers and magazines due to the Internet.\n'disappearance' mang nghĩa 'sự biến mất', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. disappear; C. appear; D. appearing) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 41, "question": "________ Sahara of ________ Africa is the world's largest desert.", "options": {"A": "Ø / the", "B": "The / Ø", "C": "A / an", "D": "The / an"}, "answer": "B", "hint": {"explanation": "Đáp án B. The / Ø = dùng the trước Sahara, không dùng mạo từ trước Africa.", "rule": "Đây là câu về mạo từ địa lý: dùng 'the' trước tên sa mạc (the Sahara) nhưng không dùng mạo từ trước tên châu lục (Africa).", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 42, "question": "The Sahara contains complex linear dunes that are ________ by almost 6 kilometers.", "options": {"A": "developed", "B": "separated", "C": "lay", "D": "located"}, "answer": "B", "hint": {"explanation": "Đáp án B. separated = bị tách ra.", "rule": "Câu hoàn chỉnh: The Sahara contains complex linear dunes that are separated by almost 6 kilometers.\n'separated' mang nghĩa 'bị tách ra', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. developed; C. lay; D. located) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 43, "question": "A _______ is a landscape or region that receives very little precipitation.", "options": {"A": "dune", "B": "desert", "C": "sandy area", "D": "shrub land"}, "answer": "B", "hint": {"explanation": "Đáp án B. desert = sa mạc.", "rule": "Câu hoàn chỉnh: A desert is a landscape or region that receives very little precipitation.\n'desert' mang nghĩa 'sa mạc', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. dune; C. sandy area; D. shrub land) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'desert' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 44, "question": "Deserts are often composed of ________ and rocky surfaces.", "options": {"A": "water", "B": "trees", "C": "oil", "D": "sand"}, "answer": "D", "hint": {"explanation": "Đáp án D. sand = cát.", "rule": "Câu hoàn chỉnh: Deserts are often composed of sand and rocky surfaces.\n'sand' mang nghĩa 'cát', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. water; B. trees; C. oil) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'sand' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 45, "question": "Three great stretches of sandy deserts almost circle the center of Australia.", "options": {"A": "dunes", "B": "valleys", "C": "lands", "D": "areas"}, "answer": "D", "hint": {"explanation": "Đáp án D. areas = vùng, khu vực.", "rule": "Câu hoàn chỉnh: Three great stretches of sandy deserts almost circle the center of Australia. -> areas\n'areas' mang nghĩa 'vùng, khu vực', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. dunes; B. valleys; C. lands) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'areas' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 46, "question": "Deserts are also classified by their ________ location and dominant weather pattern.", "options": {"A": "geographical", "B": "aerial", "C": "sandy", "D": "facial"}, "answer": "A", "hint": {"explanation": "Đáp án A. geographical = thuộc địa lý.", "rule": "Câu hoàn chỉnh: Deserts are also classified by their geographical location and dominant weather pattern.\n'geographical' mang nghĩa 'thuộc địa lý', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. aerial; C. sandy; D. facial) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 47, "question": "Thanks to pictures taken by satellites, deserts have not ________ a mystery in our time.", "options": {"A": "hidden", "B": "intended", "C": "remained", "D": "attained"}, "answer": "C", "hint": {"explanation": "Đáp án C. remained = vẫn còn, vẫn giữ.", "rule": "Câu hoàn chỉnh: Thanks to pictures taken by satellites, deserts have not remained a mystery in our time.\n'remained' mang nghĩa 'vẫn còn, vẫn giữ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. hidden; B. intended; D. attained) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 48, "question": "Can you make a ________ estimate of how much our expedition in the desert may be?", "options": {"A": "rough", "B": "roughly", "C": "roughing", "D": "roughen"}, "answer": "A", "hint": {"explanation": "Đáp án A. rough = sơ bộ.", "rule": "Câu hoàn chỉnh: Can you make a rough estimate of how much our expedition in the desert may be?\n'rough' mang nghĩa 'sơ bộ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. roughly; C. roughing; D. roughen) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'rough' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 49, "question": "After Peter had returned from the Sahara desert, he was confined to bed by a ________ disease.", "options": {"A": "mystery", "B": "mysterious", "C": "mysteriously", "D": "mysteriousness"}, "answer": "B", "hint": {"explanation": "Đáp án B. mysterious = bí ẩn.", "rule": "Câu hoàn chỉnh: After Peter had returned from the Sahara desert, he was confined to bed by a mysterious disease.\n'mysterious' mang nghĩa 'bí ẩn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. mystery; C. mysteriously; D. mysteriousness) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 50, "question": "In the northern part of the Simpson Desert, the dunes are separated by ________ of low, open shrubland.", "options": {"A": "streets", "B": "ways", "C": "corridors", "D": "lines"}, "answer": "C", "hint": {"explanation": "Đáp án C. corridors = hành lang; dải đất.", "rule": "Câu hoàn chỉnh: In the northern part of the Simpson Desert, the dunes are separated by corridors of low, open shrubland.\n'corridors' mang nghĩa 'hành lang; dải đất', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. streets; B. ways; D. lines) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'corridors' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 51, "question": "A ________ is a small raised area of ground, like a very small hill.", "options": {"A": "slope", "B": "hummock", "C": "dune", "D": "shrub"}, "answer": "B", "hint": {"explanation": "Đáp án B. hummock = gò đất nhỏ.", "rule": "Câu hoàn chỉnh: A hummock is a small raised area of ground, like a very small hill.\n'hummock' mang nghĩa 'gò đất nhỏ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. slope; C. dune; D. shrub) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'hummock' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 52, "question": "We used to climb up the crest of the hill to get a good view of the surroundings.", "options": {"A": "top", "B": "foot", "C": "middle", "D": "face"}, "answer": "A", "hint": {"explanation": "Đáp án A. top = đỉnh.", "rule": "Câu hoàn chỉnh: We used to climb up the crest of the hill to get a good view of the surroundings. -> top\n'top' mang nghĩa 'đỉnh', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. foot; C. middle; D. face) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'top' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}], "summary_hint": {"focus": "Từ vựng về kinh tế, cải cách, tương lai, công nghệ và sa mạc.", "review": "Nhóm từ theo chủ đề: economy, technology, desert. Học luôn collocation như carry out reforms, living standards, rough estimate.", "tip": "Các từ đuôi -tion, -ment, -ity thường là danh từ; -ly thường là trạng từ; -al thường là tính từ."}}, "cd16c": {"title": "Chuyên đề 16: TỪ VỰNG (phần 3)", "questions": [{"id": 53, "question": "Scientific ________ help to explore some places and discover more and more remote parts of the world.", "options": {"A": "survey", "B": "lead", "C": "research", "D": "expedition"}, "answer": "D", "hint": {"explanation": "Đáp án D. expedition = cuộc thám hiểm.", "rule": "Câu hoàn chỉnh: Scientific expedition help to explore some places and discover more and more remote parts of the world.\n'expedition' mang nghĩa 'cuộc thám hiểm', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. survey; B. lead; C. research) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 54, "question": "The wind that blows in the desert comes ________ far away waters.", "options": {"A": "for", "B": "with", "C": "in", "D": "from"}, "answer": "D", "hint": {"explanation": "Đáp án D. from = từ.", "rule": "Giới từ 'from' diễn tả nguồn gốc, xuất phát điểm. Trong các cụm come from, suffer from, differ from, đây là lựa chọn cố định.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 55, "question": "Some sand dunes may be over 200 meters ________ height.", "options": {"A": "with", "B": "at", "C": "on", "D": "in"}, "answer": "D", "hint": {"explanation": "Đáp án D. in = trong; ở; theo.", "rule": "Cấu trúc chuẩn là 'in height', 'in the body', 'in the region'... nên cần giới từ 'in' thay vì giới từ khác.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 56, "question": "Several ________ advanced countries have had plans to make desert more hospitable.", "options": {"A": "science", "B": "scientific", "C": "scientifically", "D": "scientist"}, "answer": "C", "hint": {"explanation": "Đáp án C. scientifically = một cách khoa học.", "rule": "Câu hoàn chỉnh: Several scientifically advanced countries have had plans to make desert more hospitable.\n'scientifically' mang nghĩa 'một cách khoa học', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. science; B. scientific; D. scientist) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi -ly thường báo hiệu trạng từ, hay đứng sau động từ hoặc bổ nghĩa cho cả mệnh đề."}}, {"id": 57, "question": "The desert biome includes the hottest places in the world because it absorbs more ________ from the sun than land in humid climates do.", "options": {"A": "heat", "B": "hot", "C": "hotly", "D": "heating"}, "answer": "A", "hint": {"explanation": "Đáp án A. heat = nhiệt, sức nóng.", "rule": "Câu hoàn chỉnh: The desert biome includes the hottest places in the world because it absorbs more heat from the sun than land in humid climates do.\n'heat' mang nghĩa 'nhiệt, sức nóng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. hot; C. hotly; D. heating) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'heat' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 58, "question": "A ________ is a large animal that lives in deserts and is used for carrying goods and people.", "options": {"A": "slope", "B": "dune", "C": "spinifex", "D": "camel"}, "answer": "D", "hint": {"explanation": "Đáp án D. camel = lạc đà.", "rule": "Câu hoàn chỉnh: A camel is a large animal that lives in deserts and is used for carrying goods and people.\n'camel' mang nghĩa 'lạc đà', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. slope; B. dune; C. spinifex) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'camel' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 59, "question": "The ________ of a cliff, or mountain, is a vertical surface or side of it.", "options": {"A": "face", "B": "border", "C": "crest", "D": "lake"}, "answer": "A", "hint": {"explanation": "Đáp án A. face = mặt; sườn dốc.", "rule": "Câu hoàn chỉnh: The face of a cliff, or mountain, is a vertical surface or side of it.\n'face' mang nghĩa 'mặt; sườn dốc', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. border; C. crest; D. lake) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'face' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 60, "question": "Most deserts are enormous sandy areas.", "options": {"A": "mysterious", "B": "narrow", "C": "immense", "D": "aerial"}, "answer": "C", "hint": {"explanation": "Đáp án C. immense = rất rộng lớn.", "rule": "Câu hoàn chỉnh: Most deserts are enormous sandy areas. -> immense\n'immense' mang nghĩa 'rất rộng lớn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. mysterious; B. narrow; D. aerial) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'immense' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 1, "question": "Birds aren’t all the same. There are many different _____.", "options": {"A": "categories", "B": "species", "C": "animals", "D": "plants"}, "answer": "B", "hint": {"explanation": "Đáp án B. species = loài.", "rule": "Câu hoàn chỉnh: Birds aren’t all the same. There are many different species.\n'species' mang nghĩa 'loài', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. categories; C. animals; D. plants) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'species' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 2, "question": "The rhinoceros will become ___ if people continue to hurt them.", "options": {"A": "extinct", "B": "instinct", "C": "distinct", "D": "extinction"}, "answer": "A", "hint": {"explanation": "Đáp án A. extinct = tuyệt chủng.", "rule": "Câu hoàn chỉnh: The rhinoceros will become extinct if people continue to hurt them.\n'extinct' mang nghĩa 'tuyệt chủng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. instinct; C. distinct; D. extinction) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'extinct' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 3, "question": "Thousands of species of animals and plants are ____ and the number decreases each year.", "options": {"A": "danger", "B": "dangerous", "C": "endanger", "D": "endangered"}, "answer": "D", "hint": {"explanation": "Đáp án D. endangered = bị đe dọa.", "rule": "Câu hoàn chỉnh: Thousands of species of animals and plants are endangered and the number decreases each year.\n'endangered' mang nghĩa 'bị đe dọa', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. danger; B. dangerous; C. endanger) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 4, "question": "If one species becomes extinct, the whole chain will be ___ seriously.", "options": {"A": "disappeared", "B": "killed", "C": "damaged", "D": "threatened"}, "answer": "C", "hint": {"explanation": "Đáp án C. damaged = bị hủy hoại, tổn hại.", "rule": "Câu hoàn chỉnh: If one species becomes extinct, the whole chain will be damaged seriously.\n'damaged' mang nghĩa 'bị hủy hoại, tổn hại', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. disappeared; B. killed; D. threatened) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 5, "question": "We depend on species diversity to provide food, clean air and water.", "options": {"A": "popularity", "B": "existence", "C": "development", "D": "variety"}, "answer": "D", "hint": {"explanation": "Đáp án D. variety = sự đa dạng.", "rule": "Câu hoàn chỉnh: We depend on species diversity to provide food, clean air and water. -> variety\n'variety' mang nghĩa 'sự đa dạng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. popularity; B. existence; C. development) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'variety' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 6, "question": "More than a billion people all over the world are under the threat of desert____.", "options": {"A": "increase", "B": "expansion", "C": "extension", "D": "development"}, "answer": "B", "hint": {"explanation": "Đáp án B. expansion = sự mở rộng.", "rule": "Câu hoàn chỉnh: More than a billion people all over the world are under the threat of desertexpansion.\n'expansion' mang nghĩa 'sự mở rộng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. increase; C. extension; D. development) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 7, "question": "Biologists have introduced a global list of endangered and vulnerable animal species.", "options": {"A": "rare and specious", "B": "small but invaluable", "C": "weak and easily hurt", "D": "strong and unusual"}, "answer": "C", "hint": {"explanation": "Đáp án C. weak and easily hurt = yếu và dễ bị tổn thương.", "rule": "Câu hoàn chỉnh: Biologists have introduced a global list of endangered and vulnerable animal species. -> weak and easily hurt\n'weak and easily hurt' mang nghĩa 'yếu và dễ bị tổn thương', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. rare and specious; B. small but invaluable; D. strong and unusual) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: học nguyên cụm 'weak and easily hurt' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 8, "question": "Government have passed laws to protect wildlife from commercial trade.", "options": {"A": "enabled", "B": "enforced", "C": "enacted", "D": "ensured"}, "answer": "C", "hint": {"explanation": "Đáp án C. enacted = ban hành.", "rule": "Câu hoàn chỉnh: Government have passed laws to protect wildlife from commercial trade. -> enacted\n'enacted' mang nghĩa 'ban hành', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. enabled; B. enforced; D. ensured) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 9, "question": "The government is now trying to protect gorilla to ensure their ____.", "options": {"A": "life", "B": "existence", "C": "survival", "D": "growth"}, "answer": "C", "hint": {"explanation": "Đáp án C. survival = sự sống còn.", "rule": "Câu hoàn chỉnh: The government is now trying to protect gorilla to ensure their survival.\n'survival' mang nghĩa 'sự sống còn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. life; B. existence; D. growth) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 10, "question": "Everyone is worried about the ___ of the rainforests.", "options": {"A": "destruction", "B": "protection", "C": "species", "D": "extinction"}, "answer": "A", "hint": {"explanation": "Đáp án A. destruction = sự tàn phá.", "rule": "Câu hoàn chỉnh: Everyone is worried about the destruction of the rainforests.\n'destruction' mang nghĩa 'sự tàn phá', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. protection; C. species; D. extinction) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 11, "question": "Without ___ all the resources necessary for life would be damaged, wasted or destroyed.", "options": {"A": "conversation", "B": "biodiversity", "C": "extinction", "D": "destruction"}, "answer": "B", "hint": {"explanation": "Đáp án B. biodiversity = đa dạng sinh học.", "rule": "Câu hoàn chỉnh: Without biodiversity all the resources necessary for life would be damaged, wasted or destroyed.\n'biodiversity' mang nghĩa 'đa dạng sinh học', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. conversation; C. extinction; D. destruction) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 12, "question": "Many people are interested in watching ___.", "options": {"A": "wildlife", "B": "wilds", "C": "wilderness", "D": "wildly"}, "answer": "A", "hint": {"explanation": "Đáp án A. wildlife = động vật hoang dã.", "rule": "Câu hoàn chỉnh: Many people are interested in watching wildlife.\n'wildlife' mang nghĩa 'động vật hoang dã', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. wilds; C. wilderness; D. wildly) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'wildlife' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 13, "question": "This species has nearly died out because its ___ is being destroyed.", "options": {"A": "environment", "B": "habitat", "C": "land", "D": "forest"}, "answer": "B", "hint": {"explanation": "Đáp án B. habitat = môi trường sống.", "rule": "Câu hoàn chỉnh: This species has nearly died out because its habitat is being destroyed.\n'habitat' mang nghĩa 'môi trường sống', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. environment; C. land; D. forest) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'habitat' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 14, "question": "The primary causes of species extinction are habitat destruction, commercial ___ and pollution.", "options": {"A": "exploit", "B": "exploiting", "C": "exploitation", "D": "exploitative"}, "answer": "C", "hint": {"explanation": "Đáp án C. exploitation = sự khai thác.", "rule": "Câu hoàn chỉnh: The primary causes of species extinction are habitat destruction, commercial exploitation and pollution.\n'exploitation' mang nghĩa 'sự khai thác', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. exploit; B. exploiting; D. exploitative) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 15, "question": "Toxic chemicals in the air and land have also driven many species to the ___ of extinction.", "options": {"A": "border", "B": "limit", "C": "verge", "D": "edge"}, "answer": "C", "hint": {"explanation": "Đáp án C. verge = bờ vực.", "rule": "Câu hoàn chỉnh: Toxic chemicals in the air and land have also driven many species to the verge of extinction.\n'verge' mang nghĩa 'bờ vực', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. border; B. limit; D. edge) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'verge' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 16, "question": "It is ___ to cross the sea in a small boat.", "options": {"A": "danger", "B": "endanger", "C": "dangerous", "D": "endangered"}, "answer": "C", "hint": {"explanation": "Đáp án C. dangerous = nguy hiểm.", "rule": "Câu hoàn chỉnh: It is dangerous to cross the sea in a small boat.\n'dangerous' mang nghĩa 'nguy hiểm', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. danger; B. endanger; D. endangered) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 17, "question": "Do you think plants and animals, however small or oversized, all contribute to the ____?", "options": {"A": "conversation", "B": "extinction", "C": "destruction", "D": "biodiversity"}, "answer": "D", "hint": {"explanation": "Đáp án D. biodiversity = đa dạng sinh học.", "rule": "Câu hoàn chỉnh: Do you think plants and animals, however small or oversized, all contribute to the biodiversity?\n'biodiversity' mang nghĩa 'đa dạng sinh học', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. conversation; B. extinction; C. destruction) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 18, "question": "Many African and Asian nations have set aside land called ___ to protect the habitats of elephants and other wild animals.", "options": {"A": "reserves", "B": "species", "C": "wildlife", "D": "forest"}, "answer": "A", "hint": {"explanation": "Đáp án A. reserves = khu bảo tồn.", "rule": "Câu hoàn chỉnh: Many African and Asian nations have set aside land called reserves to protect the habitats of elephants and other wild animals.\n'reserves' mang nghĩa 'khu bảo tồn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. species; C. wildlife; D. forest) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'reserves' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 19, "question": "Over 120 ___ of birds have been recorded in this national park.", "options": {"A": "species", "B": "diversity", "C": "animals", "D": "individuals"}, "answer": "A", "hint": {"explanation": "Đáp án A. species = loài.", "rule": "Câu hoàn chỉnh: Over 120 species of birds have been recorded in this national park.\n'species' mang nghĩa 'loài', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. diversity; C. animals; D. individuals) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'species' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 20, "question": "The mountain gorilla is on the verge of ___.", "options": {"A": "extinct", "B": "extraction", "C": "extinguish", "D": "extinction"}, "answer": "D", "hint": {"explanation": "Đáp án D. extinction = sự tuyệt chủng.", "rule": "Câu hoàn chỉnh: The mountain gorilla is on the verge of extinction.\n'extinction' mang nghĩa 'sự tuyệt chủng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. extinct; B. extraction; C. extinguish) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 21, "question": "Reviewers often ___ books as “hard to put down” or “hard to pick up again”.", "options": {"A": "describe", "B": "illustrate", "C": "classify", "D": "choose"}, "answer": "A", "hint": {"explanation": "Đáp án A. describe = mô tả.", "rule": "Câu hoàn chỉnh: Reviewers often describe books as “hard to put down” or “hard to pick up again”.\n'describe' mang nghĩa 'mô tả', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. illustrate; C. classify; D. choose) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'describe' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 22, "question": "Have you got any books on business methods or any similar ___?", "options": {"A": "subject", "B": "content", "C": "author", "D": "matter"}, "answer": "A", "hint": {"explanation": "Đáp án A. subject = chủ đề.", "rule": "Câu hoàn chỉnh: Have you got any books on business methods or any similar subject?\n'subject' mang nghĩa 'chủ đề', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. content; C. author; D. matter) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'subject' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 23, "question": "How are the books in this library___?", "options": {"A": "divided", "B": "named", "C": "gathered", "D": "classified"}, "answer": "D", "hint": {"explanation": "Đáp án D. classified = được phân loại.", "rule": "Câu hoàn chỉnh: How are the books in this libraryclassified?\n'classified' mang nghĩa 'được phân loại', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. divided; B. named; C. gathered) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 24, "question": "Robert’s new book will be ___ in August.", "options": {"A": "typed", "B": "published", "C": "broadcast", "D": "announced"}, "answer": "B", "hint": {"explanation": "Đáp án B. published = được xuất bản.", "rule": "Câu hoàn chỉnh: Robert’s new book will be published in August.\n'published' mang nghĩa 'được xuất bản', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. typed; C. broadcast; D. announced) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 25, "question": "I’m reading a Stephen King’s novel. It’s really exciting and I couldn’t ___.", "options": {"A": "get it off", "B": "put it down", "C": "take it on", "D": "look it up"}, "answer": "B", "hint": {"explanation": "Đáp án B. put it down = đặt nó xuống; ngữ cảnh sách là ngừng đọc.", "rule": "Trong ngữ cảnh đọc sách, 'couldn't put it down' nghĩa là hấp dẫn đến mức không thể ngừng đọc.", "trick": "Mẹo nhớ: học nguyên cụm 'put it down' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 26, "question": "Children tend to read ___ books that tell stories through pictures.", "options": {"A": "novel", "B": "fiction", "C": "science", "D": "comic"}, "answer": "D", "hint": {"explanation": "Đáp án D. comic = truyện tranh.", "rule": "Câu hoàn chỉnh: Children tend to read comic books that tell stories through pictures.\n'comic' mang nghĩa 'truyện tranh', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. novel; B. fiction; C. science) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 27, "question": "What kind of readers would you ___ this book?", "options": {"A": "advise", "B": "introduce", "C": "recommend", "D": "persuade"}, "answer": "C", "hint": {"explanation": "Đáp án C. recommend = giới thiệu, đề xuất.", "rule": "Câu hoàn chỉnh: What kind of readers would you recommend this book?\n'recommend' mang nghĩa 'giới thiệu, đề xuất', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. advise; B. introduce; D. persuade) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'recommend' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 28, "question": "Watching videos is becoming a popular form of ___.", "options": {"A": "entertain", "B": "entertainment", "C": "entertainer", "D": "entertaining"}, "answer": "B", "hint": {"explanation": "Đáp án B. entertainment = sự giải trí.", "rule": "Câu hoàn chỉnh: Watching videos is becoming a popular form of entertainment.\n'entertainment' mang nghĩa 'sự giải trí', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. entertain; C. entertainer; D. entertaining) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 29, "question": "After talking to Mary for ten minutes, George paused, waiting for her to ___the information.", "options": {"A": "taste", "B": "chew", "C": "swallow", "D": "digest"}, "answer": "D", "hint": {"explanation": "Đáp án D. digest = tiêu hóa; tiếp thu.", "rule": "Câu hoàn chỉnh: After talking to Mary for ten minutes, George paused, waiting for her to digestthe information.\n'digest' mang nghĩa 'tiêu hóa; tiếp thu', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. taste; B. chew; C. swallow) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'digest' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 30, "question": "Mr. Johnson was so busy that he only had enough time to ___ the report before he attended the meeting.", "options": {"A": "dip into", "B": "review", "C": "go over", "D": "pick up"}, "answer": "A", "hint": {"explanation": "Đáp án A. dip into = đọc lướt, xem qua.", "rule": "Dip into a book/report nghĩa là đọc lướt, xem nhanh một phần chứ không đọc kỹ toàn bộ.", "trick": "Mẹo nhớ: học nguyên cụm 'dip into' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 31, "question": "The book ___ me of the days I was in the army.", "options": {"A": "remembers", "B": "reminds", "C": "recalls", "D": "recollects"}, "answer": "B", "hint": {"explanation": "Đáp án B. reminds = gợi nhớ, nhắc nhớ.", "rule": "Câu hoàn chỉnh: The book reminds me of the days I was in the army.\n'reminds' mang nghĩa 'gợi nhớ, nhắc nhớ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. remembers; C. recalls; D. recollects) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'reminds' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 32, "question": "Most novels are divided into several___.", "options": {"A": "chapters", "B": "units", "C": "sections", "D": "passages"}, "answer": "A", "hint": {"explanation": "Đáp án A. chapters = các chương.", "rule": "Câu hoàn chỉnh: Most novels are divided into severalchapters.\n'chapters' mang nghĩa 'các chương', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. units; C. sections; D. passages) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'chapters' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 33, "question": "Cambridge University Press is the ___ of the book you are reading.", "options": {"A": "author", "B": "editor", "C": "printer", "D": "publisher"}, "answer": "D", "hint": {"explanation": "Đáp án D. publisher = nhà xuất bản.", "rule": "Câu hoàn chỉnh: Cambridge University Press is the publisher of the book you are reading.\n'publisher' mang nghĩa 'nhà xuất bản', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. author; B. editor; C. printer) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'publisher' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 34, "question": "Ernest Hemingway is one of my ___ American writers.", "options": {"A": "best", "B": "favourite", "C": "ideal", "D": "most popular"}, "answer": "B", "hint": {"explanation": "Đáp án B. favourite = yêu thích.", "rule": "Câu hoàn chỉnh: Ernest Hemingway is one of my favourite American writers.\n'favourite' mang nghĩa 'yêu thích', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. best; C. ideal; D. most popular) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'favourite' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 35, "question": "I’d like to ___ that book when you’ve read it.", "options": {"A": "borrow", "B": "hire", "C": "lend", "D": "loan"}, "answer": "A", "hint": {"explanation": "Đáp án A. borrow = mượn.", "rule": "Câu hoàn chỉnh: I’d like to borrow that book when you’ve read it.\n'borrow' mang nghĩa 'mượn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. hire; C. lend; D. loan) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'borrow' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 36, "question": "The plot of the novel was exciting, but I didn’t find the ___ very interesting.", "options": {"A": "characters", "B": "figures", "C": "people", "D": "persons"}, "answer": "A", "hint": {"explanation": "Đáp án A. characters = nhân vật.", "rule": "Câu hoàn chỉnh: The plot of the novel was exciting, but I didn’t find the characters very interesting.\n'characters' mang nghĩa 'nhân vật', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. figures; C. people; D. persons) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'characters' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 37, "question": "The dictionary is too expensive for me. I can’t ___ it.", "options": {"A": "spend", "B": "cost", "C": "afford", "D": "pay"}, "answer": "C", "hint": {"explanation": "Đáp án C. afford = có đủ khả năng chi trả.", "rule": "Câu hoàn chỉnh: The dictionary is too expensive for me. I can’t afford it.\n'afford' mang nghĩa 'có đủ khả năng chi trả', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. spend; B. cost; D. pay) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'afford' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 38, "question": "___ books tell stories from the author’s imagination.", "options": {"A": "Fiction", "B": "Picture", "C": "Coloured", "D": "Long"}, "answer": "A", "hint": {"explanation": "Đáp án A. Fiction = truyện hư cấu.", "rule": "Câu hoàn chỉnh: Fiction books tell stories from the author’s imagination.\n'Fiction' mang nghĩa 'truyện hư cấu', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. Picture; C. Coloured; D. Long) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 39, "question": "If you can’t find what you are looking for in the book, use the ___.", "options": {"A": "index", "B": "list", "C": "preface", "D": "directory"}, "answer": "A", "hint": {"explanation": "Đáp án A. index = mục tra cứu.", "rule": "Câu hoàn chỉnh: If you can’t find what you are looking for in the book, use the index.\n'index' mang nghĩa 'mục tra cứu', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. list; C. preface; D. directory) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'index' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 40, "question": "He’s a ___ boy. He knows everything from books never gives any logical and practical solutions.", "options": {"A": "bookworm", "B": "bookish", "C": "bookbinder", "D": "book-keeper"}, "answer": "B", "hint": {"explanation": "Đáp án B. bookish = thiên về sách vở, thiếu thực tế.", "rule": "Câu hoàn chỉnh: He’s a bookish boy. He knows everything from books never gives any logical and practical solutions.\n'bookish' mang nghĩa 'thiên về sách vở, thiếu thực tế', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. bookworm; C. bookbinder; D. book-keeper) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 41, "question": "Runners from eight different countries will be competing in the next ___.", "options": {"A": "race", "B": "place", "C": "record", "D": "course"}, "answer": "A", "hint": {"explanation": "Đáp án A. race = cuộc đua.", "rule": "Câu hoàn chỉnh: Runners from eight different countries will be competing in the next race.\n'race' mang nghĩa 'cuộc đua', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. place; C. record; D. course) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'race' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 42, "question": "It is common knowledge that sportmen ___ themselves in good form by regular swimming.", "options": {"A": "put", "B": "make", "C": "take", "D": "keep"}, "answer": "D", "hint": {"explanation": "Đáp án D. keep = giữ, duy trì.", "rule": "Câu hoàn chỉnh: It is common knowledge that sportmen keep themselves in good form by regular swimming.\n'keep' mang nghĩa 'giữ, duy trì', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. put; B. make; C. take) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'keep' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}], "summary_hint": {"focus": "Từ vựng về môi trường, động vật hoang dã, sách và thói quen đọc.", "review": "Chú ý các cặp dễ nhầm như extinct/extinction, habitat/wildlife, borrow/lend, publisher/author.", "tip": "Tạo flashcard theo cặp nghĩa gần và nghĩa dễ nhầm để nhớ lâu hơn."}}, "cd16d": {"title": "Chuyên đề 16: TỪ VỰNG (phần 4)", "questions": [{"id": 43, "question": "Synchronized swimming is a sport in which groups of swimmers ___ in patterns in the water to music.", "options": {"A": "go", "B": "move", "C": "dive", "D": "jump"}, "answer": "B", "hint": {"explanation": "Đáp án B. move = di chuyển.", "rule": "Câu hoàn chỉnh: Synchronized swimming is a sport in which groups of swimmers move in patterns in the water to music.\n'move' mang nghĩa 'di chuyển', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. go; C. dive; D. jump) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'move' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 44, "question": "Wind – surfing is a common term for two similar ___ sports: sail-surfing and sail- boarding.", "options": {"A": "water", "B": "wind", "C": "sail", "D": "board"}, "answer": "A", "hint": {"explanation": "Đáp án A. water = nước.", "rule": "Câu hoàn chỉnh: Wind – surfing is a common term for two similar water sports: sail-surfing and sail- boarding.\n'water' mang nghĩa 'nước', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. wind; C. sail; D. board) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'water' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 45, "question": "Volleyball, basketball, football are ___ games.", "options": {"A": "team", "B": "group", "C": "crowd", "D": "class"}, "answer": "A", "hint": {"explanation": "Đáp án A. team = đồng đội, theo đội.", "rule": "Câu hoàn chỉnh: Volleyball, basketball, football are team games.\n'team' mang nghĩa 'đồng đội, theo đội', nên khi điền vào câu sẽ hợp ngữ cảnh y flying 2,350 miles from Cairo to Calcutta.\n'broke' mang nghĩa 'phá, vượt (kỷ lục)', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. smashed; B. split; C. cracked) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'broke' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 49, "question": "One of the four period of time in which a game of American football is divided is known as a ___.", "options": {"A": "part", "B": "half", "C": "quarter", "D": "stage"}, "answer": "C", "hint": {"explanation": "Đáp án C. quarter = một hiệp 1/4.", "rule": "Câu hoàn chỉnh: One of the four period of time in which a game of American football is divided is known as a quarter.\n'quarter' mang nghĩa 'một hiệp 1/4', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. part; B. half; D. stage) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'quarter' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 50, "question": "The ___ is the official who controls the game in some sports.", "options": {"A": "player", "B": "captain", "C": "referee", "D": "defender"}, "answer": "C", "hint": {"explanation": "Đáp án C. referee = trọng tài.", "rule": "Câu hoàn chỉnh: The referee is the official who controls the game in some sports.\n'referee' mang nghĩa 'trọng tài', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. player; B. captain; D. defender) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'referee' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 51, "question": "In water polo, holding balls with two hands and punching ball are ___.", "options": {"A": "errors", "B": "fouls", "C": "faults", "D": "mi "lose", "C": "take", "D": "enjoy"}, "answer": "C", "hint": {"explanation": "Đáp án C. take = lấy; tham gia (trong take part).", "rule": "Câu hoàn chỉnh: Viet Nam is now willing to take part in the 24th SEA Games hosted by Thailand by the end of 2007 with a total of 958 athletes.\n'take' mang nghĩa 'lấy; tham gia (trong take part)', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. play; B. lose; D. enjoy) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'take' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 26, "question": "The International Committee Red Cross has about 12,000 staff members worldwide, about 800 of them working in its Geneva _______.", "options": {"A": "factories", "B": "companies", "C": "headquarters", "D": "buildings"}, "answer": "C", "hint": {"explanation": "Đáp án C. headquarters = trụ sở chính.", "rule": "Câu hoàn chỉnh: The International Committee Red Cross has about 12,000 staff members worldwide, about 800 of them working in its Geneva headquarters.\n'headquarters' mang nghĩa 'trụ sở chính', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. factories; B. companies; D. buildings) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'headquarters' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 27, "question": "The Red Cross on white background was the original protection _______ declared at the 1864 Geneva Convention.", "options": {"A": "poster", "B": "billboard", "C": "symbol", "D": "signal"}, "answer": "C", "hint": {"explanation": "Đáp án C. symbol = biểu tượng.", "rule": "Câu hoàn chỉnh: The Red Cross on white background was the original protection symbol declared at the 1864 Geneva Convention.\n'symbol' mang nghĩa 'biểu tượng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. poster; B. billboard; D. signal) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'symbol' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 28, "question": "The Red Cross is an international organization that helps people who are suffering from the results of war, diseases or _______.", "options": {"A": "victims", "B": "disasters", "C": "opportunities", "D": "conditions"}, "answer": "B", "hint": {"explanation": "Đáp án B. disasters = thảm họa.", "rule": "Câu hoàn chỉnh: The Red Cross is an international organization that helps people who are suffering from the results of war, diseases or disasters.\n'disasters' mang nghĩa 'thảm họa', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. victims; C. opportunities; D. conditions) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'disasters' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 29, "question": "Be careful! The tree is going to fall.", "options": {"A": "Look out", "B": "Look up", "C": "Look on", "D": "Look after"}, "answer": "A", "hint": {"explanation": "Đáp án A. Look out = coi chừng.", "rule": "Look out! là câu cảm thán mang nghĩa 'Coi chừng!'. Không dịch từng từ riêng lẻ vì đây là một cụm cố định.", "trick": "Mẹo nhớ: học nguyên cụm 'Look out' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 30, "question": "The organization was established in 1950 in the USA.", "options": {"A": "A. come around", "B": "set up", "C": "made out", "D": "put on"}, "answer": "B", "hint": {"explanation": "Đáp án B. set up = thành lập.", "rule": "Set up nghĩa là thành lập, thiết lập. Đây là phrasal verb quen thuộc trong chủ đề tổ chức, doanh nghiệp, tổ chức xã hội.", "trick": "Mẹo nhớ: học nguyên cụm 'set up' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 31, "question": "The International Red Cross helps people in need without any discrimination based on _______, race, religion, class or political opinions.", "options": {"A": "national", "B": "nationally", "C": "nationality", "D": "native"}, "answer": "C", "hint": {"explanation": "Đáp án C. nationality = quốc tịch.", "rule": "Câu hoàn chỉnh: The International Red Cross helps people in need without any discrimination based on nationality, race, religion, class or political opinions.\n'nationality' mang nghĩa 'quốc tịch', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. national; B. nationally; D. native) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 32, "question": "The International Committee of the Red Cross is a private _______ institution founded in 1863 in Geneva, Switzerland.", "options": {"A": "human", "B": "humanity", "C": "humanization", "D": "humanitarian"}, "answer": "D", "hint": {"explanation": "Đáp án D. humanitarian = nhân đạo.", "rule": "Câu hoàn chỉnh: The International Committee of the Red Cross is a private humanitarian institution founded in 1863 in Geneva, Switzerland.\n'humanitarian' mang nghĩa 'nhân đạo', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. human; B. humanity; C. humanization) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'humanitarian' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}], "summary_hint": {"focus": "Từ vựng về thể thao, SEA Games, luật thi đấu và tổ chức sự kiện.", "review": "Học theo ngữ cảnh thi đấu: referee, foul, medal standings, sportsmanship, defending title.", "tip": "Đọc tin thể thao tiếng Anh ngắn mỗi ngày để củng cố các cụm rất hay lặp trong đề."}}, "cd16e": {"title": "Chuyên đề 16: TỪ VỰNG (phần 5)", "questions": [{"id": 33, "question": "In former days, after the battles soldiers on both sides died or were left wounded on the field without any _______ attendance and basic care.", "options": {"A": "medicine", "B": "medical", "C": "medication", "D": "medically"}, "answer": "B", "hint": {"explanation": "Đáp án B. medical = thuộc y tế.", "rule": "Câu hoàn chỉnh: In former days, after the battles soldiers on both sides died or were left wounded on the field without any medical attendance and basic care.\n'medical' mang nghĩa 'thuộc y tế', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. medicine; C. medication; D. medically) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 34, "question": "The International Red Cross has about 97 million volunteers whose main _______ is to protect human life and health.", "options": {"A": "mission", "B": "experience", "C": "organization", "D": "rule"}, "answer": "A", "hint": {"explanation": "Đáp án A. mission = sứ mệnh, nhiệm vụ.", "rule": "Câu hoàn chỉnh: The International Red Cross has about 97 million volunteers whose main mission is to protect human life and health.\n'mission' mang nghĩa 'sứ mệnh, nhiệm vụ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. experience; C. organization; D. rule) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 35, "question": "The International Red Cross helps to ensure respect for the human being, and to prevent and relieve human _______.", "options": {"A": "protection", "B": "enjoyment", "C": "wealthy", "D": "sufferings"}, "answer": "D", "hint": {"explanation": "Đáp án D. sufferings = những đau khổ.", "rule": "Câu hoàn chỉnh: The International Red Cross helps to ensure respect for the human being, and to prevent and relieve human sufferings.\n'sufferings' mang nghĩa 'những đau khổ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. protection; B. enjoyment; C. wealthy) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'sufferings' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 36, "question": "An international medical conference initiated by Davison resulted in the birth of the League of Red Cross Societies in 1991.", "options": {"A": "started", "B": "helped", "C": "treated", "D": "dedicated"}, "answer": "A", "hint": {"explanation": "Đáp án A. started = bắt đầu, khởi xướng.", "rule": "Câu hoàn chỉnh: An international medical conference initiated by Davison resulted in the birth of the League of Red Cross Societies in 1991. -> started\n'started' mang nghĩa 'bắt đầu, khởi xướng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. helped; C. treated; D. dedicated) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 37, "question": "In times of war, the Red Cross is dedicated to reducing the sufferings of wounded soldiers, civilians, and prisoners of war.", "options": {"A": "mounted", "B": "excited", "C": "devoted", "D": "interested"}, "answer": "C", "hint": {"explanation": "Đáp án C. devoted = tận tâm, cống hiến.", "rule": "Câu hoàn chỉnh: In times of war, the Red Cross is dedicated to reducing the sufferings of wounded soldiers, civilians, and prisoners of war. -> devoted\n'devoted' mang nghĩa 'tận tâm, cống hiến', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. mounted; B. excited; D. interested) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 38, "question": "_______ is a situation in which large numbers of people have little or no food, and many of them die.", "options": {"A": "Disaster", "B": "Famine", "C": "Poverty", "D": "Flood."}, "answer": "B", "hint": {"explanation": "Đáp án B. Famine = nạn đói.", "rule": "Câu hoàn chỉnh: Famine is a situation in which large numbers of people have little or no food, and many of them die.\n'Famine' mang nghĩa 'nạn đói', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. Disaster; C. Poverty; D. Flood.) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'Famine' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 39, "question": "Within their home country, National Red Cross and Red Crescent societies assume the duties and responsibilities of a national relief society.", "options": {"A": "take on", "B": "get off", "C": "go about", "D": "put in"}, "answer": "A", "hint": {"explanation": "Đáp án A. take on = đảm nhận.", "rule": "Take on nghĩa là đảm nhận, gánh vác. Học luôn cả cụm thay vì học riêng từ take.", "trick": "Mẹo nhớ: học nguyên cụm 'take on' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 40, "question": "The bomb exploded in the garage; fortunately no one hurt.", "options": {"A": "put on", "B": "went off", "C": "got out", "D": "kept up"}, "answer": "B", "hint": {"explanation": "Đáp án B. went off = phát nổ.", "rule": "Go off với nghĩa 'nổ' thường dùng cho bomb, gun, alarm. Nghĩa này khác hẳn go off = hỏng hoặc rời đi trong ngữ cảnh khác.", "trick": "Mẹo nhớ: học nguyên cụm 'went off' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 41, "question": "She sustained severe head _______ ĩa 'bàng hoàng, sốc', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. dedicated; C. interested; D. excited) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 62, "question": "The mission statement of the International Movement as formulated in the \"Strategy 2010\" document of the Federation is to improve the lives of vulnerable people by mobilizing the power of humanity.", "options": {"A": "weak and unprotected", "B": "wealthy and famous", "C": "poor and disabled", "D": "deaf and mute"}, "answer": "A", "hint": {"explanation": "Đáp án A. weak and unprotected = yếu thế và không được bảo vệ.", "rule": "Câu hoàn chỉnh: The mission statement of the International Movement as formulated in the \"Strategy 2010\" document of the Federation is to improve the lives of vulnerable people by mobilizing the power of humanity. -> weak and unprotected\n'weak and unprotected' mang nghĩa 'yếu thế và không được bảo vệ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. wealthy and famous; C. poor and disabled; D. deaf and mute) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: học nguyên cụm 'weak and unprotected' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 63, "question": "The authority _______ down that building to build a supermarket.", "options": {"A": "knocked", "B": "came", "C": "went", "D": "fell"}, "answer": "A", "hint": {"explanation": "Đáp án A. knocked = đập sập, phá đổ.", "rule": "Câu hoàn chỉnh: The authority knocked down that building to build a supermarket.\n'knocked' mang nghĩa 'đập sập, phá đổ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. came; C. went; D. fell) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ lly for me by a French tailor.”", "rule": "Chủ ngữ nhận tác động của hành động nên đáp án đúng phải ở dạng bị động phù hợp với thì của câu.", "trick": "Hãy kiểm tra xem chủ ngữ là người/vật làm hành động hay là đối tượng chịu tác động."}}], "summary_hint": {"focus": "Phân biệt câu chủ động, bị động và cấu trúc nhờ/thuê ai làm gì.", "review": "Ôn lại be + V3/ed, thì của câu bị động và cấu trúc have/get something done.", "tip": "Nếu chủ ngữ không trực tiếp làm hành động mà chịu tác động, hãy nghĩ đến bị động trước."}}, "cd4": {"title": "Chuyên đề 4: CÂU ĐIỀU KIỆN", "questions": [{"id": 1, "question": "“Would you mind if we ___you by your first name?” “Not at all. Please call me Tom.”", "options": {"A": "called", "B": "call", "C": "calling", "D": "want to call"}, "answer": "A", "hint": {"explanation": "Đáp án A. called. Câu hoàn chỉnh: “Would you mind if we called you by your first name?” “Not at all. Please call me Tom.”", "rule": "Sau would you mind if, động từ trong mệnh đề if thường ở quá khứ đơn để câu lịch sự hơn.", "trick": "Một số mẫu lịch sự dùng past simple không phải để nói quá khứ mà để làm giảm sắc thái trực tiếp."}}, {"id": 2, "question": "She can’t get home ___ she has no money.", "options": {"A": "unless", "B": "if", "C": "until", "D": "without"}, "answer": "B", "hint": {"explanation": "Đáp án B. if. Câu hoàn chỉnh: She can’t get home if she has no money.", "rule": "If nối mệnh đề điều kiện với mệnh đề kết quả khi ý câu là nếu... thì..., còn unless mang nghĩa nếu không.", "trick": "Nếu câu cần nghĩa nguyên nhân điều kiện dương tính, chọn if; chỉ dùng unless khi nghĩa là nếu không."}}, {"id": 3, "question": "If I had known your new address, we ___to see you.", "options": {"A": "came", "B": "will come", "C": "would come", "D": "would have come"}, "answer": "D", "hint": {"explanation": "Đáp án D. would have come. Câu hoàn chỉnh: If I had known your new address, we would have come to see you.", "rule": "Đây là câu điều kiện loại 3, dùng để nói điều trái với
