 be able thường theo sau bởi to V."}}, {"id": 29, "question": "Would you like ___________ to the D&J coffee shop?", "options": {"A": "to go", "B": "going", "C": "went", "D": "goes"}, "answer": "A", "hint": {"explanation": "Đáp án A. to go. Câu hoàn chỉnh: Would you like to go to the D&J coffee shop?", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 30, "question": "Why hasn’t Sue arrived yet? She promised not ____________ late.", "options": {"A": "come", "B": "to come", "C": "coming", "D": "came"}, "answer": "B", "hint": {"explanation": "Đáp án B. to come. Câu hoàn chỉnh: Why hasn’t Sue arrived yet? She promised not to come late.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 32, "question": "The teacher encouraged ___________ the football team.", "options": {"A": "to join", "B": "joining", "C": "joined", "D": "join to"}, "answer": "A", "hint": {"explanation": "Đáp án A. to join. Câu hoàn chỉnh: The teacher encouraged to join the football team.", "rule": "Sau động từ này là tân ngữ + to-infinitive; nếu phủ định thì dùng not to V.", "trick": "Khi có người nhận tác động ngay sau động từ như tell, ask, advise, warn, encourage, remind, allow, hãy kiểm tra mẫu somebody + to V."}}, {"id": 33, "question": "He reminded me ___________ to give the book back to John.", "options": {"A": "not forget", "B": "not to forget", "C": "forgot", "D": "forgetting"}, "answer": "B", "hint": {"explanation": "Đáp án B. not to forget. Câu hoàn chỉnh: He reminded me not to forget to give the book back to John.", "rule": "Sau động từ này là tân ngữ + to-infinitive; nếu phủ định thì dùng not to V.", "trick": "Khi có người nhận tác động ngay sau động từ như tell, ask, advise, warn, encourage, remind, allow, hãy kiểm tra mẫu somebody + to V."}}, {"id": 34, "question": "My father has given up ____________.", "options": {"A": "smoke", "B": "smoked", "C": "smoking", "D": "to smoked"}, "answer": "C", "hint": {"explanation": "Đáp án C. smoking. Câu hoàn chỉnh: My father has given up smoking.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 35, "question": "\"All right, I’ll wait for you,\" she agreed ___________ for me.", "options": {"A": "to wait", "B": "not to wait", "C": "waiting", "D": "wait to"}, "answer": "A", "hint": {"explanation": "Đáp án A. to wait. Câu hoàn chỉnh: \"All right, I’ll wait for you,\" she agreed to wait for me.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 36, "question": "I don’t enjoy ___________ letters.", "options": {"A": "writing", "B": "to write", "C": "have be written", "D": "wrote"}, "answer": "A", "hint": {"explanation": "Đáp án A. writing. Câu hoàn chỉnh: I don’t enjoy writing letters.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 37, "question": "I considered ______________ the job but in the end I decided against doing it.", "options": {"A": "to take", "B": "taking", "C": "to be take", "D": "took"}, "answer": "B", "hint": {"explanation": "Đáp án B. taking. Câu hoàn chỉnh: I considered taking the job but in the end I decided against doing it.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 38, "question": "The boy insisted on ______________ a break after lunch.", "options": {"A": "having", "B": "to have", "C": "not to have", "D": "have"}, "answer": "A", "hint": {"explanation": "Đáp án A. having. Câu hoàn chỉnh: The boy insisted on having a break after lunch.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 39, "question": "The woman looked forward to __________ his mother again.", "options": {"A": "meet", "B": "to meet", "C": "meeting", "D": "met"}, "answer": "C", "hint": {"explanation": "Đáp án C. meeting. Câu hoàn chỉnh: The woman looked forward to meeting his mother again.", "rule": "Trong look forward to, to là giới từ nên động từ theo sau phải ở dạng V-ing.", "trick": "Đừng nhầm to trong cụm này với to của infinitive; hãy nhớ nguyên cụm look forward to + V-ing."}}, {"id": 40, "question": "The boy accused his friend of ___________ stolen his bicycle.", "options": {"A": "have", "B": "to have", "C": "not to have", "D": "having"}, "answer": "D", "hint": {"explanation": "Đáp án D. having. Câu hoàn chỉnh: The boy accused his friend of having stolen his bicycle.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 41, "question": "Her mother prevented her from ___________ a mobile phone.", "options": {"A": "use", "B": "to use", "C": "using", "D": "not to use"}, "answer": "C", "hint": {"explanation": "Đáp án C. using. Câu hoàn chỉnh: Her mother prevented her from using a mobile phone.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 42, "question": "He thanked her for __________ him some money.", "options": {"A": "lend", "B": "to lend", "C": "lending", "D": "not lend"}, "answer": "C", "hint": {"explanation": "Đáp án C. lending. Câu hoàn chỉnh: He thanked her for lending him some money.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 44, "question": "Her mother prevented her from ____________ out alone at night.", "options": {"A": "go", "B": "going", "C": "to go", "D": "not to go"}, "answer": "B", "hint": {"explanation": "Đáp án B. going. Câu hoàn chỉnh: Her mother prevented her from going out alone at night.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 45, "question": "His brother agreed ____________ a car.", "options": {"A": "to buy", "B": "buy", "C": "buying", "D": "will buy"}, "answer": "A", "hint": {"explanation": "Đáp án A. to buy. Câu hoàn chỉnh: His brother agreed to buy a car.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 46, "question": "Most of my friends enjoy ______________ football on television.", "options": {"A": "watch", "B": "to watch", "C": "watching", "D": "watched"}, "answer": "C", "hint": {"explanation": "Đáp án C. watching. Câu hoàn chỉnh: Most of my friends enjoy watching football on television.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}, {"id": 47, "question": "Anne would rather ___________ than anything else.", "options": {"A": "study", "B": "studying", "C": "to study", "D": "studied"}, "answer": "A", "hint": {"explanation": "Đáp án A. study. Câu hoàn chỉnh: Anne would rather study than anything else.", "rule": "Sau make, let và would rather, động từ theo sau thường ở dạng nguyên mẫu không to.", "trick": "Nhớ ba mẫu rất hay gặp: make somebody do, let somebody do, would rather do."}}, {"id": 48, "question": "Tracey is out of work. She hasn’t been able _____________ a job yet.", "options": {"A": "find", "B": "to find", "C": "finding", "D": "found"}, "answer": "B", "hint": {"explanation": "Đáp án B. to find. Câu hoàn chỉnh: Tracey is out of work. She hasn’t been able to find a job yet.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 49, "question": "Tracey doesn’t want___________ her friends and family.", "options": {"A": "leave", "B": "leaving", "C": "left", "D": "to leave"}, "answer": "D", "hint": {"explanation": "Đáp án D. to leave. Câu hoàn chỉnh: Tracey doesn’t want to leave her friends and family.", "rule": "Động từ hoặc cấu trúc này đi với to-infinitive để diễn tả ý định, sự đồng ý, khả năng hay mục tiêu cần đạt tới.", "trick": "Các động từ như arrange, decide, want, offer, agree, promise, manage, refuse, would like, be able thường theo sau bởi to V."}}, {"id": 50, "question": "I am very tired of ______________ to her complaints day after day.", "options": {"A": "listen", "B": "listening", "C": "to listen", "D": "listened"}, "answer": "B", "hint": {"explanation": "Đáp án B. listening. Câu hoàn chỉnh: I am very tired of listening to her complaints day after day.", "rule": "Sau động từ hoặc giới từ trong cấu trúc này, động từ theo sau phải ở dạng V-ing.", "trick": "Các cụm như enjoy, suggest, consider, give up, insist on, prevent ... from, thank ... for, be tired of thường kéo theo V-ing."}}], "summary_hint": {"focus": "Động từ theo sau bởi to-V, V-ing hoặc bare infinitive.", "review": "Rà các cấu trúc cố định như look forward to V-ing, arrange to V, urge somebody to V, it's no use V-ing.", "tip": "Hãy học động từ đi cùng mẫu nào như một cụm cố định, không tách riêng động từ khỏi bổ ngữ."}}, "cd15": {"title": "Chuyên đề 15: TÌM VÀ SỬA LỖI SAI", "questions": [{"id": 1, "question": "All of the homework given by our teachers are useful to every student.", "question_html": "All of the homework <u><b>(A)</b> given</u> by our teachers <u><b>(B)</b> are</u> <u><b>(C)</b> useful to</u> every <u><b>(D)</b> student</u>.", "options": {"A": "given", "B": "are", "C": "useful to", "D": "student"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là are; nên sửa thành is.", "rule": "Homework là danh từ không đếm được nên đi với động từ số ít: is, không phải are.", "trick": "Các danh từ như homework, information, advice thường là uncountable nouns và cần động từ số ít."}}, {"id": 2, "question": "When Helen was a child, she has worked in a factory for more than three years.", "question_html": "When Helen <u><b>(A)</b> was</u> a child, she <u><b>(B)</b> has worked</u> in a factory <u><b>(C)</b> for</u> <u><b>(D)</b> more than</u> three years.", "options": {"A": "was", "B": "has worked", "C": "for", "D": "more than"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là has worked; nên sửa thành worked.", "rule": "Mốc thời gian quá khứ đã kết thúc không đi với hiện tại hoàn thành.", "trick": "Nếu câu có when + mốc quá khứ rõ ràng, hãy cảnh giác với hiện tại hoàn thành."}}, {"id": 3, "question": "The tourist guide only has a twenty-dollars bill with her when she landed at the airport.", "question_html": "The tourist guide only <u><b>(A)</b> has</u> a <u><b>(B)</b> twenty-dollars bill</u> with her <u><b>(C)</b> when</u> she landed <u><b>(D)</b> at</u> the airport.", "options": {"A": "has", "B": "twenty-dollars bill", "C": "when", "D": "at"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là twenty-dollars bill; nên sửa thành twenty-dollar bill.", "rule": "Trong cụm bổ nghĩa trước danh từ, số + danh từ giữ dạng số ít: a twenty-dollar bill.", "trick": "Danh từ trong compound adjective thường không thêm -s."}}, {"id": 4, "question": "After Mrs. Wang had returned to her house from work, she was cooking dinner.", "question_html": "After Mrs. Wang <u><b>(A)</b> had returned</u> <u><b>(B)</b> to her house</u> <u><b>(C)</b> from work</u>, she <u><b>(D)</b> was cooking</u> dinner.", "options": {"A": "had returned", "B": "to her house", "C": "from work", "D": "was cooking"}, "answer": "D", "type": "error_finding", "hint": {"explanation": "Đáp án D. Phần sai là was cooking; nên sửa thành cooked.", "rule": "Sau after, khi hành động thứ nhất đã hoàn tất bằng past perfect, hành động tiếp theo thường dùng past simple nếu xảy ra sau đó.", "trick": "Đừng dùng past continuous nếu câu chỉ kể nối tiếp hai hành động đã xảy ra xong."}}, {"id": 5, "question": "Elizabeth I has reigned as Queen of England from 1558 to 1603.", "question_html": "Elizabeth I <u><b>(A)</b> has reigned</u> <u><b>(B)</b> as</u> <u><b>(C)</b> Queen</u> of England <u><b>(D)</b> from</u> 1558 to 1603.", "options": {"A": "has reigned", "B": "as", "C": "Queen", "D": "from"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là has reigned; nên sửa thành reigned.", "rule": "Khoảng thời gian đã kết thúc trong quá khứ không dùng hiện tại hoàn thành.", "trick": "Thấy from ... to ... với mốc đã khép lại, hãy nghĩ đến past simple."}}, {"id": 6, "question": "Caroline refused taking the job given to her because the salary was not good.", "question_html": "Caroline refused <u><b>(A)</b> taking</u> the job <u><b>(B)</b> given</u> to her <u><b>(C)</b> because</u> the salary <u><b>(D)</b> was</u> not good.", "options": {"A": "taking", "B": "given", "C": "because", "D": "was"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là taking; nên sửa thành to take.", "rule": "Refuse đi với to-infinitive, không đi trực tiếp với V-ing trong mẫu câu này.", "trick": "Hãy nhớ cụm refuse to V thay vì refuse V-ing."}}, {"id": 7, "question": "I finished college last year, and I am working here for only eight months now.", "question_html": "I <u><b>(A)</b> finished</u> college last year, and I <u><b>(B)</b> am working</u> here for <u><b>(C)</b> only</u> eight months <u><b>(D)</b> now</u>.", "options": {"A": "finished", "B": "am working", "C": "only", "D": "now"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là am working; nên sửa thành have been working.", "rule": "Mốc thời gian kéo dài từ quá khứ đến hiện tại cần hiện tại hoàn thành tiếp diễn hoặc hiện tại hoàn thành.", "trick": "Nếu có last year/for .../now cùng một mạch thời gian, hãy kiểm tra hiện tại hoàn thành."}}, {"id": 8, "question": "If you think carefully before making your decision, you will avoid to get into trouble later.", "question_html": "If you think <u><b>(A)</b> carefully</u> before <u><b>(B)</b> making</u> your decision, you will avoid <u><b>(C)</b> to get</u> into trouble <u><b>(D)</b> later</u>.                                    ", "options": {"A": "carefully", "B": "making", "C": "to get", "D": "later"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là to get; nên sửa thành getting.", "rule": "Avoid đi với V-ing, không đi với to-infinitive.", "trick": "Học nguyên cụm avoid + V-ing để tránh lỗi rất phổ biến này."}}, {"id": 9, "question": "Each of the members of the group were made to write a report every week.", "question_html": "Each of the <u><b>(A)</b> members</u> of the group <u><b>(B)</b> were</u> made <u><b>(C)</b> to write</u> a report every <u><b>(D)</b> week</u>.", "options": {"A": "members", "B": "were", "C": "to write", "D": "week"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là were; nên sửa thành was.", "rule": "Each of + plural noun vẫn có chủ ngữ ngữ pháp là số ít nên động từ phải chia số ít.", "trick": "Đừng để danh từ số nhiều phía sau làm bạn nhầm; hãy nhìn head noun của chủ ngữ."}}, {"id": 10, "question": "Last week Mark told me that he got very bored with his present job and is looking for a new one.", "question_html": "Last week Mark <u><b>(A)</b> told</u> me that he <u><b>(B)</b> got</u> very bored with his present job and <u><b>(C)</b> is looking</u> for a <u><b>(D)</b> new one</u>.               ", "options": {"A": "told", "B": "got", "C": "is looking", "D": "new one"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là is looking; nên sửa thành was looking.", "rule": "Trong lời tường thuật ở quá khứ, hai hành động song song trong cùng mốc thời gian thường cùng lùi về quá khứ.", "trick": "Khi câu mở đầu bằng last week/told me, hãy rà xem các động từ theo sau đã lùi thì nhất quán chưa."}}, {"id": 11, "question": "Jane asked Brian that he had ever been to South-east Asia and he said he had.", "question_html": "Jane asked Brian <u><b>(A)</b> that</u> he had <u><b>(B)</b> ever</u> <u><b>(C)</b> been to</u> South-east Asia and he said he <u><b>(D)</b> had</u>.", "options": {"A": "that", "B": "ever", "C": "been to", "D": "had"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là that; nên sửa thành if/whether.", "rule": "Ask trong câu gián tiếp nghi vấn yes/no thường đi với if hoặc whether, không dùng that.", "trick": "Phân biệt rõ ask + if/whether với say/tell + that."}}, {"id": 12, "question": "I don't know why is the elevator not working properly today.", "question_html": "I don't <u><b>(A)</b> know why</u> <u><b>(B)</b> is the elevator</u> not <u><b>(C)</b> working properly</u> <u><b>(D)</b> today</u>.", "options": {"A": "know why", "B": "is the elevator", "C": "working properly", "D": "today"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là is the elevator; nên sửa thành the elevator is.", "rule": "Sau why trong mệnh đề tường thuật phải dùng trật tự câu kể, không đảo trợ động từ lên trước.", "trick": "Wh-question lồng trong câu khác không giữ trật tự nghi vấn trực tiếp."}}, {"id": 13, "question": "In the end, she quit the job because it was too bored.", "question_html": "<u><b>(A)</b> In the end</u>, she <u><b>(B)</b> quit</u> the job <u><b>(C)</b> because</u> it was <u><b>(D)</b> too bored</u>.", "options": {"A": "In the end", "B": "quit", "C": "because", "D": "too bored"}, "answer": "D", "type": "error_finding", "hint": {"explanation": "Đáp án D. Phần sai là too bored; nên sửa thành too boring.", "rule": "Bored miêu tả cảm xúc của người; boring miêu tả tính chất gây chán của sự vật/sự việc.", "trick": "Với cặp -ed/-ing, hãy hỏi xem đang tả cảm xúc của người hay đặc điểm của vật/sự việc."}}, {"id": 14, "question": "He said that he couldn't remember where had he left his car.", "question_html": "He <u><b>(A)</b> said that</u> he couldn't <u><b>(B)</b> remember where</u> <u><b>(C)</b> had he</u> left <u><b>(D)</b> his car</u>.", "options": {"A": "said that", "B": "remember where", "C": "had he", "D": "his car"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là had he; nên sửa thành he had.", "rule": "Trong mệnh đề gián tiếp, không dùng trật tự đảo của câu hỏi trực tiếp.", "trick": "Với reported questions, đổi về trật tự câu kể: subject + verb."}}, {"id": 15, "question": "Many couples who both work must hire someone to take care of their children for they.", "question_html": "Many couples <u><b>(A)</b> who both</u> work must hire <u><b>(B)</b> someone</u> <u><b>(C)</b> to take</u> care of their children for <u><b>(D)</b> they</u>.                                ", "options": {"A": "who both", "B": "someone", "C": "to take", "D": "they"}, "answer": "D", "type": "error_finding", "hint": {"explanation": "Đáp án D. Phần sai là they; nên sửa thành them.", "rule": "Sau giới từ for phải dùng đại từ tân ngữ, không dùng đại từ chủ ngữ.", "trick": "Sau giới từ, ưu tiên object pronoun như me, him, her, them."}}, {"id": 16, "question": "The oil price is believing to be rising again.", "question_html": "The <u><b>(A)</b> oil</u> price <u><b>(B)</b> is</u> <u><b>(C)</b> believing</u> to <u><b>(D)</b> be rising</u> again. ", "options": {"A": "oil", "B": "is", "C": "believing", "D": "be rising"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là believing; nên sửa thành believed.", "rule": "Cấu trúc bị động ở đây là is believed to V, không phải is believing.", "trick": "Nhìn thấy is + past participle + to V là một mẫu bị động rất quen trong văn viết."}}, {"id": 17, "question": "While the Browns were away on holiday, their house was broke into.", "question_html": "While <u><b>(A)</b> the</u> Browns <u><b>(B)</b> were</u> <u><b>(C)</b> away</u> on holiday, their house was <u><b>(D)</b> broke into</u>.", "options": {"A": "the", "B": "were", "C": "away", "D": "broke into"}, "answer": "D", "type": "error_finding", "hint": {"explanation": "Đáp án D. Phần sai là broke into; nên sửa thành broken into.", "rule": "Sau was trong bị động phải dùng phân từ II.", "trick": "Bị động luôn cần be + V3/ed, không dùng quá khứ đơn."}}, {"id": 18, "question": "Why don’t you congratulate our son about passing his final exam?", "question_html": "Why <u><b>(A)</b> don’t</u> you congratulate our son <u><b>(B)</b> about</u> <u><b>(C)</b> passing</u> his <u><b>(D)</b> final</u> exam?", "options": {"A": "don’t", "B": "about", "C": "passing", "D": "final"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là about; nên sửa thành on.", "rule": "Congratulate somebody on something là cụm cố định.", "trick": "Hãy học congratulate đi với giới từ on như một collocation."}}, {"id": 19, "question": "Now that I’ve become old, I can’t read as quick as I used to.", "question_html": "<u><b>(A)</b> Now that</u> I’ve become <u><b>(B)</b> old</u>, I can’t read as <u><b>(C)</b> quick</u> as I <u><b>(D)</b> used to</u>.", "options": {"A": "Now that", "B": "old", "C": "quick", "D": "used to"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là quick; nên sửa thành quickly.", "rule": "Sau động từ read và trong cấu trúc so sánh cách thức, cần trạng từ chứ không phải tính từ.", "trick": "Nếu từ đang bổ nghĩa cho động từ, hãy kiểm tra xem có cần trạng từ không."}}, {"id": 20, "question": "There have been a report of several bombings by terrorist groups.", "question_html": "There <u><b>(A)</b> have been</u> a report of <u><b>(B)</b> several</u> <u><b>(C)</b> bombings</u> by <u><b>(D)</b> terrorist</u> groups.", "options": {"A": "have been", "B": "several", "C": "bombings", "D": "terrorist"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là have been; nên sửa thành has been.", "rule": "Sau there + be, động từ phải hòa hợp với danh từ theo sau; a report là số ít.", "trick": "Trong cấu trúc there is/are, động từ phải nhìn vào danh từ thật đứng sau nó."}}, {"id": 21, "question": "If Al had come sooner, he could has eaten dinner with the whole family.", "question_html": "If Al had come <u><b>(A)</b> sooner</u>, he could <u><b>(B)</b> has eaten</u> dinner <u><b>(C)</b> with</u> <u><b>(D)</b> the whole</u> family. ", "options": {"A": "sooner", "B": "has eaten", "C": "with", "D": "the whole"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là has eaten; nên sửa thành have eaten.", "rule": "Sau modal verb như could phải dùng động từ nguyên mẫu, ở đây là have.", "trick": "Modal + have + V3/ed là công thức chuẩn để nói khả năng/giả định trong quá khứ."}}, {"id": 22, "question": "If my father hasn't encouraged me to take the exam, I wouldn't have done it.", "question_html": "If my father <u><b>(A)</b> hasn't</u> encouraged me <u><b>(B)</b> to take</u> the exam, I <u><b>(C)</b> wouldn't</u> <u><b>(D)</b> have done</u> it.", "options": {"A": "hasn't", "B": "to take", "C": "wouldn't", "D": "have done"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là hasn't; nên sửa thành hadn't.", "rule": "Câu điều kiện loại 3 cần quá khứ hoàn thành ở mệnh đề if.", "trick": "Nếu mệnh đề chính là would have + V3/ed, mệnh đề if thường phải là had + V3/ed."}}, {"id": 23, "question": "If you give me more time and I will successfully finish this project.", "question_html": "If you give me <u><b>(A)</b> more time</u> <u><b>(B)</b> and</u> I <u><b>(C)</b> will</u> <u><b>(D)</b> successfully</u> finish this project. ", "options": {"A": "more time", "B": "and", "C": "will", "D": "successfully"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là and; nên sửa thành bỏ and.", "rule": "Câu điều kiện không nối mệnh đề if với mệnh đề chính bằng and.", "trick": "Sau mệnh đề if, đi thẳng vào mệnh đề chính; không chen liên từ and."}}, {"id": 24, "question": "Some of the pictures he painted them were sold for millions of dollars.", "question_html": "Some of the pictures he painted <u><b>(A)</b> them</u> <u><b>(B)</b> were</u> sold <u><b>(C)</b> for</u> <u><b>(D)</b> millions</u> of dollars. ", "options": {"A": "them", "B": "were", "C": "for", "D": "millions"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là them; nên sửa thành bỏ them.", "rule": "Paint là ngoại động từ trực tiếp; đã có tân ngữ the pictures nên không thêm them.", "trick": "Khi mệnh đề quan hệ đã có tân ngữ rõ ràng, tránh lặp lại đại từ tân ngữ."}}, {"id": 25, "question": "There are many another people who are members of the swimming club.", "question_html": "There are <u><b>(A)</b> many</u> <u><b>(B)</b> another</u> people <u><b>(C)</b> who</u> are members of the <u><b>(D)</b> swimming</u> club. ", "options": {"A": "many", "B": "another", "C": "who", "D": "swimming"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là another; nên sửa thành other.", "rule": "Many đi với plural noun và thường đi với other, không đi với another + plural noun.", "trick": "Another thường đi với danh từ số ít; với plural noun, nghĩ đến other."}}, {"id": 26, "question": "Liquids take the shape of any container which in they are placed.", "question_html": "Liquids take <u><b>(A)</b> the shape</u> of any container <u><b>(B)</b> which in</u> <u><b>(C)</b> they</u> are <u><b>(D)</b> placed</u>.", "options": {"A": "the shape", "B": "which in", "C": "they", "D": "placed"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là which in; nên sửa thành in which.", "rule": "Giới từ phải đặt trước đại từ quan hệ hoặc chuyển xuống cuối mệnh đề đúng cấu trúc.", "trick": "Với relative clause có giới từ, hãy kiểm tra mẫu in which / which ... in."}}, {"id": 27, "question": "Two out of three people striking by lightning survive.", "question_html": "Two <u><b>(A)</b> out of three</u> people <u><b>(B)</b> striking</u> by <u><b>(C)</b> lightning</u> <u><b>(D)</b> survive</u>.", "options": {"A": "out of three", "B": "striking", "C": "lightning", "D": "survive"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là striking; nên sửa thành struck.", "rule": "People không tự thực hiện hành động striking ở đây mà là đối tượng bị sét đánh, nên dùng phân từ II.", "trick": "Khi cụm rút gọn mang nghĩa bị động, hãy nghĩ đến V3/ed thay vì V-ing."}}, {"id": 28, "question": "Some of the houses had been wrecked by the storm belonged to the poor villagers.", "question_html": "<u><b>(A)</b> Some of</u> the houses <u><b>(B)</b> had been</u> wrecked <u><b>(C)</b> by the storm</u> belonged to <u><b>(D)</b> the poor</u> villagers.", "options": {"A": "Some of", "B": "had been", "C": "by the storm", "D": "the poor"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là had been; nên sửa thành bỏ had been.", "rule": "Ở đây cần cụm rút gọn wrecked by the storm để bổ nghĩa cho houses, không cần thêm had been.", "trick": "Mệnh đề quan hệ rút gọn thường dùng V3/ed trực tiếp sau danh từ."}}, {"id": 29, "question": "The notebook lists every opportunities for handicapped workers in the area.", "question_html": "<u><b>(A)</b> The</u> notebook <u><b>(B)</b> lists</u> every <u><b>(C)</b> opportunities</u> for <u><b>(D)</b> handicapped</u> workers in the area.", "options": {"A": "The", "B": "lists", "C": "opportunities", "D": "handicapped"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là opportunities; nên sửa thành opportunity.", "rule": "Every đi với danh từ số ít đếm được.", "trick": "Sau every/each, danh từ thường ở dạng số ít."}}, {"id": 30, "question": "In my opinion, the new foreign coach does his job relative well.", "question_html": "<u><b>(A)</b> In</u> my opinion, the new <u><b>(B)</b> foreign</u> coach does his job <u><b>(C)</b> relative</u> <u><b>(D)</b> well</u>. ", "options": {"A": "In", "B": "foreign", "C": "relative", "D": "well"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là relative; nên sửa thành relatively.", "rule": "Từ bổ nghĩa cho well phải là trạng từ relatively, không phải tính từ relative.", "trick": "Nếu từ đứng trước một trạng từ/tính từ khác để chỉ mức độ, thường cần adverb."}}, {"id": 31, "question": "He had stolen my money today.", "question_html": "He <u><b>(A)</b> had</u> <u><b>(B)</b> stolen</u> <u><b>(C)</b> my money</u> <u><b>(D)</b> today</u>.", "options": {"A": "had", "B": "stolen", "C": "my money", "D": "today"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là had; nên sửa thành stole.", "rule": "Today thường không hợp với quá khứ hoàn thành nếu không có mốc quá khứ thứ hai để đối chiếu.", "trick": "Đừng dùng past perfect khi câu chỉ có một hành động quá khứ đơn lẻ gắn với today."}}, {"id": 32, "question": "She said that she liking her work so much.", "question_html": "<u><b>(A)</b>  She</u> said that <u><b>(B)</b> she</u> <u><b>(C)</b> liking</u> her <u><b>(D)</b> work</u> so much.", "options": {"A": "She", "B": "she", "C": "liking", "D": "work"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là liking; nên sửa thành liked.", "rule": "Sau said that và trong mạch tường thuật quá khứ, động từ cần chia thì phù hợp chứ không dùng V-ing.", "trick": "Sau subject trong mệnh đề that-clause, hãy kiểm tra xem cần finite verb hay không."}}, {"id": 33, "question": "I was listening to the radio last night when the door bell rings.", "question_html": "I <u><b>(A)</b> was listening </u>to the <u><b>(B)</b> radio</u> last night <u><b>(C)</b> when</u> the door bell <u><b>(D)</b> rings</u>.", "options": {"A": "was listening", "B": "Radio", "C": "when", "D": "rings"}, "answer": "D", "type": "error_finding", "hint": {"explanation": "Đáp án D. Phần sai là rings; nên sửa thành rang.", "rule": "Mốc last night yêu cầu quá khứ đơn.", "trick": "Câu có when nối hai hành động trong quá khứ thường dùng past continuous + past simple."}}, {"id": 34, "question": "He stopped to smoke because it is harmful for his health.", "question_html": "He stopped <u><b>(A)</b> to smoke </u>because it<u><b>(B)</b>  is </u>harmful for <u><b>(C)</b> his</u> <u><b>(D)</b> health</u>.", "options": {"A": "to smoke", "B": "is", "C": "his", "D": "health"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là to smoke; nên sửa thành smoking.", "rule": "Stop to V là dừng lại để làm việc gì; stop V-ing là ngừng hẳn việc đó.", "trick": "Phân biệt rõ stop to smoke và stop smoking vì nghĩa đổi hoàn toàn."}}, {"id": 35, "question": "Have you finish the report yet?", "question_html": "<u><b>(A)</b>  Have</u> <u><b>(B)</b> you</u> <u><b>(C)</b> finish</u> the report<u><b>(D)</b>  yet</u>?", "options": {"A": "Have", "B": "you", "C": "finish", "D": "yet"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là finish; nên sửa thành finished.", "rule": "Sau have/has trong hiện tại hoàn thành phải dùng phân từ II.", "trick": "Hiện tại hoàn thành có công thức have/has + V3/ed."}}, {"id": 36, "question": "Dennis used to smoking a lot a year ago.", "question_html": "<u><b>(A)</b> Dennis</u> <u><b>(B)</b> used</u> to <u><b>(C)</b> smoking</u> a lot a year <u><b>(D)</b> ago</u>.", "options": {"A": "Dennis", "B": "used", "C": "smoking", "D": "ago"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là smoking; nên sửa thành smoke.", "rule": "Used to đi với động từ nguyên mẫu, không đi với V-ing.", "trick": "Phân biệt used to + V với be used to + V-ing/N."}}, {"id": 37, "question": "There is such few ink that it will be impossible to finish addressing the envelopes.", "question_html": "There is <u><b>(A)</b> such</u> <u><b>(B)</b> few</u> ink that it will be impossible <u><b>(C)</b> to finish</u> <u><b>(D)</b> addressing</u> the envelopes. ", "options": {"A": "such", "B": "few", "C": "to finish", "D": "addressing"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là few; nên sửa thành little.", "rule": "Ink là danh từ không đếm được nên dùng little, không dùng few.", "trick": "Với uncountable noun, loại ngay few/many trước."}}, {"id": 39, "question": "Anyone where works is regarded as a useful member of our society.", "question_html": "<u><b>(A)</b> Anyone</u> <u><b>(B)</b> where</u> works <u><b>(C)</b> is regarded</u> as a useful member <u><b>(D)</b> of our society</u>.", "options": {"A": "Anyone", "B": "where", "C": "is regarded", "D": "of our society"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là where; nên sửa thành who.", "rule": "Anyone chỉ người nên đại từ quan hệ phù hợp là who.", "trick": "Nếu antecedent là người, đừng chọn where."}}, {"id": 40, "question": "Education and training are an important steps in getting the kind of job that you would like to have.", "question_html": "<u><b>(A)</b>  Education</u> and training are <u><b>(B)</b> an</u> important steps in <u><b>(C)</b> getting</u> the kind of job <u><b>(D)</b> that</u> you would like to have.   ", "options": {"A": "Education", "B": "an", "C": "getting", "D": "that"}, "answer": "B", "type": "error_finding", "hint": {"explanation": "Đáp án B. Phần sai là an; nên sửa thành bỏ an.", "rule": "Education and training là chủ ngữ số nhiều nên không thể đi với an important steps.", "trick": "Kiểm tra sự hòa hợp giữa mạo từ, số nhiều/số ít và danh từ ngay sau nó."}}, {"id": 41, "question": "Recently, there has been a lot of debate about students have to pay their own fees at university.", "question_html": "Recently, there <u><b>(A)</b> has been</u> a lot of <u><b>(B)</b> debate</u> about students <u><b>(C)</b> have to</u> pay their own fees <u><b>(D)</b> at university</u>.", "options": {"A": "has been", "B": "debate", "C": "have to", "D": "at university"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là have to; nên sửa thành having to.", "rule": "Sau about ở đây cần một cụm danh động từ hoặc mệnh đề danh hóa, không đi thẳng với finite verb.", "trick": "Giới từ thường đi với noun phrase hoặc V-ing chứ không đi trực tiếp với finite clause."}}, {"id": 42, "question": "We are working, that means that we are contributing goods and services to our city.", "question_html": "We are working, <u><b>(A)</b> that</u> means <u><b>(B)</b> that </u>we are <u><b>(C)</b> contributing</u> goods and <u><b>(D)</b> services</u> to our city.", "options": {"A": "that", "B": "that", "C": "contributing", "D": "services"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là that; nên sửa thành which.", "rule": "Sau dấu phẩy để nối mệnh đề quan hệ không xác định, phải dùng which chứ không dùng that.", "trick": "That không dùng trong non-defining relative clause sau dấu phẩy."}}, {"id": 43, "question": "Economic reform usually refers to actions of the government to improve efficiency in economy markets.", "question_html": "Economic reform <u><b>(A)</b> usually</u> refers to <u><b>(B)</b> actions</u> of the government <u><b>(C)</b> to improve</u> efficiency in <u><b>(D)</b> economy</u> markets.              ", "options": {"A": "usually", "B": "actions", "C": "to improve", "D": "economy"}, "answer": "D", "type": "error_finding", "hint": {"explanation": "Đáp án D. Phần sai là economy; nên sửa thành economic.", "rule": "Markets cần tính từ economic để bổ nghĩa, không dùng danh từ economy.", "trick": "Khi một từ đứng ngay trước noun khác để bổ nghĩa, hãy kiểm tra xem có cần adjective hay không."}}, {"id": 44, "question": "The boy climbed up the tree to get bird’s eggs had a bad fall.", "question_html": "The boy <u><b>(A)</b> climbed</u> up the tree <u><b>(B)</b> to get</u> <u><b>(C)</b> bird’s eggs</u> had a <u><b>(D)</b> bad</u> fall.", "options": {"A": "climbed", "B": "to get", "C": "bird’s eggs", "D": "bad"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là climbed; nên sửa thành climbing.", "rule": "Ở đây cần cụm phân từ hiện tại rút gọn để bổ nghĩa cho the boy.", "trick": "Nhiều câu viết lại từ mệnh đề quan hệ rút gọn sẽ dùng V-ing ngay sau danh từ."}}, {"id": 45, "question": "After the police had tried unsuccessfully to determine to who the car belonged, they towed it into the station.", "question_html": "After <u><b>(A)</b> the police</u> had tried <u><b>(B)</b> unsuccessfully</u> to determine to <u><b>(C)</b> who</u> the car belonged, they towed<u><b>(D)</b>  it</u> into the station. ", "options": {"A": "the police", "B": "unsuccessfully", "C": "who", "D": "it"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là who; nên sửa thành whom.", "rule": "Sau giới từ to trong cấu trúc gián tiếp trang trọng phải dùng whom.", "trick": "Giới từ + whom là mẫu formal quen thuộc trong relative/interrogative clauses."}}, {"id": 46, "question": "If Robert Kennedy would have lived a little longer, he probably would have won the election.", "question_html": "If Robert Kennedy <u><b>(A)</b> would have lived</u> <u><b>(B)</b> a little longer</u>, he <u><b>(C)</b> probably</u> would have <u><b>(D)</b> won</u> the election.", "options": {"A": "would have lived", "B": "a little longer", "C": "probably", "D": "won"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là would have lived; nên sửa thành had lived.", "rule": "Mệnh đề if của câu điều kiện loại 3 không dùng would have.", "trick": "If-clause loại 3: had + V3/ed; main clause: would have + V3/ed."}}, {"id": 47, "question": "I found it wonderfully to travel abroad.", "question_html": "I <u><b>(A)</b> found</u> <u><b>(B)</b> it</u> <u><b>(C)</b> wonderfully</u> to travel <u><b>(D)</b> abroad</u>.", "options": {"A": "found", "B": "it", "C": "wonderfully", "D": "abroad"}, "answer": "C", "type": "error_finding", "hint": {"explanation": "Đáp án C. Phần sai là wonderfully; nên sửa thành wonderful.", "rule": "Sau find + it, bổ ngữ cho it phải là tính từ chứ không phải trạng từ.", "trick": "Find/consider/make + object + adjective là mẫu rất hay gặp."}}, {"id": 48, "question": "Although the increase in air fares, most people still prefer to travel by plane.", "question_html": "<u><b>(A)</b>  Although</u> the increase <u><b>(B)</b> in</u> air fares, most people still <u><b>(C)</b> prefer</u> to travel <u><b>(D)</b> by</u> plane.", "options": {"A": "Although", "B": "in", "C": "prefer", "D": "by"}, "answer": "A", "type": "error_finding", "hint": {"explanation": "Đáp án A. Phần sai là Although; nên sửa thành Despite/In spite of.", "rule": "Sau although phải là mệnh đề đầy đủ; ở đây phía sau chỉ là cụm danh từ the increase in air fares.", "trick": "Nhìn sau liên từ/từ nối để quyết định dùng although hay despite/in spite of."}}], "summary_hint": {"focus": "Tìm đúng phần sai rồi sửa theo quy tắc ngữ pháp nền như thì, hòa hợp chủ-vị, từ loại.", "review": "Rà lại subject-verb agreement, mốc thời gian, dạng từ và cấu trúc cố định.", "tip": "Khi tìm lỗi sai, hãy chia câu thành từng cụm nhỏ rồi kiểm tra từng điểm: chủ-vị, thì, giới từ, từ loại."}}, "cd16": {"title": "Chuyên đề 16: TỪ VỰNG", "questions": [{"id": 1, "question": "Most doctors and nurses have to work on a _______ once or twice a week at the hospital.", "options": {"A": "solution", "B": "night shift", "C": "household chores", "D": "special dishes"}, "answer": "B", "hint": {"explanation": "Đáp án B. night shift = ca đêm.", "rule": "Câu hoàn chỉnh: Most doctors and nurses have to work on a night shift once or twice a week at the hospital.\n'night shift' mang nghĩa 'ca đêm', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. solution; C. household chores; D. special dishes) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: học nguyên cụm 'night shift' như một khối nghĩa hoàn chỉnh, đừng tách từng từ lẻ."}}, {"id": 2, "question": "We enjoy _______ time together in the evening when the family members gather in the living room after a day of working hard.", "options": {"A": "spending", "B": "caring", "C": "taking", "D": "doing"}, "answer": "A", "hint": {"explanation": "Đáp án A. spending = dành, dùng (thời gian).", "rule": "Câu hoàn chỉnh: We enjoy spending time together in the evening when the family members gather in the living room after a day of working hard.\n'spending' mang nghĩa 'dành, dùng (thời gian)', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. caring; C. taking; D. doing) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 4, "question": "He is a _______ boy. He is often kind and helpful to every classmate.", "options": {"A": "frank", "B": "lovely", "C": "obedient", "D": "caring"}, "answer": "D", "hint": {"explanation": "Đáp án D. caring = biết quan tâm, chu đáo.", "rule": "Câu hoàn chỉnh: He is a caring boy. He is often kind and helpful to every classmate.\n'caring' mang nghĩa 'biết quan tâm, chu đáo', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. frank; B. lovely; C. obedient) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 4, "question": "According to the boss, John is the most _______ for the position of executive secretary.", "options": {"A": "supportive", "B": "caring", "C": "suitable", "D": "comfortable"}, "answer": "C", "hint": {"explanation": "Đáp án C. suitable = phù hợp.", "rule": "Câu hoàn chỉnh: According to the boss, John is the most suitable for the position of executive secretary.\n'suitable' mang nghĩa 'phù hợp', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. supportive; B. caring; D. comfortable) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 5, "question": "Billy, come and give me a hand with cooking.", "options": {"A": "help", "B": "prepared", "C": "be busy", "D": "attempt"}, "answer": "A", "hint": {"explanation": "Đáp án A. help = giúp đỡ.", "rule": "Câu hoàn chỉnh: Billy, come and give me a hand with cooking. -> help\n'help' mang nghĩa 'giúp đỡ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. prepared; C. be busy; D. attempt) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'help' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 7, "question": "You should not burn _______. You had better dig a hole and bury it.", "options": {"A": "dishes", "B": "lab", "C": "garbage", "D": "shift"}, "answer": "C", "hint": {"explanation": "Đáp án C. garbage = rác.", "rule": "Câu hoàn chỉnh: You should not burn garbage. You had better dig a hole and bury it.\n'garbage' mang nghĩa 'rác', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. dishes; B. lab; D. shift) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'garbage' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 8, "question": "One of Vietnamese traditions is a belief in _______ families and in preserving their cultures.", "options": {"A": "wealthy", "B": "secure", "C": "safe", "D": "close-knit"}, "answer": "D", "hint": {"explanation": "Đáp án D. close-knit = gắn bó khăng khít.", "rule": "Câu hoàn chỉnh: One of Vietnamese traditions is a belief in close-knit families and in preserving their cultures.\n'close-knit' mang nghĩa 'gắn bó khăng khít', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. wealthy; B. secure; C. safe) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu  còn lại (A. groom; C. celibate; D. groomsman) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'bride' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 38, "question": "I do not think there is a real ______ between men and women at home as well as in society.", "options": {"A": "attitude", "B": "value", "C": "measurement", "D": "equality"}, "answer": "D", "hint": {"explanation": "Đáp án D. equality = sự bình đẳng.", "rule": "Câu hoàn chỉnh: I do not think there is a real equality between men and women at home as well as in society.\n'equality' mang nghĩa 'sự bình đẳng', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. attitude; B. value; C. measurement) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 39, "question": "The ______ to success is to be ready from the start.", "options": {"A": "key", "B": "response", "C": "agreement", "D": "demand"}, "answer": "A", "hint": {"explanation": "Đáp án A. key = chìa khóa; yếu tố then chốt.", "rule": "Câu hoàn chỉnh: The key to success is to be ready from the start.\n'key' mang nghĩa 'chìa khóa; yếu tố then chốt', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. response; C. agreement; D. demand) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'key' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 40, "question": "They decided to divorce and Mary is ______ to get the right to raise the child.", "options": {"A": "equal", "B": "determined", "C": "obliged", "D": "active"}, "answer": "B", "hint": {"explanation": "Đáp án B. determined = quyết tâm.", "rule": "Câu hoàn chỉnh: They decided to divorce and Mary is determined to get the right to raise the child.\n'determined' mang nghĩa 'quyết tâm', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. equal; C. obliged; D. active) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 41, "question": "She is a kind of woman who does not care much of work but generally _______ only with colleagues for meals, movies or late nights at a club.", "options": {"A": "supposes", "B": "socializes", "C": "attention", "D": "discussed"}, "answer": "B", "hint": {"explanation": "Đáp án B. socializes = giao du, giao tiếp xã hội.", "rule": "Câu hoàn chỉnh: She is a kind of woman who does not care much of work but generally socializes only with colleagues for meals, movies or late nights at a club.\n'socializes' mang nghĩa 'giao du, giao tiếp xã hội', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. supposes; C. attention; D. discussed) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'socializes' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 42, "question": "I didn't think his comments were very appropriate at the time.", "options": {"A": "correct", "B": "right", "C": "exact", "D": "suitable"}, "answer": "D", "hint": {"explanation": "Đáp án D. suitable = phù hợp.", "rule": "Câu hoàn chỉnh: I didn't think his comments were very appropriate at the time. -> suitable\n'suitable' mang nghĩa 'phù hợp', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. correct; B. right; C. exact) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 43, "question": "You should _______ more attention to what your teacher explains.", "options": {"A": "make", "B": "get", "C": "set", "D": "pay"}, "answer": "D", "hint": {"explanation": "Đáp án D. pay = trả; dành (trong cụm pay attention).", "rule": "Câu hoàn chỉnh: You should pay more attention to what your teacher explains.\n'pay' mang nghĩa 'trả; dành (trong cụm pay attention)', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. make; B. get; C. set) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'pay' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 44, "question": "Body language is a potent form of _______ communication.", "options": {"A": "verbal", "B": "non-verbal", "C": "tongue", "D": "oral"}, "answer": "B", "hint": {"explanation": "Đáp án B. non-verbal = phi ngôn ngữ.", "rule": "Câu hoàn chỉnh: Body language is a potent form of non-verbal communication.\n'non-verbal' mang nghĩa 'phi ngôn ngữ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. verbal; C. tongue; D. oral) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 45, "question": "Our teacher often said, \"Who knows the answer? _______ your hand.\"", "options": {"A": "Raised", "B": "Lift", "C": "Raise", "D": "Heighten"}, "answer": "C", "hint": {"explanation": "Đáp án C. Raise = giơ lên, nâng lên.", "rule": "Câu hoàn chỉnh: Our teacher often said, \"Who knows the answer? Raise your hand.\"\n'Raise' mang nghĩa 'giơ lên, nâng lên', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. Raised; B. Lift; D. Heighten) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'Raise' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 46, "question": "This is the instance where big, obvious non-verbal signals are appropriate.", "options": {"A": "situation.", "B": "attention", "C": "place", "D": "matter"}, "answer": "A", "hint": {"explanation": "Đáp án A. situation. = tình huống.", "rule": "Câu hoàn chỉnh: This is the instance where big, obvious non-verbal signals are appropriate. -> situation.\n'situation.' mang nghĩa 'tình huống', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. attention; C. place; D. matter) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 1, "question": "With black hair and eyes, she is___________ of the people from her country.", "options": {"A": "the same", "B": "typical", "C": "similar", "D": "identical"}, "answer": "B", "hint": {"explanation": "Đáp án B. typical = điển hình, tiêu biểu.", "rule": "Câu hoàn chỉnh: With black hair and eyes, she istypical of the people from her country.\n'typical' mang nghĩa 'điển hình, tiêu biểu', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. the same; C. similar; D. identical) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 2, "question": "Military is _______ in this country. Every man who reaches the age of 18 has to serve in the army for two years.", "options": {"A": "compulsory", "B": "optional", "C": "illegal", "D": "unnecessary"}, "answer": "A", "hint": {"explanation": "Đáp án A. compulsory = bắt buộc.", "rule": "Câu hoàn chỉnh: Military is compulsory in this country. Every man who reaches the age of 18 has to serve in the army for two years.\n'compulsory' mang nghĩa 'bắt buộc', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. optional; C. illegal; D. unnecessary) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'compulsory' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 3, "question": "People tend to work hard at this_________ of life.", "options": {"A": "distance", "B": "stage", "C": "space", "D": "level"}, "answer": "B", "hint": {"explanation": "Đáp án B. stage = giai đoạn.", "rule": "Câu hoàn chỉnh: People tend to work hard at thisstage of life.\n'stage' mang nghĩa 'giai đoạn', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. distance; C. space; D. level) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'stage' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 4, "question": "Concern for the environment is now at the_______ of many governments' policies.", "options": {"A": "core", "B": "aim", "C": "target", "D": "purpose"}, "answer": "A", "hint": {"explanation": "Đáp án A. core = cốt lõi.", "rule": "Câu hoàn chỉnh: Concern for the environment is now at thecore of many governments' policies.\n'core' mang nghĩa 'cốt lõi', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. aim; C. target; D. purpose) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'core' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 5, "question": "Although he has not got necessary experience, he used to take a _______ in business administration.", "options": {"A": "curriculum", "B": "course", "C": "school", "D": "class"}, "answer": "B", "hint": {"explanation": "Đáp án B. course = khóa học.", "rule": "Câu hoàn chỉnh: Although he has not got necessary experience, he used to take a course in business administration.\n'course' mang nghĩa 'khóa học', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. curriculum; C. school; D. class) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'course' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 1, "question": "It is quite important _______ me to get on and think.", "options": {"A": "of", "B": "to", "C": "on", "D": "with"}, "answer": "B", "hint": {"explanation": "Đáp án B. to = đến; với; để.", "rule": "Sau tính từ 'important' là cấu trúc 'important to somebody'. Đây là cụm ngữ pháp cố định, không chọn theo nghĩa từ vựng đơn lẻ.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 2, "question": "The new policies include cutting _______ subsidies and trade barriers.", "options": {"A": "agriculture", "B": "agricultural", "C": "agriculturalist", "D": "agriculturally"}, "answer": "B", "hint": {"explanation": "Đáp án B. agricultural = thuộc nông nghiệp.", "rule": "Câu hoàn chỉnh: The new policies include cutting agricultural subsidies and trade barriers.\n'agricultural' mang nghĩa 'thuộc nông nghiệp', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. agriculture; C. agriculturalist; D. agriculturally) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}], "summary_hint": {"focus": "Từ vựng về gia đình, hôn nhân, giao tiếp và cụm từ sinh hoạt hằng ngày.", "review": "Ưu tiên học theo cụm như household chores, night shift, pay attention, close-knit family.", "tip": "Khi gặp bài điền từ, hãy nhìn cả cụm trước và sau chỗ trống thay vì dịch từng từ riêng lẻ."}}, "cd16b": {"title": "Chuyên đề 16: TỪ VỰNG (phần 2)", "questions": [{"id": 3, "question": "The control of _______ has been carried out through measures rooted in monetarism.", "options": {"A": "inflate", "B": "inflationist", "C": "inflation", "D": "inflator"}, "answer": "C", "hint": {"explanation": "Đáp án C. inflation = lạm phát.", "rule": "Câu hoàn chỉnh: The control of inflation has been carried out through measures rooted in monetarism.\n'inflation' mang nghĩa 'lạm phát', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. inflate; B. inflationist; D. inflator) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 4, "question": "It is often a good idea to start with small, easily _______ goals.", "options": {"A": "achieve", "B": "achievement", "C": "achievable", "D": "achiever"}, "answer": "C", "hint": {"explanation": "Đáp án C. achievable = có thể đạt được.", "rule": "Câu hoàn chỉnh: It is often a good idea to start with small, easily achievable goals.\n'achievable' mang nghĩa 'có thể đạt được', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. achieve; B. achievement; D. achiever) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 5, "question": "Economic reforms began in the Soviet Union in June 1985 by the Soviet leader Mikhail Gorbachev to _______ the Soviet economy.", "options": {"A": "repair", "B": "reproduce", "C": "restructure", "D": "reply"}, "answer": "C", "hint": {"explanation": "Đáp án C. restructure = tái cơ cấu.", "rule": "Câu hoàn chỉnh: Economic reforms began in the Soviet Union in June 1985 by the Soviet leader Mikhail Gorbachev to restructure the Soviet economy.\n'restructure' mang nghĩa 'tái cơ cấu', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. repair; B. reproduce; D. reply) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'restructure' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 6, "question": "After more than a decade of Doi Moi or economic _______, the Vietnamese Communist government has achieved diplomatic and economic links with numerous foreign partners.", "options": {"A": "relation", "B": "investment", "C": "productivity", "D": "renovation"}, "answer": "D", "hint": {"explanation": "Đáp án D. renovation = đổi mới, cải cách.", "rule": "Câu hoàn chỉnh: After more than a decade of Doi Moi or economic renovation, the Vietnamese Communist government has achieved diplomatic and economic links with numerous foreign partners.\n'renovation' mang nghĩa 'đổi mới, cải cách', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. relation; B. investment; C. productivity) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 7, "question": "For more than 20 years, the Vietnamese government has pursued the open-door _______ and continued to woo foreign investment.", "options": {"A": "policy", "B": "way", "C": "export", "D": "guideline"}, "answer": "A", "hint": {"explanation": "Đáp án A. policy = chính sách.", "rule": "Câu hoàn chỉnh: For more than 20 years, the Vietnamese government has pursued the open-door policy and continued to woo foreign investment.\n'policy' mang nghĩa 'chính sách', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. way; C. export; D. guideline) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'policy' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 8, "question": "After a decade of economic liberalization, Vietnam has seen a dramatic rise in living _______ in urban areas.", "options": {"A": "surface", "B": "standards", "C": "levels", "D": "backgrounds"}, "answer": "B", "hint": {"explanation": "Đáp án B. standards = tiêu chuẩn; mức.", "rule": "Câu hoàn chỉnh: After a decade of economic liberalization, Vietnam has seen a dramatic rise in living standards in urban areas.\n'standards' mang nghĩa 'tiêu chuẩn; mức', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. surface; C. levels; D. backgrounds) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'standards' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 9, "question": "_______ laws and regulations which impose restrictions on any rights should be revised to comply with international law.", "options": {"A": "Domestic", "B": "Program", "C": "Encouraged", "D": "Expanding"}, "answer": "A", "hint": {"explanation": "Đáp án A. Domestic = trong nước, nội địa.", "rule": "Câu hoàn chỉnh: Domestic laws and regulations which impose restrictions on any rights should be revised to comply with international law.\n'Domestic' mang nghĩa 'trong nước, nội địa', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. Program; C. Encouraged; D. Expanding) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 10, "question": "These new economic reforms have allowed for international _______ and development in the country.", "options": {"A": "pay", "B": "renovation", "C": "investment", "D": "opportunity"}, "answer": "C", "hint": {"explanation": "Đáp án C. investment = đầu tư.", "rule": "Câu hoàn chỉnh: These new economic reforms have allowed for international investment and development in the country.\n'investment' mang nghĩa 'đầu tư', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. pay; B. renovation; D. opportunity) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 11, "question": "In 2001 _______ Vietnamese Communist Party approved a 10-year economic plan that enhanced the role of the, private sector while reaffirming the primacy of the state.", "options": {"A": "a", "B": "an", "C": "the", "D": "Ø"}, "answer": "C", "hint": {"explanation": "Đáp án C. the = mạo từ xác định.", "rule": "Đáp án là mạo từ xác định 'the'. Hãy kiểm tra xem danh từ phía sau có là trường hợp xác định, duy nhất hay đã được nhắc tới hay không.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 12, "question": "Economic reforms are often carried _______ to promote the developing of a country.", "options": {"A": "out", "B": "on", "C": "for", "D": "in"}, "answer": "A", "hint": {"explanation": "Đáp án A. out = ra; hoàn tất (trong cụm động từ).", "rule": "Trong cụm carry out, 'out' đi với carry để tạo nghĩa 'thực hiện'. Đây là phrasal verb rất hay gặp trong bài kinh tế - xã hội.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 13, "question": "For more than ten years, we have seen the significant _______ in the economy of our country.", "options": {"A": "develop", "B": "developments", "C": "developers", "D": "developed"}, "answer": "B", "hint": {"explanation": "Đáp án B. developments = những bước phát triển.", "rule": "Câu hoàn chỉnh: For more than ten years, we have seen the significant developments in the economy of our country.\n'developments' mang nghĩa 'những bước phát triển', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. develop; C. developers; D. developed) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'developments' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 14, "question": "Henry was a studious student. He needed no _______ to work hard.", "options": {"A": "encourage", "B": "encouraging", "C": "encouragement", "D": "encouraged"}, "answer": "C", "hint": {"explanation": "Đáp án C. encouragement = sự khích lệ.", "rule": "Câu hoàn chỉnh: Henry was a studious student. He needed no encouragement to work hard.\n'encouragement' mang nghĩa 'sự khích lệ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. encourage; B. encouraging; D. encouraged) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 15, "question": "During the time of economic reforms, the economy has grown _______ with only a few major setbacks.", "options": {"A": "constant", "B": "constantly", "C": "constants", "D": "constancy"}, "answer": "B", "hint": {"explanation": "Đáp án B. constantly = liên tục.", "rule": "Câu hoàn chỉnh: During the time of economic reforms, the economy has grown constantly with only a few major setbacks.\n'constantly' mang nghĩa 'liên tục', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. constant; C. constants; D. constancy) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi -ly thường báo hiệu trạng từ, hay đứng sau động từ hoặc bổ nghĩa cho cả mệnh đề."}}, {"id": 16, "question": "The _______ effect of the new policy is that the farmer is now working for himself, and not for the state sake.", "options": {"A": "legal", "B": "common", "C": "all", "D": "overall"}, "answer": "D", "hint": {"explanation": "Đáp án D. overall = tổng thể.", "rule": "Câu hoàn chỉnh: The overall effect of the new policy is that the farmer is now working for himself, and not for the state sake.\n'overall' mang nghĩa 'tổng thể', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. legal; B. common; C. all) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'overall' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 17, "question": "Considering peasants make up nearly 80% of Vietnam's population.", "options": {"A": "specialists", "B": "economists", "C": "professors", "D": "farmers"}, "answer": "D", "hint": {"explanation": "Đáp án D. farmers = nông dân.", "rule": "Câu hoàn chỉnh: Considering peasants make up nearly 80% of Vietnam's population. -> farmers\n'farmers' mang nghĩa 'nông dân', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. specialists; B. economists; C. professors) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'farmers' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 18, "question": "The Doi Moi reforms have _______ new possibilities in farming systems research in Vietnam.", "options": {"A": "risen", "B": "opened", "C": "renovated", "D": "called"}, "answer": "B", "hint": {"explanation": "Đáp án B. opened = mở ra.", "rule": "Câu hoàn chỉnh: The Doi Moi reforms have opened new possibilities in farming systems research in Vietnam.\n'opened' mang nghĩa 'mở ra', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. risen; C. renovated; D. called) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: hãy kiểm tra xem câu cần động từ chia thì, phân từ hay tính từ có nguồn gốc từ động từ."}}, {"id": 19, "question": "The introduction of appropriate farming practices to Vietnam farmers can help them achieve a higher output.", "options": {"A": "productivity", "B": "renovation", "C": "guideline", "D": "achievement"}, "answer": "A", "hint": {"explanation": "Đáp án A. productivity = năng suất.", "rule": "Câu hoàn chỉnh: The introduction of appropriate farming practices to Vietnam farmers can help them achieve a higher output. -> productivity\n'productivity' mang nghĩa 'năng suất', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. renovation; C. guideline; D. achievement) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 20, "question": "There was a shortage _______ food and safe water after the flood.", "options": {"A": "on", "B": "with", "C": "for", "D": "of"}, "answer": "D", "hint": {"explanation": "Đáp án D. of = của.", "rule": "Cấu trúc cố định là shortage of, threat of, ... Hãy học cả cụm với giới từ đi kèm.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 21, "question": "Constant _______ of attack makes everyday life dangerous here.", "options": {"A": "threat", "B": "threaten", "C": "threatening", "D": "threateningly"}, "answer": "A", "hint": {"explanation": "Đáp án A. threat = mối đe dọa.", "rule": "Câu hoàn chỉnh: Constant threat of attack makes everyday life dangerous here.\n'threat' mang nghĩa 'mối đe dọa', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. threaten; C. threatening; D. threateningly) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'threat' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 22, "question": "No one can predict the future exactly. Things may happen _______.", "options": {"A": "expected", "B": "unexpected", "C": "expectedly", "D": "unexpectedly"}, "answer": "D", "hint": {"explanation": "Đáp án D. unexpectedly = một cách bất ngờ.", "rule": "Câu hoàn chỉnh: No one can predict the future exactly. Things may happen unexpectedly.\n'unexpectedly' mang nghĩa 'một cách bất ngờ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. expected; B. unexpected; C. expectedly) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi -ly thường báo hiệu trạng từ, hay đứng sau động từ hoặc bổ nghĩa cho cả mệnh đề."}}, {"id": 23, "question": "Someone who is _______ is hopeful about the future or the success of something in particular.", "options": {"A": "powerful", "B": "optimistic", "C": "stagnant", "D": "pessimistic"}, "answer": "B", "hint": {"explanation": "Đáp án B. optimistic = lạc quan.", "rule": "Câu hoàn chỉnh: Someone who is optimistic is hopeful about the future or the success of something in particular.\n'optimistic' mang nghĩa 'lạc quan', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. powerful; C. stagnant; D. pessimistic) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 24, "question": "There will be powerful network of computers which may come from a single computing _______ that is worn on or in the body.", "options": {"A": "device", "B": "machinery", "C": "equipment", "D": "vehicle"}, "answer": "A", "hint": {"explanation": "Đáp án A. device = thiết bị.", "rule": "Câu hoàn chỉnh: There will be powerful network of computers which may come from a single computing device that is worn on or in the body.\n'device' mang nghĩa 'thiết bị', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. machinery; C. equipment; D. vehicle) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'device' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 25, "question": "A _______ is a spacecraft that is designed to travel into space and back to earth several times.", "options": {"A": "a. plane", "B": "corporation", "C": "telecommunication", "D": "shuttle"}, "answer": "D", "hint": {"explanation": "Đáp án D. shuttle = tàu con thoi.", "rule": "Câu hoàn chỉnh: A shuttle is a spacecraft that is designed to travel into space and back to earth several times.\n'shuttle' mang nghĩa 'tàu con thoi', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. a. plane; B. corporation; C. telecommunication) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'shuttle' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 26, "question": "An economic _______ is a time when there is very little economic activity, which causes a lot of unemployment and poverty.", "options": {"A": "improvement", "B": "depression", "C": "development", "D": "mission"}, "answer": "B", "hint": {"explanation": "Đáp án B. depression = suy thoái.", "rule": "Câu hoàn chỉnh: An economic depression is a time when there is very little economic activity, which causes a lot of unemployment and poverty.\n'depression' mang nghĩa 'suy thoái', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. improvement; C. development; D. mission) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 27, "question": "In the future many large corporations will be wiped out and millions of jobs will be lost.", "options": {"A": "companies", "B": "services", "C": "supermarkets", "D": "farms"}, "answer": "A", "hint": {"explanation": "Đáp án A. companies = công ty, doanh nghiệp.", "rule": "Câu hoàn chỉnh: In the future many large corporations will be wiped out and millions of jobs will be lost. -> companies\n'companies' mang nghĩa 'công ty, doanh nghiệp', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. services; C. supermarkets; D. farms) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'companies' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 28, "question": "The more powerful weapons are, the more terrible the _______ is.", "options": {"A": "creativity", "B": "history", "C": "terrorism", "D": "technology"}, "answer": "C", "hint": {"explanation": "Đáp án C. terrorism = khủng bố.", "rule": "Câu hoàn chỉnh: The more powerful weapons are, the more terrible the terrorism is.\n'terrorism' mang nghĩa 'khủng bố', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. creativity; B. history; D. technology) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: tự đặt thêm một câu mới với từ 'terrorism' để chuyển từ trí nhớ ngắn hạn sang trí nhớ dài hạn."}}, {"id": 29, "question": "The medical community continues to make progress in the fight against cancer.", "options": {"A": "speed", "B": "expectation", "C": "improvement", "D": "treatment"}, "answer": "C", "hint": {"explanation": "Đáp án C. improvement = sự cải thiện.", "rule": "Câu hoàn chỉnh: The medical community continues to make progress in the fight against cancer. -> improvement\n'improvement' mang nghĩa 'sự cải thiện', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. speed; B. expectation; D. treatment) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là danh từ; hãy kiểm tra xem chỗ trống có cần một noun hay không."}}, {"id": 30, "question": "What are your plans for _______ future?", "options": {"A": "a", "B": "an", "C": "the", "D": "Ø"}, "answer": "C", "hint": {"explanation": "Đáp án C. the = mạo từ xác định.", "rule": "Đáp án là mạo từ xác định 'the'. Hãy kiểm tra xem danh từ phía sau có là trường hợp xác định, duy nhất hay đã được nhắc tới hay không.", "trick": "Mẹo nhớ: với giới từ và mạo từ, hãy học theo cụm cố định trong câu chứ không học rời từng từ."}}, {"id": 31, "question": "In the future, the number of tiny but _______ computers you encounter every day will number in the thousands, perhaps millions.", "options": {"A": "power", "B": "powerful", "C": "powerfully", "D": "powered"}, "answer": "B", "hint": {"explanation": "Đáp án B. powerful = mạnh mẽ.", "rule": "Câu hoàn chỉnh: In the future, the number of tiny but powerful computers you encounter every day will number in the thousands, perhaps millions.\n'powerful' mang nghĩa 'mạnh mẽ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (A. power; C. powerfully; D. powered) không đúng nghĩa, không đúng cụm từ hoặc không hợp loại từ trong vị trí này.", "trick": "Mẹo nhớ: đuôi từ này thường là tính từ; nó thường đứng trước danh từ hoặc sau linking verb."}}, {"id": 32, "question": "Advances in computing _______, from processing speed to network capacity and the internet, have revolutionized the way scientists work.", "options": {"A": "technology", "B": "technological", "C": "technologically", "D": "technologist"}, "answer": "A", "hint": {"explanation": "Đáp án A. technology = công nghệ.", "rule": "Câu hoàn chỉnh: Advances in computing technology, from processing speed to network capacity and the internet, have revolutionized the way scientists work.\n'technology' mang nghĩa 'công nghệ', nên khi điền vào câu sẽ hợp ngữ cảnh và tạo ý nghĩa tự nhiên nhất.\nCác phương án còn lại (B. technological; C. technologically; D. technologist) không đúng nghĩa, không đúng cụm từ
