<script>
const SM = {
  save(k,d) { try { localStorage.setItem(k, JSON.stringify(d)); } catch(e) { console.warn('Storage full'); } },
  load(k,def) { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : def; } catch(e) { return def; } },
  remove(k) { localStorage.removeItem(k); },
  saveResult(mod, id, score, total, answers) {
    const results = this.load('results_' + mod, {});
    results[id] = { score, total, answers, date: new Date().toISOString() };
    this.save('results_' + mod, results);
  },
  getResult(mod, id) { return (this.load('results_' + mod, {}))[id]; },
  getAllResults(mod) { return this.load('results_' + mod, {}); },
  getAvgScore(mod) {
    const r = this.getAllResults(mod);
    const vals = Object.values(r);
    if (!vals.length) return 0;
    return vals.reduce((s, v) => s + (v.score / v.total * 100), 0) / vals.length;
  },
  getCount(mod) { return Object.keys(this.getAllResults(mod)).length; },
  saveVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    if (!known[unit]) known[unit] = [];
    if (!known[unit].includes(wordId)) known[unit].push(wordId);
    this.save('vocab_known', known);
  },
  isVocabKnown(unit, wordId) {
    const known = this.load('vocab_known', {});
    return known[unit] && known[unit].includes(wordId);
  },
  getVocabKnownCount(unit) {
    const known = this.load('vocab_known', {});
    return known[unit] ? known[unit].length : 0;
  },
  getTotalVocabKnown() {
    const known = this.load('vocab_known', {});
    return Object.values(known).reduce((s, arr) => s + arr.length, 0);
  },
  resetAll() { if(confirm('Xóa toàn bộ dữ liệu lưu?')) { localStorage.clear(); location.reload(); } }
};

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTheme() {
  const theme = SM.load('theme', 'light');
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  SM.save('theme', next);
}
initTheme();

class Timer {
  constructor(display, onComplete) {
    this.display = display;
    this.onComplete = onComplete;
    this.remaining = 0;
    this.interval = null;
    this.running = false;
  }
  start(minutes) {
    this.remaining = minutes * 60;
    this.running = true;
    this.tick();
    this.interval = setInterval(() => this.tick(), 1000);
  }
  tick() {
    if (this.remaining <= 0) {
      this.stop();
      if (this.onComplete) this.onComplete();
      return;
    }
    const m = Math.floor(this.remaining / 60);
    const s = this.remaining % 60;
    this.display.textContent = '⏱ ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if (this.remaining <= 300) this.display.classList.add('warning');
    this.remaining--;
  }
  stop() { clearInterval(this.interval); this.running = false; }
  getElapsed(totalMinutes) {
    const elapsed = totalMinutes * 60 - this.remaining;
    return Math.floor(elapsed / 60) + ' phút ' + (elapsed % 60) + ' giây';
  }
}

__________________________________.", "answer": "will be built next month"}, {"id": 44, "type": "fill", "part": "D", "question": "Finding an apartment in a big city is not easy.🡪It is ________________________________________.", "answer": "not easy to find an apartment in a big city"}, {"id": 45, "type": "fill", "part": "D", "question": "We succeeded in digging the Panama canal.🡪We _________________________________________. II. Viết lại các câu sau sao cho nghĩa không thay đổi so với câu ban đầu, sửdụng từcho sẵn trong ngoặc", "answer": "managed to dig the Panama canal"}, {"id": 46, "type": "fill", "part": "D", "question": "There is no point in making him get up early. (WORTH)", "answer": "It is not worth making him get up early"}, {"id": 47, "type": "fill", "part": "D", "question": "She prefers staying at home to going out. (BETTER)", "answer": "She likes staying at home better than going out"}, {"id": 48, "type": "fill", "part": "D", "question": "He has never been late for work. (NEVER) 8", "answer": "Never has he been late for work"}, {"id": 49, "type": "fill", "part": "D", "question": "I fell asleep because the film was boring. (SO)", "answer": "The film was so boring that I fell asleep"}, {"id": 50, "type": "fill", "part": "D", "question": "Lan often cries when she meets with difficulties. (ACCUSTOMED)", "answer": "Lan is not accustomed to meeting difficulties without crying"}], "passages": {"passage1": "One of the main sources for the spreading of news and events throughout the world is the newspaper. The purpose of newspapers is to inform the public of political, social economic (26)________ entertainment happenings, among other things. Generally, there (27)________ three types of newspapers: daily newspapers, weekly newspapers, and special-interest newspapers. Daily newspapers publish (28)________ least one edition every weekday. Most dailies also have a weekend edition. Daily newspapers often have sections for news, sports, arts and entertainment, business and classified advertising. Weekly newspapers print once a week and cover news of interest to readers in a smaller area (29)________ that of a daily paper. They focus on local happenings rather than national or international events. Special-interest newspapers may publish daily, weekly, monthly, or even less frequently. They generally disseminate news of interest to a particular group of readers or feature news about a specific topic. Thanks to the development of the Internet, we can now get access to electronic newspapers. To some extent, e-newspapers are cheap, up-to-date, and convenient for most readers (30)________ the world.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Along with jogging and swimming, cycling is one of the best all-round forms of exercise. It can help to increase your strength and energy, giving you more efficient muscles and a stronger heart. But increasing your strength is not the only advantage of cycling. Because you’re not carrying the weight of your body on your feet, it’s a good form of exercise for people with painful feet or backs. However, with all forms of exercise it’s important to start slowly and build up gently. Doing too much too quickly can damage muscles that aren’t used to working. If you have any doubts about taking up cycling for health reasons, talk to your doctor and ask for his/her advice. Ideally you should be cycling at least two or three times a week. For the exercise to be doing you good, you should get a little out of breath. Don’t worry that if you begin to lose your breath, it could be dangerous and there must be something wrong with your heart. This is simply not true; shortness of breath shows that the exercise is having the right effect. However, if you find you are in pain then you should stop and take a rest.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Nowadays, people are destroying rain forests of the earth seriously. It is e1": "Every child in England must receive full time education (26) _____ the age of five to sixteen. Many parents send their children to state schools where the tuition and the equipment, textbooks and exercise books (27)_____ free. About 5% of children go to fee-paying school. Under the old system, children attended primary school (from five to eleven) which was followed by a secondary school course (from eleven to fifteen or over). (28) _____ eleven every child had to sit for the eleven –plus examination. It consisted (29)_____ tests in English, Arithmetic and intelligence tests. Those with the highest marks (about 20% of the children) went (30)_____ grammar school. The others went to technical school.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Almost a hundred thousand people were killed and half a million homes destroyed as a result of an earthquake in Tokyo in 1923. The earthquake began a minute before the noon when the inhabitants of Tokyo were cooking their midday meals. Thousands of stoves were overturned as soon as the earth began to shake. As a result, small fires broke out everywhere and quickly spread. The fire engines were prevented from going to help because many of the roads had cracked open. It was impossible to use fire fighting equipment as most of the water pipes had burst. Consequently, over ninety percent of the damage caused by fire rather than by the collapse of the buildings.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Jeans are very popular with (36)________people all over the world. Some people say that jeans are the “uniform” of youth. But they haven’t always been popular. The story of jeans (37)________ almost two hundred years ago. People in Genoa, Italy made pants. The cloth made in genoa was (38)________ “jeanos”. The pants were called “jeans”. In 1850, a saleman in California began selling pants made of canvas. His name was Levi Strauss. Because the vice"}], "passages": {"passage1": "Two popular traditions at Christmas are: decorating the home (26) ______ singing the Christmas carols. The home is the center of the Christmas celebration. Inside, an evergreen tree is usually placed in the corner (27) ______ the living room. Children and their parents wrap string of colorful lights around the tree, they hang ornaments on the branches. A star or angle often crowns the top. Careful-wrapped gifts (28) ______ placed beneath. Outside, families often string lights around the windows and wind light around trees and shrubs in the front yard. As the families decorate their homes, they often put on Christmas record. Almost every family has (29) ______ least one favorite album or compact disc. School children of all ages perform Christmas concerts for their parents and communities. On Christmas’ Eve, family members gather around Christmas tree to (30) ______ traditional songs such as Jingle bells and Silent night and then give presents to each other.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "It’s not enough that the computer is invading our work and play world .It has started to invade our shopping world as well. Shopping by computer, or teleshopping, is a phenomenon that is beginning to appear in homes, stores, hotels, and even airports. The service allows the shopper to look at electronic catalogs and to order items, such as dishes, clothing or concert tickets, without leaving the computer. This modern way of shopping is convenient, specially for busy people.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Environmental (36) _________ is one of the most serious problems (37) _________ mankind today. Air, water and soil are necessary to the survival of all (38) _________ things. Badly polluted air can (39) _________ illness and even death. Polluted water (40) _________ many kinds of wild animals and other marine life. Pollution of soil reduc  "type": "fill", "part": "D", "question": "Learning English is very necessary. →It is _______________________________________________.", "answer": "very necessary to learn English"}, {"id": 44, "type": "fill", "part": "D", "question": "Although his leg was broken, he managed to get out of the car. →In spite of his _________________.", "answer": "broken leg, he managed to get out of the car"}, {"id": 45, "type": "fill", "part": "D", "question": "If someone doesn’t put the coal in, the fire will go out. →Unless ______________________________. II. Viết lại các câu sau sao cho nghĩa không thay đổi so với câu ban đầu, sửdụng từcho sẵn trong ngoặc đơn (không được thay đổi dạng của từtrong ngoặc).", "answer": "someone puts the coal in, the fire will go out"}, {"id": 46, "type": "fill", "part": "D", "question": "He spent two days decorating the living room. (TOOK)", "answer": "It took him two days to decorate the living room"}, {"id": 47, "type": "fill", "part": "D", "question": "Mary’s sister doesn’t speak English as well as her. (BETTER)", "answer": "Mary speaks English better than her sister"}, {"id": 48, "type": "fill", "part": "D", "question": "She’s sorry she can’t play the piano. (WISHES)", "answer": "She wishes she could play the piano"}, {"id": 49, "type": "fill", "part": "D", "question": "The day was so cold that we stayed indoors. (SUCH)", "answer": "It was such a cold day that we stayed indoors"}, {"id": 50, "type": "fill", "part": "D", "question": "She had completely forgotten him. (MIND)", "answer": "She has completely put him out of her mind"}], "passages": {"passage1": "electricity, effective, nuclear, heat, pollution, energy Are you looking for a cheap, clean, (26) ________ source of power that doesn’t cause (27) ________ or waste natural resources? Look no further than solar (28) ________ from our Sun. At present, most of our (29) ___________ comes from the use of coal and gas, oil or (30) ___________ power. This power could be provided by the Sun. one percent of the solar energy that reaches the Earth is enough to provide power for the total population.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Smoking causes lung cancer, which is the number one cancer among men. Ninety percent of the people who get lung cancer die. Smoking is also the leading cause of mouth cancer, tongue cancer, and throat cancer. Many smokers have heart disease and pneumonia. Smoking causes one million early deaths in the world every year. Smokers not only harm themselves but also harm others. Smokers breathe smoke out into the air. They breathe it out on their children and their wives or husbands. Children whose parents smoke have more breathing and lung problems than other children. Women who are married to smokers are more likely to have lung cancer than those married to non-smokers. We are all aware that smoking is bad. So why do people smoke?", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Plants supply man with food clothing, and shelter- his most important needs. Many of our most useful medicines are also made (36)_________plants. In addition, plants add beauty and pleasure to our lives. Most people enjoy the smell of flowers, the sight field of waving grain, and the quiet of a forest. Not (37)_______plants are helpful to man. Some species grow in fields and gardens as weeds that choke off useful plants. Tiny hits of pollen from (38)_______plants cause such (39)_________as asthma and hay fever. Other plants destroy millions of dollars (40)_______of crops yearly.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de14": {"title": "Đề 14 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "information", "B": "informative", "C": "forward", "D": "formal"}, "answer": "A", "section": "sound", "options_html": {"A": "in<u>for</u>mation", "B": "in<u>for</u>mative", an you ‘d better spend at last 5 minutes saying hello. In Pakistan you mustn’t wink. It is offensive. In the Middle East you must never use the left hand for greeting, eating, drinking or smoking. Also, you should care not to admire anything in your host’s home. They will feel that they have to give it to you.In Russia you must your hosts drink for drink or they will think you are unfriendly. In Thailand you should clasp your hands (29) _______ and lower your head and your eyes when you greet someone. In America you should eat your hamburger with both hands and as quickly as (30) _______. You shouldn’t try to have a conversation until it is eaten.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Devastating floods along the coast have left many people homeless. People are asked to help by donating food, clothes, furniture, and other supplies to the Assistance Fund. Donations of bottled water are especially needed, since the floods have disrupted the local water supply. In addition, volunteers are needed to travel to the flooded area to help distribute the donations.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Today, computer companies sell many different programs for computers. First, there are programs for doing math problems. (36)_________, there are programs for scientific studies. Third, some programs are like fancy typewriters. They are often used by writers and business people. Other (37)_________are made for courses in schools and universities. And finally, there are programs for fun. They include word games and puzzles for children and adults. There are many wonderful new computer programs, but there are other reasons to like (38)_________. Some people like the way computers hum and sing when they (39)_________. It is a happy sound, like the sounds of toy and childhood. Computers also have lights and pretty pictures. And computers even seem to have personalities. That may sound strange, but computers seem to have feelings. Sometimes they seem happy, sometimes they seem angry. It is easy (40)_________they are like people.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de15": {"title": "Đề 15 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "control", "B": "folk", "C": "remote", "D": "documentary"}, "answer": "B", "section": "sound", "options_html": {"A": "c<u>o</u>ntrol", "B": "f<u>o</u>lk", "C": "rem<u>o</u>te", "D": "d<u>o</u>cumentary"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "access", "B": "website", "C": "violent", "D": "internet"}, "answer": "C", "section": "sound", "options_html": {"A": "acc<u>e</u>ss", "B": "w<u>e</u>bsite", "C": "viol<u>e</u>nt", "D": "int<u>e</u>rnet"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "wanted", "B": "needed", "C": "dedicated", "D": "watched"}, "answer": "D", "section": "sound", "options_html": {"A": "want<u>ed</u>", "B": "ne<u>ed</u>ed", "C": "d<u>ed</u>icated", "D": "watch<u>ed</u>"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "interview", "B": "industry", "C": "essential", "D": "difficult"}, "answer": "C", "section": "stress"}, {"id": 5, "type": "mc", "part": "A", "question": "", "options": {"A": "extreme", "B": "generous", "C": "lonely", "D": "clothing"}, "answer": "A", "section": "stress"}, {"id": 6, "type": "fill", "part": "B", "question": "When I looked round the door, the baby (sleep) _________ quietly.", "answer": "was sleeping"}, {"id": 7, "type": "fill", "part": "B", "question": "He hates (stare) _________ at while he is out in the street.", "answer": "being stared"}, {"id": 8, "type": "fill", "part": "B", "question": "I wish I (listen) _________ to him. Now it is too late.", "answer": "had listened"}, {"id": 9, "type": "fill", "part": "B", "question": "They suggested (ban) _________ the sale of alco  "mc", "part": "C", "question": "In what year did the invention of phnograph occur?", "options": {"A": "1876", "B": "1877", "C": "1878", "D": "the article does not say"}, "answer": "B", "reading_passage": "passage2"}, {"id": 33, "type": "mc", "part": "C", "question": "What was Edison working on when he created the phonograph?", "options": {"A": "A telegraph repeater", "B": "A telegraph diaphragm", "C": "A telephone repeater", "D": "A telephone diaphragm"}, "answer": "C", "reading_passage": "passage2"}, {"id": 34, "type": "mc", "part": "C", "question": "According to the passage, how was the phonograph made?", "options": {"A": "With a telephone needle and a recorder", "B": "From a recording of a telegraph", "C": "With only a telegraph repeater", "D": "From a combination of telephone & telegraph part"}, "answer": "D", "reading_passage": "passage2"}, {"id": 35, "type": "mc", "part": "C", "question": "According to the passage, how did Edison test his new invention?", "options": {"A": "He made improvements to the machine.", "B": "He used a carbon transmitter.", "C": "He read a children’s rhyme.", "D": "He produced the audience voice."}, "answer": "C", "reading_passage": "passage2"}, {"id": 36, "type": "mc", "part": "C", "question": "(36) ______", "options": {"A": "be used", "B": "is used", "C": "be using", "D": "to be used"}, "answer": "A", "cloze_passage": "passage3"}, {"id": 37, "type": "mc", "part": "C", "question": "(37) ______", "options": {"A": "the earth", "B": "the planet", "C": "the sun", "D": "the moon"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 38, "type": "mc", "part": "C", "question": "(38) ______", "options": {"A": "yards", "B": "roofs", "C": "gardens", "D": "doors"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 39, "type": "mc", "part": "C", "question": "(39) ______", "options": {"A": "is", "B": "be", "C": "are", "D": "was"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 40, "type": "mc", "part": "C", "question": "(40) ______", "opti swer": "The man was too surprised to say a word"}, {"id": 50, "type": "fill", "part": "D", "question": "She never seems to succeed even though she studies much. (AS)", "answer": "Much as she studies, she never seems to succeed"}], "passages": {"passage1": "Singapore is (26) ______ island city of about three million people. It’s a beautiful city with lots of parks and open spaces. It’s also a very clean city. Most of the people (27) ______ in high-rise flats in different parts of the island. The business district is very modern with (28) ______ of high new office buildings. Singapore also has some nice older sections. In Chinatown, there (29) ______ rows of old shop houses. The government buildings in Singapore are very beautiful and date from the colonial days. Singapore is famous (30) ______ its shops and restaurants. There are many good shopping centers. Most of the goods are duty free. Singapore’s restaurants sell Chinese, Indian, Malay and European food, and the prices are quite reasonable.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "The invention of the phonograph happened quite by accident. Thomas Edison moved to Menlo Park, New Jersy in 1876, where he established an industrial research laboratory. There, Edison was working on a carbon telephone transmitter to improve the existing Bell telephone system. In that laboratory a year later, Edison invented the phonograph while he was trying to improve a telegraph repeater. He attached a telephone diaphragm to the needle in the telegraph repeater; in this way, he was able to reproduce a recording that could be played back. After he made some improvements to the machine, he tested it. He recited “Mary Had a Little Lamb” into the machine and played his voice back to a very surprised audience.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Solar energy is a long lasting source of energy, and it can (36)_____almost anywhere. To generate solar energy, we only need solar cells and (37)______! Solar cells can easily be installed on house (38)_____, so we don’t need any new space. Compared to other renewable sources, they also possess many advantages: wind and water power rely on turbines which (39)________noisy, expensive and which take up large space. Solar cells are totally silent and (40)________. As they have no moving parts, they require little maintenance and have a long lifetime.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de16": {"title": "Đề 16 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "chemistry", "B": "kitchen", "C": "watch", "D": "catch"}, "answer": "A", "section": "sound", "options_html": {"A": "<u>ch</u>emistry", "B": "kit<u>ch</u>en", "C": "wat<u>ch</u>", "D": "cat<u>ch</u>"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "moment", "B": "slogan", "C": "comb", "D": "opposite"}, "answer": "D", "section": "sound", "options_html": {"A": "m<u>o</u>ment", "B": "sl<u>o</u>gan", "C": "c<u>o</u>mb", "D": "<u>o</u>pposite"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "produce", "B": "huge", "C": "lunar", "D": "cure"}, "answer": "D", "section": "sound", "options_html": {"A": "prod<u>u</u>ce", "B": "h<u>u</u>ge", "C": "l<u>u</u>nar", "D": "c<u>u</u>re"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "surprising", "B": "astonishing", "C": "amazing", "D": "interesting"}, "answer": "D", "section": "stress"}, {"id": 5, "type": "mc", "part": "A", "question": "", "options": {"A": "friendly", "B": "extra", "C": "along", "D": "orphanage"}, "answer": "C", "section": "stress"}, {"id": 6, "type": "fill", "part": "B", "question": "The policeman warned us (not go) _________ there.", "answer": "not to go"}, {"id": 7, "type": "fill", "part": "B", "question": "I look forward to (have) _________ the resolution to the probl sappointed me when breaking the promise to help me out. (TEETH)", "answer": "He really kicked me in the teeth when he broke his promise to help me out"}], "passages": {"passage1": "Smoking causes lung cancer, which is the number one cancer among men. Ninety percent (26) _________ the people who get lung cancer die. Smoking is also the leading cause of mouth cancer, tongue cancer, and throat cancer. Many smokers have heart disease and pneumonia. Smoking causes one million early deaths (27) _________ the world every year. Smokers not (28) _________ harm themselves but also harm others. Smokers breathe smoke out into the air. They breathe it out on their children and their wives or husbands. Children whose parents smoke have more breathing and lung problems (29) _________ other children. Women who are married (30) _________ smokers are more likely to have lung cancer than those married to non-smokers.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Last year, we had a nice holiday. My friend and I went to the seaside for a month. I had been to the seaside several times before, but this was the first time for my friend. Naturally, it was the great event for him. Finally, the day came. It was a fine morning. We got up very early because we wanted to leave home after breakfast. We made the journey by car. We reached the seaside at noon. We spent many hours on the beach. We enjoyed making castles and channels in the sand. People said we ought to spend at least a few weeks at the seaside. If we could stay longer, so much the better.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "It can be shown in facts and figures that cycling is the cheapest, most convenient, and most environmentally desirable form of transport (36)______ towns, but such cold calculations do not mean much on a frosty winter morning. The real appeal of cycling is that it is so (37)______. It has none of the difficulties and tensions of other ways of travelling so you are more cheerful after a ride, even through the rush hour. The first thing a non-cyclist says to you is: “But isn’t it (38) ______ dangerous?” It would be foolish to deny the danger of sharing the road with motor vehicles and it must be admitted that there are an alarming (39) ______ of accidents involving cyclists. However, although police records (40) ______ that the car driver is often to blame, the answer lies with the cyclist. It is possible to ride in such a way as to reduce risks to a minimum. 36.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de17": {"title": "Đề 17 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "kids", "B": "roofs", "C": "banks", "D": "hats"}, "answer": "A", "section": "sound", "options_html": {"A": "kid<u>s</u>", "B": "roof<u>s</u>", "C": "bank<u>s</u>", "D": "hat<u>s</u>"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "heading", "B": "clearing", "C": "realize", "D": "Korea"}, "answer": "A", "section": "sound", "options_html": {"A": "h<u>ea</u>ding", "B": "cl<u>ea</u>ring", "C": "r<u>ea</u>lize", "D": "Kor<u>ea</u>"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "go", "B": "game", "C": "give", "D": "large"}, "answer": "D", "section": "sound", "options_html": {"A": "<u>g</u>o", "B": "<u>g</u>ame", "C": "<u>g</u>ive", "D": "lar<u>g</u>e"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "exist", "B": "avoid", "C": "support", "D": "notice"}, "answer": "D", "section": "stress"}, {"id": 6, "type": "fill", "part": "B", "question": "Many foreign teachers (teach) _______ English for ten years.", "answer": "have taught"}, {"id": 7, "type": "fill", "part": "B", "question": "When I looked round the door, the baby (sleep) _______ quietly.", "answer": "was sleeping"}, {"id": 8, "type": "fill", "part": "B", "question": "The teache r to us is very friendly"}, {"id": 48, "type": "fill", "part": "D", "question": "Although his leg was broken, he managed to get out of the car. (SPITE)", "answer": "In spite of his broken leg, he managed to get out of the car"}, {"id": 49, "type": "fill", "part": "D", "question": "This must be kept secret. (KNOW)", "answer": "Nobody must know about this"}, {"id": 50, "type": "fill", "part": "D", "question": "I admitted it was my fault for burning the toast. (BLAME) 37", "answer": "I took the blame for burning the toast"}], "passages": {"passage1": "can important on like than has Many tourists (26) _______ to send postcards to their friends and family. They send them when they are (27) _______ holiday. These postcards often have pictures on one side and a message (28) _______ be written on the other. The pictures on them are better (29) _______ the photos they take. The first postcards were sent at the end of the nineteenth century. There was a picture of a town on them. Later on, they had pictures showing (30) _______ events. People liked to see them because there were not any pictures in the newspapers then.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Along with jogging and swimming, cycling is one of the best all-round forms of exercise. It can help to increase your strength and energy, giving you more efficient muscles and a stronger heart. But increasing your strength is not the only advantage of cycling. Because you’re not carrying the weight of your body on your feet, it’s a good form of exercise for people with painful feet or backs. However, with all forms of exercise it’s important to start slowly and build up gently. Doing too much too quickly can damage muscles that aren’t used to working. If you have any doubts about taking up cycling for health reasons, talk to your doctor and ask for his/her advice. Ideally you should be cycling at least two or three times a week. For the exercise to be doing you ve at a particular time, you should not arrive exactly on time or earlier (30) _______ the expected time, because this is considered to be potentially inconvenient and therefore rude, as the host may not be ready.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "It is very important to have healthy teeth. Good teeth help us to chew our food. They also help us to look nice. How does a tooth go bad? They decay begins in a little crack in the enamel covering of the tooth. This happens after germs and bits of food have collected there. Then the decay slowly spreads inside the tooth. Eventually, poison goes into the blood, and we may feel quite ill. How can we keep our teeth healthy? Firstly, we ought to visit our dentist twice a year. He can fill the small holes in our teeth before they destroy the teeth. He can examine our teeth to check that they are growing in the right way. Unfortunately, many people wait until they have toothache before they see a dentist. Secondly, we should brush our teeth with a toothbrush and fluoride toothpaste at least twice a day – once after breakfast and once before we go to bed. We can also use wooden toothpicks to clean between our teeth after a meal. Thirdly, we should eat food that is good for our teeth and our body: milk, cheese, fish, brown bread, potatoes, red rice, raw vegetables, and fresh fruit. Chocolates, sweets, biscuits and cakes are bad, especially when we eat them between meals. They are harmful because they stick to our teeth and cause decay.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Isaac Newton, one of the greatest scientists, was born __(36)__ December 25th, 1642 in a small village in Wool Thorpe in England. His father was a poor __(37)__. When the boy was fourteen, his father died. Newton __(38)__ school and helped his mother on the farm. Because he was fun in physics and mathematics, Newton was sent to school. __(39)__ he left high school, Newton studied at Cambridge University. In 1667 he became a professor on mathematics at the university. His greatest discovery is the __(40)__ of gravitation. He died in 1727.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de20": {"title": "Đề 20 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "thank", "B": "they", "C": "these", "D": "than"}, "answer": "A", "section": "sound", "options_html": {"A": "<u>th</u>ank", "B": "<u>th</u>ey", "C": "<u>th</u>ese", "D": "<u>th</u>an"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "walks", "B": "cups", "C": "students", "D": "pens"}, "answer": "D", "section": "sound", "options_html": {"A": "walk<u>s</u>", "B": "cup<u>s</u>", "C": "<u>s</u>tudents", "D": "pen<u>s</u>"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "talked", "B": "watched", "C": "lived", "D": "stopped"}, "answer": "C", "section": "sound", "options_html": {"A": "talk<u>ed</u>", "B": "watch<u>ed</u>", "C": "liv<u>ed</u>", "D": "stopp<u>ed</u>"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "emigrate", "B": "Atlantic", "C": "criteria", "D": "policeman"}, "answer": "A", "section": "stress"}, {"id": 5, "type": "mc", "part": "A", "question": "", "options": {"A": "facilities", "B": "particular", "C": "inhabitant", "D": "governmental"}, "answer": "D", "section": "stress"}, {"id": 6, "type": "fill", "part": "B", "question": "We (not meet) _______ Nam since he left school.", "answer": "haven't met"}, {"id": 7, "type": "fill", "part": "B", "question": "I would like (visit) ______ Holland.", "answer": "to visit"}, {"id": 8, "type": "fill", "part": "B", "question": "John F.Kennedy wouldn’t have died in 1963 if he ( not go) _______ to Dallas.", "answer": "hadn't gone"}, {"id": 9, "type": "fill", "part": "B", "question": "Were I (know) _______ the truth, I would tell you about it.", "answer ch", "D": "people"}, "answer": "B"}, {"id": 21, "type": "mc", "part": "B", "question": "Vincent: What are you going to do for your birthday? - Neil: “_________”", "options": {"A": "Oh yes! I forgot it was my birthday.", "B": "I thought maybe we could all go to the beach.", "C": "I hope it will be sunny.", "D": "I think we should have gone earlier."}, "answer": "B"}, {"id": 22, "type": "mc", "part": "B", "question": "Jane hardly ever goes out at night, _______?", "options": {"A": "doesn’t she", "B": "does she", "C": "will she", "D": "won’t she"}, "answer": "B"}, {"id": 23, "type": "mc", "part": "B", "question": "The school arranges a ___ to Brighton every year.", "options": {"A": "trip", "B": "route", "C": "passage", "D": "travel"}, "answer": "A"}, {"id": 24, "type": "mc", "part": "B", "question": "You all look tired. Let’s ___ a rest.", "options": {"A": "have", "B": "get", "C": "take", "D": "Both A and C"}, "answer": "D"}, {"id": 25, "type": "mc", "part": "B", "question": "No sooner ________ than I smelt something burning.", "options": {"A": "I came into the kitchen", "B": "did I come to the kitchen", "C": "had I come into the kitchen", "D": "I have come into the kitchen"}, "answer": "C"}, {"id": 26, "type": "fill", "part": "C", "question": "(26) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 27, "type": "fill", "part": "C", "question": "(27) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 28, "type": "fill", "part": "C", "question": "(28) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 29, "type": "fill", "part": "C", "question": "(29) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 30, "type": "fill", "part": "C", "question": "(30) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 31, "type": "mc", "part": "C", "question": "More than two hundred years ago _______________.", "options": {"A": "the environment was polluted as much as it is today", "B": "air was polluted badly", "C": "people knew almost nothing about environmental pollution", "D": "people faced up to pollution"}, "answer": "C", "reading_passage": "passage2"}, {"id": 32, "type": "mc", "part": "C", "question": "Nowadays, many people are concerned about _______________.", "options": {"A": "the poisonous air.", "B": "the polluted water", "C": "the wastes from the factories.", "D": "the environmental pollution."}, "answer": "D", "reading_passage": "passage2"}, {"id": 33, "type": "mc", "part": "C", "question": "According to the passage, people know that motorbikes and cars emit dangerous gases ____________.", "options": {"A": "so they do not travel by motorbikes and cars.", "B": "so they prefer traveling by bicycles", "C": "but they still prefer traveling by motorbikes and cars", "D": "and they enjoy traveling on foot."}, "answer": "C", "reading_passage": "passage2"}, {"id": 34, "type": "mc", "part": "C", "question": "Factory owners _______________.", "options": {"A": "know nothing about pollution", "B": "pollute water and soil", "C": "spend a lot of money on treating wastes", "D": "don’t treat industrial wastes safely"}, "answer": "D", "reading_passage": "passage2"}, {"id": 35, "type": "mc", "part": "C", "question": "Which of the followings is NOT true?", "options": {"A": "In former days, people led a healthy life.", "B": "People have no awareness of the danger  of pollution", "C": "Water is now heavily contaminated by industrial wastes.", "D": "It’s harmful for our health if rubbish is spread over our areas."}, "answer": "B", "reading_passage": "passage2"}, {"id": 36, "type": "mc", "part": "C", "question": "(36) ______", "options": {"A": "solution", "B": "problem", "C": "obstacle", "D": "difficulty"}, "answer": "A", "cloze_passage": "passage3"}, {"id": 37, "type": "mc", "part": "C", "question": "(37) ______", "options": {"A": "with", "B": "in", "C": "on", "D": "along"}, "answer": "B", "cloze_passage": "passage3"}, {"id": 38, "type": "mc", "part": "C", "question": "(38) ______", "options": {"A": "money", "B": "donation", "C": "profit", "D": "living"}, "answer": "D", "cloze_passage": "passage3"}, {"id": 39, "type": "mc", "part": "C", "question": "(39) ______", "options": {"A": "helpful", "B": "charitable", "C": "useful", "D": "remarkable"}, "answer": "B", "cloze_passage": "passage3"}, {"id": 40, "type": "mc", "part": "C", "question": "(40) ______", "options": {"A": "it", "B": "them", "C": "her", "D": "us"}, "answer": "B", "cloze_passage": "passage3"}, {"id": 41, "type": "fill", "part": "D", "question": "It’s very wonderful to spend the weekend in the countryside. 🡪Spending _______________________.", "answer": "the weekend in the countryside is very wonderful"}, {"id": 42, "type": "fill", "part": "D", "question": "You have read this novel, haven’t you? 🡪Have you ______________________________________.", "answer": "ever read this novel"}, {"id": 43, "type": "fill", "part": "D", "question": "I would prefer you to do computer science. 🡪I’d rather ___________________________________.", "answer": "you did computer science"}, {"id": 44, "type": "fill", "part": "D", "question": "He didn’t get his visa until last Monday. 🡪It was __________________________________________.", "answer": "not until last Monday that he got his visa"}, {"id": 45, "type": "fill", "part": "D", "question": "Since we had nothing else to do, we decided to go for a walk. 🡪Having _______________________. II. Viết lại các câu sau sao cho nghĩa không thay đổi so với câu ban đầu", "answer": "nothing else to do, we decided to go for a walk"}, {"id": 46, "type": "fill", "part": "D", "question": "It was raining hard, so we had to cancel the game. (BECAUSE)", "answer": "Because it was raining hard, we had to cancel the game"}, {"id": 47, "type": "fill", "part": "D", "question": "You can’t possibly expect me to have supper ready by 8 o’clock. (QUESTION)", "answer": "It is out of the question for me to have supper ready by 8 o'clock"}, {"id": 48, "type": "fill", "part": "D", "question": "I have never been here before. (FIRST)", "answer": "This is the first time I have been here"}, {"id": 49, "type": "fill", "part": "D", "question": "He joined the army as soon as he had finished school. (SOONER)", "answer": "No sooner had he finished school than he joined the army"}, {"id": 50, "type": "fill", "part": "D", "question": "I want to be left alone. (DISTURBED) 43", "answer": "I don't want to be disturbed"}], "passages": {"passage1": "Music influences people in different ways or the same person differently at different times. Music may seem to influence people differently. That is because people can react differently to the music. We are able (26) _________ apply a choosing process to the music we hear. If someone hates jazz, then a jazz piece with a positive effect (27) __________ probably not make him feel good. A happy song might appear to make an angry person angrier, yet it is not the music itself that is creating the anger; rather it is the positive effect of the music. The angry person does (28) _______ want to accept the song's happy feeling: it points out his already existing anger, and makes that anger come to the surface. When a piece of music is played and we are listening to it, our body, mind, and feelings are being affected. The musicians of ancient cultures such (29) ________ China, India, Turkey and Greece understood the effects of music. In fact, Pathagoras, in ancient Greece, introduced a whole science that concerned them. Because the musicians of these ancient cultures understood these effects, they created music that was positive, uplifting, and beneficial. (30) ________ the effects of music are better understood, the next step is to gain a better understanding of the music around us, and what effect it is actually having.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "More than two hundred years ago, the term “environmental pollution” was quite strange to people, they lived healthily, drank pure water, and breathed fresh air. Nowadays, the situation is quite different. People all over the world are worried about things that are happening to the environment. Actually it is man that is destroying the surroundings with many kinds of wastes. Everybody knows that motorbikes and cars emit dangerous gases that cause poisonous air and cancer, but no one wants to travel on foot or by bicycle. Manufacturers know that wastes from factories make water and soil polluted, but they do not want to spend a lot of their money on treating the wastes safely. Scattering garbage is bad for our health, but no one wants to spend time burying it. Is it worth talking a lot about pollution?", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "As a young girl, Oseola McCarty dreamed of becoming a nurse. However, her family duty stood as a (n) ____ (36) to educational goals. McCarty left school after completing the sixth. Since her family was one of washerwomen, McCarty followed ____ (37) their footsteps. She cleaned other people's clothes for over seventy years. Due to good work and saving habits, McCarty, a washerwoman, accumulated a great deal of money. She made a ______ (38) of $150,000 - a large portion of her life savings - to the University of Southern Mississippi to help needy students. She was 88 years old and had never married. She did not have any children. She did not own a car. From this simple and frugal life, she was able to impress the world with a significant _______ (39) act. Though she was unable to complete her own education, it was her intention that her gift would make ______ (40) possible for many others in financial need to do so. Now, with McCarty's support, specifically African American students have an opportunity to fulfill their dreams of a college education.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de21": {"title": "Đề 21 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", hough his leg was broken, he managed to get out of the car. (FACT)", "answer": "In spite of the fact that his leg was broken, he managed to get out of the car"}, {"id": 50, "type": "fill", "part": "D", "question": "They sent him to prison for three years. (SENTENCED)", "answer": "He was sentenced to three years in prison"}], "passages": {"passage1": "We can develop alternative sources of energy, and unless we try we'll never succeed. Instead of burning fossil fuels we should be concentrating on more economical uses of electricity, because electricity can be produced from any sources of energy. If we didn't waste so much energy, our resources would last longer. We can save more energy by conservation than we can produce for the same money. Unless we do research on solar energy, wind power, tidal power, hydroelectric plants... our fossil fuels will run out and we'll all freeze or starve to death. Several countries are spending much more time and money on research because the energy from the sun. the waves, and the winds last forever. We won't really survive unless we start working on cleaner and safer sources of energy.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Although no one knows for certain who the original Saint Valentine was, once a year, on February 14, there is a day in his honor. Some historians believe that the original Saint Valentine was a priest who lived in the city of Rome about 300 years after the birth of Christ. The emperor of Rome was not a Christian and refused to allow people to be married in a Christian ceremony. Saint Valentine didn’t obey the emperor and performed many Christian marriages in spite of the emperor’s order. When the Romans found out, they sent Saint Valentine to prison and later killed him. While his romantic efforts to help many Christians in love cost him his life, he was honored in his own days. But his story has been mostly forgotten after people have come to celebrate Valentine’s Day as a special time for sweethearts. On Valentine’s Day, people express their affections by sending Valentine cards to friends, families, boyfriends, and girlfriends.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Two British policemen were sent to investigate a flying saucer on March 31, 1989, the day before April Fool's Day. When the policemen arrived at a field in Survey, they saw a small figure wearing a silver space (36) ________ walking out of a spacecraft. Immediately the police ran off in the opposite direction. Reports revealed that the alien was in fact a small person, and the flying saucer was a hot air balloon that had been specially built to look (37) _______ a UFO by Richard Branson, the 36- year-old chairman of Virgin Records. Branson had planned to (38) _______ the balloon in London's Hyde Park on April 1. However, a wind change had brought him down in a Survey field. The police received a lot of phone calls from terrified motorists as the balloon drifted over the motorway. One lady was so (39) _________ by the incident that she was crying as she was (40) ________ the UFO to a radio station.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de22": {"title": "Đề 22 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "minimize", "B": "article", "C": "dynamite", "D": "pesticide"}, "answer": "B", "section": "sound", "options_html": {"A": "m<u>i</u>nimize", "B": "art<u>i</u>cle", "C": "dynam<u>i</u>te", "D": "pest<u>i</u>cide"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "thunder", "B": "weather", "C": "clothing", "D": "therefore"}, "answer": "A", "section": "sound", "options_html": {"A": "<u>th</u>under", "B": "wea<u>th</u>er", "C": "clo<u>th</u>ing", "D": "<u>th</u>erefore"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "takes", "B": "laughs", "C": "volumes", tes ago"}, {"id": 49, "type": "fill", "part": "D", "question": "I’d prefer you to start work next week. (RATHER) 47", "answer": "I'd rather you started work next week"}, {"id": 50, "type": "fill", "part": "D", "question": "There is no ice-cream left. (RUN)", "answer": "We have run out of ice-cream"}], "passages": {"passage1": "activities upload variety posts search others A common way for people to socialize these days is to spend time in chat forums. These usually have several different chat rooms related to a (26) _______ of interests and hobbies where you can talk to like-minded people. Other popular online (27) _______ include microblogging, in which people make very short comments about things, as well as file-sharing sites, where people (28) _______ music, videos or photos to share with (29) _______. Whatever your interests, you can find sites related to just about any leisure activity simply by entering key words into a (30) _______ engine.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Today almost everyone walking down the street has at least one mobile phone in their pocket. That is because many mobile phones are upgraded every year around the world, and most people are interested in changing their old mobile phone for a new one. There has been an estimated number of 90 million unwanted mobile phones in the UK alone! This mountain weighs around 12,000 tonnes, but only about 5% a of it is recycled. What makes us worried most is that mobile phones contain harmful chemicals which are released into the environment when phones begin to degrade and, in addition, large amounts of carbon dioxide are also produced during the manufacture of phones. It seems that the more modern mobile phones become, the worse our environment gets.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Mr. Brown and some volunteer conservationists are on a very dirty beach now. Today they are ready (36) __________ the beach a clean and beautiful place again. After listening to Mr. Brown’s instryctions, they qre divided (37) __________ three again. After listening to Mr. Brown’s Group should check the sand, and group 3 has to check among the rocks. Garbage must be put into plastic bags, and they will be (38) __________ by Mr. Joness. He will take the bags to the garbage dump. Each member will (39) __________ given a map to find the right place. They won’t eat the picnic lunch provided by Mrs. Smith until the whose area is clean. They are all enger to work hard so as to refresh this (40) __________ Area.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de23": {"title": "Đề 23 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "exchange", "B": "reach", "C": "chance", "D": "chemistry"}, "answer": "D", "section": "sound", "options_html": {"A": "ex<u>ch</u>ange", "B": "rea<u>ch</u>", "C": "<u>ch</u>ance", "D": "<u>ch</u>emistry"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "goose", "B": "foot", "C": "booth", "D": "noodle"}, "answer": "B", "section": "sound", "options_html": {"A": "g<u>oo</u>se", "B": "f<u>oo</u>t", "C": "b<u>oo</u>th", "D": "n<u>oo</u>dle"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "booked", "B": "looked", "C": "naked", "D": "ticked"}, "answer": "C", "section": "sound", "options_html": {"A": "boo<u>ked</u>", "B": "loo<u>ked</u>", "C": "na<u>ked</u>", "D": "tic<u>ked</u>"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "cover", "B": "account", "C": "install", "D": "prevent"}, "answer": "A", "section": "stress"}, {"id": 5, "type": "mc", "part": "A", "question": "", "options": {"A": "questionnaire", "B": "recommend", "C": "introduce", "D": "concentrate"}, "answer": "D", "section": "stress"}, {"id": 6, "type": "fill", "part": "B", "question": "I‘ve decided (stop) _______ smoking.", e languages fluently. (PRIDES)", "answer": "Anne prides herself on her ability to speak five languages fluently"}, {"id": 48, "type": "fill", "part": "D", "question": "It was such bad news that Helen burst into tears. (SO)", "answer": "The news was so bad that Helen burst into tears"}, {"id": 49, "type": "fill", "part": "D", "question": "They arrived at their destination alive and kicking. (SOUND)", "answer": "They arrived at their destination safe and sound"}, {"id": 50, "type": "fill", "part": "D", "question": "If nobody puts some more coal in, the fire will go out. (UNLESS) 50", "answer": "Unless someone puts more coal in, the fire will go out"}], "passages": {"passage1": "Today almost everyone walking down the street has at least one mobile phone in their pocket. That is because many mobile phones are upgraded every year around the (26) _______, and most people are interested (27) _______ changing their old mobile phone for a new one. There has been an estimated number of 90 million unwanted mobile phones in the UK alone! This mountain weighs around 12,000 tonnes, but only about 5% a of it is recycled. What makes us worried most is that mobile phones contain harmful chemicals (28) _______ are released into the environment when phones begin to degrade and, in addition, large amounts of carbon dioxide (29) _______ also produced during the manufacture of phones. It seems that the (30) _______ modern mobile phones become, the worse our environment gets.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Education is not an end, but a mean is to an end. In other words, we do not educate children only for the purpose of educating them. Our purpose is to fit them for life. In some modern countries it has, for some time, been fashionable to think that by free education for all - whether rich or poor, clever or stupid - one can solve all the problems of society and build a perfect nation. But we can already see that free education for all is not enough; we find in such countries a large number of people with university degree; they refuse to do what they think “low” work; and, in fact, work with hands is thought to be dirty and shameful in such countries. But we have only to think a moment to understand that the work of a completely uneducated farmer is far more important than that of a professor; we can live without education, but we die if we have no food. If no one cleaned our streets and took the rubbish away from our house, we should get terrible diseases in our own towns. In fact, when we say that all of us must be educated to fit us for life, it means that we must be educated in such a way that, firstly, each of us can do whatever work suited to our brains and ability and, secondly, that we can realize that all jobs are necessary to society, and that is very bad to be ashamed of one’s work. Only such a type of education can be considered valuable to society.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "In many Western countries, people celebrate Halloween on October 31. The word Halloween (36) _______ from “All Hallows’ Eve”. It is the night before All Saints’ Day, a religious holiday in some parts of the world. On this night, children dress up in special costumes, put (37) _______ masks, and go door to door saying “trick-or-treat” to get candy. Many people decorate their homes with paper ghosts, black cats or witches to give their houses a (38) _______ look. People also decorate their homes with jack-o-lanterns. They carve scary faces on pumpkins, and (39) _______ candles inside the pumpkins. In some places, both children and adults can make (40) _______ of haunted houses. They all seem very excited about the festival.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de24": {"title": "Đề 24 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "pu l ever catch on"}, {"id": 50, "type": "fill", "part": "D", "question": "In the area, Thailand is much better than all other countries in football. (SHOULDERS) 52", "answer": "In the area, Thailand is head and shoulders above all other countries in football"}], "passages": {"passage1": "Mother’s Day in Britain falls on the last Monday of March. On Mother’s day sons and daughters visit their mothers and bring them flowers and little presents. The eldest son must bring his mother a good cake. If sons or (26) _______ cannot be with their mother on that day, they usually send her presents. Mother’s day must be a day of rest (27) _______ the mother of the family, so her daughters cook the dinner on that day and lay the (28) _______ and the sons help to wash the plates and dishes after dinner. In the USA and Canada, Mother’s day is (29) _______ Second Sunday in May. They have a very beautiful stamp for Mother’s day in the USA. It shows the portrait of the mother of James Whistler, (30) _______ of the greatest American painters.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Every year students from many countries learn English. Some of these students are young children. Others are teenagers. Many are adults. Some learn at school, others study by themselves. A few learn English just by hearing the language in films, on television, in the office or among their friends. But not many are lucky enough to do that. Most people must work hard to learn another language. Why do all these people want to learn English? It is difficult to answer that question. Many boys and girls learn English at school because it is one of their subjects. They study their own language and mathematics... and English. In England or America, or Australia many boys and girls study their own language, which is English, and Mathematics,... and another language, perhaps French, or German, or Spanish. Many adults learn English because it is useful for their work. Teenagers often learn English for their higher studies because some of their books are in English at college or university. Other people learn English because they want to read newspapers or magazines in English.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Nancy Lee Johnson was a colouful girl. She was smart, pretty and fit in well with the life of her school. One Thursday afternoon, Miss O’Shay, the vice-principal, (36) _______ Nancy that the girl’s pictures had won the Artist Club (37) _______. Nancy was very happy at the news. She might have danced al the way home through the rain. But the (38) _______ didn’t let Nancy get the scholarship right because they found that she was a Negro student and they said that the (39) _______ of the coloured student in the local art school might (40) _______ difficulties for all concerned.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de25": {"title": "Đề 25 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "town", "B": "how", "C": "grow", "D": "cow"}, "answer": "C", "section": "sound", "options_html": {"A": "t<u>ow</u>n", "B": "h<u>ow</u>", "C": "gr<u>ow</u>", "D": "c<u>ow</u>"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "wants", "B": "says", "C": "looks", "D": "laughs"}, "answer": "B", "section": "sound", "options_html": {"A": "want<u>s</u>", "B": "<u>s</u>ays", "C": "look<u>s</u>", "D": "laugh<u>s</u>"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "machine", "B": "washing", "C": "brush", "D": "chin"}, "answer": "A", "section": "sound", "options_html": {"A": "mac<u>h</u>ine", "B": "was<u>h</u>ing", "C": "brus<u>h</u>", "D": "c<u>h</u>in"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "prepare", "B": "agree", "C": "await", "D": "borrow"}, "answer": "D", "section": "stress"}, {"id": 5, "type": "mc", "part e his old age, he can walk to the station"}, {"id": 48, "type": "fill", "part": "D", "question": "They have just produced a new kind of plants. (BEEN)", "answer": "A new kind of plants has just been produced"}, {"id": 49, "type": "fill", "part": "D", "question": "She doesn’t have time to revise the lesson. (WISHES)", "answer": "She wishes she had time to revise the lesson"}, {"id": 50, "type": "fill", "part": "D", "question": "This hotel is inaccessible in winter. (POSSIBLE) 54", "answer": "It is not possible to access this hotel in winter"}], "passages": {"passage1": "Malaysia is one of the countries of the Association of South East Asian Nations (ASEAN). It is divided (26) ________ two regions, known as West Malaysia and East Malaysia. The (27) ________ of Malaysia is Kuala Lumpur. The population in 2001 was over 22 million. Islam is the country’s official (28) ________. In addition there are other religions such (29) ________ Buddhism and Hinduism. The national language is Bahasa Malaysia. English, Chinese, and Tamil (30) ________ also widely spoken. Bahasa Malaysia is the primary language of instruction in all secondary schools, although some students may continue learning in Chinese or Tamil.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Alfred Bernhard Nobel, a Swedish inventor and philanthropist, bequeathed most of his vast fortune in trust as a fund from which annual prizes could be awarded to individuals and organizations that had achieved the greatest benefit to humanity in a particular year. Originally there were six classifications for outstanding contributions designated in Nobel’s will including chemistry, physics, physiology or medicine literature, and international peace. The prizes are administered by Nobel foundation in Stockholm. In 1969, a prize for economics endowed by the Central Bank of Sweden was added. Candidates for the prizes must be nominated in writing by a qualified authority in the field of competition. Recipients in physiology or medicine by the Caroline institute; in literature by the Swedish Academy; and in pace by the Norwegian Nobel committee appointed by Norway’s parliament. The prizes are usually presented in Stockholm on December 10, with the king of Sweden officiating, an appropriate tribute to Alfred Nobel on the anniversary of his death. Each one includes a gold medal, a diploma, and a cash award of about one million dollars.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng"}}, "de26": {"title": "Đề 26 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "goose", "B": "foot", "C": "booth", "D": "noodle"}, "answer": "B", "section": "sound", "options_html": {"A": "g<u>oo</u>se", "B": "f<u>oo</u>t", "C": "b<u>oo</u>th", "D": "n<u>oo</u>dle"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "booked", "B": "looked", "C": "naked", "D": "ticked"}, "answer": "C", "section": "sound", "options_html": {"A": "boo<u>ked</u>", "B": "loo<u>ked</u>", "C": "na<u>ked</u>", "D": "tic<u>ked</u>"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "cue", "B": "hue", "C": "queue", "D": "suede"}, "answer": "D", "section": "sound", "options_html": {"A": "c<u>ue</u>", "B": "h<u>ue</u>", "C": "q<u>ue</u>ue", "D": "s<u>ue</u>de"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "inspiration", "B": "collection", "C": "reputation", "D": "limitation"}, "answer": "B", "section": "stress"}, {"id": 5, "type": "mc", "part": "A", "question": "", "options": {"A": "objection", "B": "opinion", "C": "official", "D": "optional"}, "answer": "D", "section": "stress"}, {"id": 6, "type": "fill", "part": "B", "question": "Look at those black clouds. It (rain) __________.", "answer": "is going to rain"}, {"id": 7, "type": "fill", "part": "B", "question": "There's someone behind us. I think we (follow) __________.", "answer": "are being f ay and June following their 16th birthday. If you come to a UK independent school before (37) _______ the age of 16, you will study towards GCSE examinations in up to 12 subjects. Some subjects are compulsory, including English arid mathematics, and you can select (38) _______, such as music, drama, geography and history from a series of options. GCSEs provide a good all-round education that you can build on at college and eventually atuniversity. AS- and A-levels are taken after GCSEs. Theyare the UK qualifications most (39) _______ accepted for entry to university and are available in subjects from the humanities, arts, sciences andsocial sciences as well as in vocational subjects such (40) _______ engineering, and leisure and tourism. You can study up to four subjects at the same time for two years.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de27": {"title": "Đề 27 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "stored", "B": "ploughed", "C": "laughed", "D": "smiled"}, "answer": "C", "section": "sound", "options_html": {"A": "stor<u>ed</u>", "B": "plough<u>ed</u>", "C": "laugh<u>ed</u>", "D": "smil<u>ed</u>"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "name", "B": "natural", "C": "native", "D": "nation"}, "answer": "B", "section": "sound", "options_html": {"A": "<u>na</u>me", "B": "<u>na</u>tural", "C": "<u>na</u>tive", "D": "<u>na</u>tion"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "wants", "B": "says", "C": "looks", "D": "laughs"}, "answer": "B", "section": "sound", "options_html": {"A": "want<u>s</u>", "B": "<u>s</u>ays", "C": "look<u>s</u>", "D": "laugh<u>s</u>"}}, {"id": 4, "type": "mc", "part": "A", "question": "", "options": {"A": "remove", "B": "cancel", "C": "copy", "D": "answer"}, "answer": "A", "section": "stress"}, {"id": 5, "type": "mc", "part": "A", "question": "", "options": {" rd. He was so surprised. (TOO)", "answer": "The man was too surprised to say a word"}, {"id": 49, "type": "fill", "part": "D", "question": "We have run out of small sizes. (STOCK)", "answer": "We are out of stock of small sizes"}, {"id": 50, "type": "fill", "part": "D", "question": "The first sign of the disease is a feeling of faintness. (ONSET)", "answer": "The onset of the disease is a feeling of faintness"}], "passages": {"passage1": "been important solution spend produce providing Food plays an (26) _______ part in the development of nations. In countries where food is scarce, people have to (27) _______ most of their time getting enough to eat. This usually slows down progress, because men have little time to devote to science, industry, government, and art. In nations where food is plentiful and easy to get, men have more time to spend in activities that lead to progress, and enjoyment of leisure. The problem of (28) _______ good food for everybody has not yet (29) _______ solved. Many wars have been fought for food. But it is no longer necessary to go to war for food. Nations are beginning to put scientific knowledge to work for a (30) _______ of their food problems. They work together in the Food and Agriculture Organization of the United Nations (FAO) to help hungry nations produce more food.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Man discovered fire many thousands of years ago. The first time he saw fire was probable when a tree was struck by lighting. He soon learned how to make fire for himself. However man probably made his first fire by rubbing two sticks together. Fire was very important to man. He needed fire to keep himself warm at night. He used fire to cook his food. He used fire to frighten away enemies and wild animals. In some part of the world he used fire to signal messages. Red Indians, for example, used fire to make smoke signals. In some other countries people lit fires to warn their friends of danger. Fire was also used to give light. Before the invention of the oil lamp, men used burning sticks as torches. And before man discovered gas and electricity, he hung small fires in wire baskets from posts to light the streets. One man even used fire to tell the time. He invented a candle clock. He made a candle that took exactly twelve hours to burn. Then he marked this candle in twelve equal parts. He lit the candle and could tell the time by counting the number of parts left of the burning candle. But the candle clock did not always work well. If there was a wind blowing on the candle, the flame burned too quickly.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "English is the first language of many people in countries outside the United Kingdom. When you (36) _______ speakers of English from around the world, you immediately notice that they do not all speak in the same way. There are also some (37) _______ in the words they use, including the names of common objects that are part of everyone’s daily life. But although pronunciation and vocabulary are not the same everywhere, it is interesting that English speakers from opposite sides of the world can understand (38) _______ other quite easily. It does not seem to matter where they learnt the language. And of course this is one reason why speakers of other languages are keen (39) _______ learning English too. If you know English, you are more (40) _______ to be able to study or work in all sorts of exciting places, such as the United States or Australia.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de28": {"title": "Đề 28 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "blood", "B": "food", "C": "moon", "D": "pool"}, "answer": "A", "section": "sound", "options_html": {"A": "bl<u>oo</u>d", "B": "f<u>oo</u>d", "C": "m<u>oo</u>n", "D": "p<u>oo</u>l"}}, {"id": rforms an operation.", "options": {"A": "studies", "B": "researchers", "C": "is interested in", "D": "carries out"}, "answer": "D"}, {"id": 25, "type": "mc", "part": "B", "question": "Host: “I’m terribly sorry for this inconvenience.” - Guest: “__________.”", "options": {"A": "Fine,thanks.", "B": "It’s not your fault", "C": "I’ll do better next time", "D": "It’s mine. I came late."}, "answer": "B"}, {"id": 26, "type": "fill", "part": "C", "question": "(26) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 27, "type": "fill", "part": "C", "question": "(27) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 28, "type": "fill", "part": "C", "question": "(28) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 29, "type": "fill", "part": "C", "question": "(29) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 30, "type": "fill", "part": "C", "question": "(30) ______", "answer": "", "cloze_passage": "passage1"}, {"id": 31, "type": "mc", "part": "C", "question": "What is the writer’s main aim in writing the text?", "options": {"A": "to describe her own running career", "B": "to complain about race organizers", "C": "to talk about women runners", "D": "to describe good running method"}, "answer": "C", "reading_passage": "passage2"}, {"id": 32, "type": "mc", "part": "C", "question": "What would a reader find out from the text?", "options": {"A": "the best kind of places for running", "B": "how runners can avoid injuring themselves", "C": "the progress made by the women in the club", "D": "the teaching skills of the writer"}, "answer": "B", "reading_passage": "passage2"}, {"id": 33, "type": "mc", "part": "C", "question": "What is the writer’s opinion of the runners she trained?", "options": {"A": "They were too serious", "B": "They needed encouraging", "C": "They couldn’t develop their skills", "D": "They were difficult to train"}, "answer": "B", "reading_passage": "passage2"}, {"id": 34, "type": "mc", "part": "C", "question": "Why did the women join the running club?", "options": {"A": "to have a good time", "B": "to meet other people", "C": "to help them lose weight", "D": "to become top runners"}, "answer": "A", "reading_passage": "passage2"}, {"id": 35, "type": "mc", "part": "C", "question": "Which of the following would be the best title for the club poster?", "options": {"A": "Discover the Pleasures of Running", "B": "Riverside Running Club for Women", "C": "Athletics Competition: How to Win", "D": "Keep Fit by Training Hard"}, "answer": "A", "reading_passage": "passage2"}, {"id": 36, "type": "mc", "part": "C", "question": "(36) ______", "options": {"A": "noisy", "B": "quiet", "C": "busy", "D": "interesting"}, "answer": "B", "cloze_passage": "passage3"}, {"id": 37, "type": "mc", "part": "C", "question": "(37) ______", "options": {"A": "is", "B": "will", "C": "are", "D": "was"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 38, "type": "mc", "part": "C", "question": "(38) ______", "options": {"A": "green", "B": "blue", "C": "beauty", "D": "gray"}, "answer": "A", "cloze_passage": "passage3"}, {"id": 39, "type": "mc", "part": "C", "question": "(39) ______", "options": {"A": "make", "B": "plus", "C": "add", "D": "increase"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 40, "type": "mc", "part": "C", "question": "(40) ______", "options": {"A": "so", "B": "with", "C": "between", "D": "such"}, "answer": "D", "cloze_passage": "passage3"}, {"id": 41, "type": "fill", "part": "D", "question": "They believe he is a good president.🡪He ________________________________________________.", "answer": "is believed to be a good president"}, {"id": 42, "type": "fill", "part": "D", "question": "The furniture was so expensive that I couldn’t buy it.🡪The furniture was ___________________.", "answer": "too expensive for me to buy"}, {"id": 43, "type": "fill", "part": "D", "question": "A child can’t stay too far from home. 🡪It is ___________________________________________.", "answer": "not safe for a child to stay too far from home"}, {"id": 44, "type": "fill", "part": "D", "question": "She said, “I’m living in Hai Duong now”. 🡪She said _______________________________________.", "answer": "she was living in Hai Duong then"}, {"id": 45, "type": "fill", "part": "D", "question": "It has been raining for five hours. 🡪It started _____________________________________________. II. Viết lại các câu sau sao cho nghĩa không thay đổi so với câu ban đầu, sửdụng từcho sẵn trong ngoặc đơn (không được thay đổi dạng của từtrong ngoặc).", "answer": "raining five hours ago"}, {"id": 46, "type": "fill", "part": "D", "question": "I don’t play tennis as well as you do. (BETTER)", "answer": "You play tennis better than I do"}, {"id": 47, "type": "fill", "part": "D", "question": "She would rather play golf than tennis. (PREFERS)", "answer": "She prefers playing golf to playing tennis"}, {"id": 48, "type": "fill", "part": "D", "question": "Mai broke the cup because she was careless. (BECAUSE OF)", "answer": "Mai broke the cup because of her carelessness"}, {"id": 49, "type": "fill", "part": "D", "question": "Khanh said “You ought to take a break, Huy”. (ADVISED)", "answer": "Khanh advised Huy to take a break"}, {"id": 50, "type": "fill", "part": "D", "question": "His holiday is at exactly the same time as mine. (COINCIDES)", "answer": "His holiday coincides with mine"}], "passages": {"passage1": "In the United States of America the national (26) _______ is also English. Four hundred years ago some English people sailed to North America to live there, and (27) _______ brought the new language to this new country. Now in the United States of America people (28) _______ American English. Most of the words are the same in American and in British English , but American people say some English words not like people do in England .Canada is to the North of the United States of America. It is larger than the United States. In Canada many people speak English (29) _______ they also came from England many years ago. But in some parts of Canada, they speak (30) _______. People living in these parts came from France.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "When I injured my back I had to take a break from my running career. I decided to introduce more women to the sport, to show them how much fun it can be and to give them the confidence to get out and run. I decided to start a running club for women in my area because I was annoyed by the attitude of many race organizers. They complain about the lack of women in the sport but also use this as an excuse for not providing separate changing facilities. I put up posters and 40 women, young and old, fit and unfit, joined. All of them were attracted by the idea of losing weight but I don’t think they had really thought about running before. When or if they did, they had a picture of painful training. They didn’t think of chatting and smiling while running in beautiful places, like by a river. At first they ran for only a minute - now they can run for thirty minutes. They’ve also learned from other runners about diet and keeping fit in general. I want to do something for women’s running and I have had so much pleasure watching their progress – almost as much as they’ve had themselves.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "A village is a (36) _____ place where the influence of the city is not felt much. It is indeed a very good place for rest and relaxation. In a village people do not live very close to one another. Their houses are far apart. Each house therefore has a lot of space around it. So, almost every house (37) _____ surrounded by flowers and fruit plants and vegetables. All these make the village look (38) _____ and fresh. There are also tall trees everywhere which provide shade from the sun and keep the village cool. Some villages are surrounded by paddy fields or mountains. There are also many streams and rivers
