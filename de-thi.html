ized as larger ears. The African elephant grows up to 10 feet and weighs as much as 12,000 pounds. The Indian elephant grows up to 9 feet tall, and weighs up to 800 pounds. This elephant is characterized as smaller ears. Another name for the Indian elephant is the Asian elephant.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "There has been a revolution in the world of newspapers. Not many years (36) _______, newspapers were being produced using techniques unchanged for over hundred years. The journalists gave their stories to a typist, who prepared them for an editor, who passed them on (37) _______ the printer. The printer who was a (38) _______ skilled man, set up the type. (39) _______ was then collected to make the pages. When the pages were complete, the printing machines could be started. Nowadays what (40) _______? The journalists type their stories into a computer. The computer checks their spelling, plans the page, shapes the articles. When the pages are ready, another computer may control the printing. There can be no doubt about it, producing a newspaper in an entirely different management now.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de31": {"title": "Đề 31 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "sometimes", "B": "visit", "C": "worship", "D": "with"}, "answer": "D", "section": "sound", "options_html": {"A": "somet<u>i</u>mes", "B": "v<u>i</u>sit", "C": "worsh<u>i</u>p", "D": "w<u>i</u>th"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "washed", "B": "looked", "C": "stopped", "D": "played"}, "answer": "D", "section": "sound", "options_html": {"A": "wash<u>ed</u>", "B": "look<u>ed</u>", "C": "stopp<u>ed</u>", "D": "play<u>ed</u>"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "sugar", "B": "sale", "C": "soil", "D": "sun"}, "answer": "A", "section": "sound  people made tents from. He put rivets on the pockets to make them strong because the men put rocks in their pockets. These pants were very strong and lasted a long time. The pants became very popular immediately. Later Mr. Strauss started making Jeans from cotton cloth from Nimes, France. People called this cloth denim. Denim was popular in the fifteenth century. Christopher Columbus used denim for the sails of his ship. Sailors in Genoa, Italy, wore denim pants. The word “jeans” comes from the words “Genoa”. Mr. Strauss made the first jeans in the United States, but the idea and the kind of cloth came from Europe. The name came from France and Italy. Jeans were always blue until presently. People used indigo to dye them. Indigo is the oldest dye in the world. Most jeans have blue threads going across and white threads going up and down. These two colors make denim look different from other kinds of cloth.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Hoa’s grandma likes watching the weather (36) __________ on TV. The weather in Ha Noi is often mild. The (37) __________ in Ha Noi are often between 26°C and 30°C. However, they are much lower between December and February. Ho Chi Minh City often (38) __________ higher temperatures than those of Ha Noi and Hue. Thunderstorms, (39) __________ lightings and heavy rains, often take place along the south-central coast. The Cuu Long Delta experiences sunny weather almost all the year around. However, in this area, there are sometimes heavy rains and floods (40) __________ cause a lot of damage to the crops.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de32": {"title": "Đề 32 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "styles", "B": "jeans", "C": "students", "D": "labels"}, "answer": "C", "section": "sound", "options_html": {"A": "styl<u>e</u>s", "B": "j<u>e</u>ans", "C": "stud<u>e s and teachers - off South Korea (27) ________ 16 April. A total of 174 were rescued. The remainder have been confirmed dead or missing presumed drowned. Officials have retrieved almost 200 bodies and divers (28) ________ continuing to search (29) ________ those still unaccounted for. \"I don't know how to apologise for the failure to prevent this accident, and for the insufficient first response,\" Ms Park said (30) ________ the statement. \"I am sorry to the people and heavy-hearted that many precious lives were lost.\"", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "My name is Huy and fishing is my favorite sport. I often fish for hours without catching anything. But this doesn’t worry me. Some fishermen are unlucky. Instead of catching anything, not even old boots. After spending the whole morning on the river, I always go home with an empty bag. “You should give up fishing”, my friends say. “It’s a waste of time”. But they don’t know that I’m not really interested in fishing. I’m only interested in sitting in a boat and doing nothing at all!", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "A village is a (36) _______ place where the influence of the city is not felt much. It is indeed a very good place for rest and relaxation. In a village people do not live very close to one another. Their houses are far (37) _______. Each house therefore has a lot of (38) _______ around it. So, almost every house is surrounded by flowers and fruit plants and vegetables. All these make the village look (39) _______ and fresh. There are also tall trees everywhere which provide shade from the sun and keep the village cool. Some villages are surrounded by paddy fields or mountains. There are also many streams and rivers in many villages. All these add great beauty and variety to the village scene. The village people are friendly and helpful. They work together and live in peace . Living among (40) ______ o see him tomorrow"}], "passages": {"passage1": "Our classes take place for three hours every morning from Monday to Friday. The maximum class size is twelve (26) _______ the average is ten. We use modern methods of (27) _______ and learning, and the school has a language laboratory, a video camera and recorders. However, you will only be successful in improving your English if you work hard and practise speaking English as much as you can. You will take a short (28) _______ in English as soon as you arrive. In this way, we can put you in a class at the most suitable level. There are two classes at the Elementary level; one is for complete beginners and the other is for students who know only a little English. In both classes you will practice simple conversations. In the class (29) _______ the intermediate level you will have a lot of practice in communication in real-life situations because we help you to use the English you have previously studied in your own country. You will also have chances to improve your (30) _______ of English grammar and to build up your vocabulary.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "One of the most important discoveries of the nineteenth century was a method of using natural gas for cooking and heating. Large amounts of natural gas are found in the United States, usually several feet below the surface of the earth. Natural gas is most often found in places where petroleum, the oil from which gasoline is made, is found. Often the natural gas must be removed before the oil itself can be reached. For many years after natural gas was first discovered, it was thought to have no value. Finally, however, people began to understand its use and to find ways of storing it and moving it from place to place. Today natural gas is stored in large tanks and used for lighting, cooking and heating. It has also been used for electric generators and hybrid cars recently. In many ways natural  "part": "D", "question": "If you promise not to laugh, I’ll show you our holiday snaps. (LONG) 75", "answer": "As long as you promise not to laugh, I'll show you our holiday snaps"}], "passages": {"passage1": "who what love best but and You ask me (26) __________ I think about my dad. Great! Great! I must tell you my dad is the (27) __________ person in the world. Do you know what I mean? He is a considerate and generous man (28) __________ is loved not only by his family (29) __________ also by all his friends. His priority is always his family. His sense of humor distinguishes him from others. In a word, my dad’s terrific! I’m so proud of him and (30) __________ him so much. Happy Father’s Day. Daddy!", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Stars have been significant features in the design of many United States coins and their number has varied from one to forty-eight stars. Most of the coins issued from about 1799 to the early years of the twentieth century bore thirteen stars representing the thirteen original colonies. Curiously enough, the first American silver coins, issued in, 1794, had fifteen stars because by that time Vermont and Kentucky had joined the Union. At that time it was apparently the intention of mint officials to add a star for each new state. Following the admission of Tennessee in 1796, for example, some varieties of half dimes, dimes, and half-dollars were produced with sixteen stars. As more states were admitted to the Union, however, it quickly became apparent that this scheme would not prove practical and the coins from 1798 on were issued with only thirteen stars-one for each of the original colonies. Due to an error at the mint, one variety of the 1828 half cent was issued with only twelve stars. There is also a variety of the large cent with only 12 stars, but this is the result of a die break and is not a true error.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đú h a foggy night that we couldn't see the road"}, {"id": 48, "type": "fill", "part": "D", "question": "I'd like you to find this word in the dictionary. (LOOK)", "answer": "Would you look this word up in the dictionary for me"}, {"id": 49, "type": "fill", "part": "D", "question": "Are the children keen on sports activities? (PART)", "answer": "Do the children take part in sports activities"}, {"id": 50, "type": "fill", "part": "D", "question": "If only one could rely on what she says. (PITY) 77", "answer": "It is a pity that one can't rely on what she says"}], "passages": {"passage1": "occurs members for food celebrations clean There are many (26) __________ throughout the year in Vietnam but Tet or the Lunar New Year is the most important celebration (27) __________ Vietnamese people. Tet usually (28) __________ in late January or early February. A few days before Tet is the time for people to clean and decorate their homes. During Tet, people enjoy special (29) __________ such as sticky rice cakes. It is also the time for family (30) __________ to be together.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "When I injured my back I had to take a break from my running career. I decided to introduce more women to the sport, to show them how much fun it can be and to give them the confidence to get out and run. I decided to start a running club for women in my area because I was annoyed by the attitude of many race organizers. They complain about the lack of women in the sport but also use this as an excuse for not providing separate changing facilities. I put up posters and 40 women, young and old, fit and unfit, joined. All of them were attracted by the idea of losing weight but I don’t think they had really thought about running before. When or if they did, they had a picture of painful training. They didn’t think of chatting and smiling while running in beautiful places, like by a river. At first they ran for onl n and calcium, and vitamins. Fish, vegetables and milk contain most of the minerals we need. Vitamins are found in fresh vegetables and fruit.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Books are written to provide knowledge and good books enrich the ___(36)___. By putting ourselves under the influence of superior mind, we improve our mental powers. ___(37)___ good books we learn that people everywhere are the same, in all ages and in all classes. This knowledge improves our love of ___(38)___ and helps us to live in peace with them. We also understand that the world was made not only for man alone but for every creature that can feel hunger and thirst, warmth and cold. Though it may be possible for us to travel throughout the world and see things ___(39)___ today, it is not possible for us to see things that happened in the past. But good books helps us to see not only into the remote regions of the world today but also the world in ___(40)___ our ancestors lived.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de42": {"title": "Đề 42 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "attraction", "B": "surface", "C": "apple", "D": "transmit"}, "answer": "B", "section": "sound", "options_html": {"A": "<u>a</u>ttraction", "B": "surf<u>a</u>ce", "C": "<u>a</u>pple", "D": "tr<u>a</u>nsmit"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "weave", "B": "treat", "C": "deal", "D": "head"}, "answer": "D", "section": "sound", "options_html": {"A": "w<u>ea</u>ve", "B": "tr<u>ea</u>t", "C": "d<u>ea</u>l", "D": "h<u>ea</u>d"}}, {"id": 3, "type": "mc", "part": "A", "question": "", "options": {"A": "sculpture", "B": "lantern", "C": "pottery", "D": "transportation"}, "answer": "D", "section": "sound", "options_html": {"A": "sculp<u>t</u>ure", "B": "lan<u>t</u>ern", "C": "po<u>t</u>tery", "D": "<u>t</u>ransportation"}}, }, {"id": 34, "type": "mc", "part": "C", "question": "In order to meet market demands, artisans in Long Dinh __________.", "options": {"A": "produce new products from rare material", "B": "hire thousands of local labourers", "C": "try to produce various types of products", "D": "stop producing the traditional sedge mats"}, "answer": "C", "reading_passage": "passage2"}, {"id": 35, "type": "mc", "part": "C", "question": "We can infer from the passage that __________.", "options": {"A": "the new technique makes labourers work in the dry season", "B": "Long Dinh mat production is only well-known in foreign markets", "C": "the craft contributes much to the village economy", "D": "most of the households in Long Dinh village live on weaving mats"}, "answer": "C", "reading_passage": "passage2"}, {"id": 36, "type": "mc", "part": "C", "question": "(36) ______", "options": {"A": "move", "B": "place", "C": "set", "D": "back"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 37, "type": "mc", "part": "C", "question": "(37) ______", "options": {"A": "bought", "B": "owned", "C": "sold", "D": "proceeded"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 38, "type": "mc", "part": "C", "question": "(38) ______", "options": {"A": "with", "B": "in", "C": "to", "D": "by"}, "answer": "D", "cloze_passage": "passage3"}, {"id": 39, "type": "mc", "part": "C", "question": "(39) ______", "options": {"A": "convenience", "B": "importance", "C": "comfort", "D": "condition"}, "answer": "B", "cloze_passage": "passage3"}, {"id": 40, "type": "mc", "part": "C", "question": "(40) ______", "options": {"A": "that", "B": "which", "C": "where", "D": "this"}, "answer": "C", "cloze_passage": "passage3"}, {"id": 41, "type": "fill", "part": "D", "question": "They built this bridge twenty years ago. 🡪This bridge _____________________________", "answer": "was built twenty years ago"}, {"id": 42, "type": "fill", "part": "D", "question": "It took me three hours to clean the house yesterday. 🡪I spent ______________________", "answer": "three hours cleaning the house yesterday"}, {"id": 43, "type": "fill", "part": "D", "question": "You should use less paper to protect the environment. 🡪If I __________________", "answer": "were you, I would use less paper to protect the environment"}, {"id": 45, "type": "fill", "part": "D", "question": "The spectators got so angry that they had to cancel the football match. 🡪Such _________ II. Viết lại các câu sau sao cho nghĩa không thay đổi so với câu ban đầu", "answer": "was the anger of the spectators that they had to cancel the football match"}, {"id": 46, "type": "fill", "part": "D", "question": "Labourers in the Mekong Delta can earn enough money from their crafts during the flood seasons. (LIVE)", "answer": "Labourers in the Mekong Delta can live on their crafts during the flood seasons"}, {"id": 47, "type": "fill", "part": "D", "question": "The methods of producing handcrafted paper flowers in Thanh Tien village in Hue were transferred from generation to generation to keep the craft alive. (PASSED)", "answer": "The methods were passed down from generation to generation to keep the craft alive"}, {"id": 48, "type": "fill", "part": "D", "question": "The tour guide gave a short speech so that foreign visitors could get information about the process of making fish sauce in Phu Quoc. (FIND) 89", "answer": "The tour guide gave a short speech so that foreign visitors could find out about the process of making fish sauce"}, {"id": 49, "type": "fill", "part": "D", "question": "Craft village development is now a good way to solve the poverty in rural areas. (DEAL)", "answer": "Craft village development is now a good way to deal with the poverty in rural areas"}, {"id": 50, "type": "fill", "part": "D", "question": "We are thinking with pleasure about the trip in order to discover the traditional craft villages round Hue. (FORWARD)", "answer": "We are looking forward to the trip in order to discover the traditional craft villages round Hue"}], "passages": {"passage1": "livable cleanest cultures busiest skyscrapers perfect neighbourhoods Singapore is the most (26) __________ city in Southeast Asia, but it is a rather expensive place to live. Public transportation goes to everywhere, and getting a permit to drive a car costs you a lot of money. Therefore, it is one of the (27) __________ cities in the world, too. Besides the (28) __________ in Clark Quay, Singapore is a melting pot of Western, Indian, Chinese, and Malay (29) __________. The diverse culture of Singapore makes it a (30) __________ place for fine shopping and dining. You can lie on Singapore's own beaches on Sentosa Island or go to great beaches in Indonesia not far away.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "SEDGE MAT CRAFT VILLAGE IN TIEN GIANG PROVINCE In the Mekong Delta., Long Dinh village of Tien Giang province is famous for its traditional craft of weaving flowered mats. The mat's high quality makes them popular domestically, and they are also exported to markets worldwide including Korea, Japan and America. In spite of its well-established reputation for this traditional craft, mat weaving only started here some 50 years ago. It was first introduced by immigrants from Kim Son, a famous mat weaving village in the northern province of Ninh Binh. However, the technique of weaving sedge mats in Long Dinh, as compared with other places in the South, is somewhat different. Long Dinh branded mats are thicker and have more attractive colours and patterns. Weaving sedge mats is similar to growing rice. Long Dinh mat production mainly occurs during the dry season, from January to April. Weavers have to work their hardest in May and June, otherwise, when the rainy season starts in July, they will have to put off finishing their products till the next dry season. No matter how much work it requires, Long Dinh mat producers stick with this occupation, as it brings a higher income than growing rice. This trade provides employment for thousands of local labourers. At present, nearly 1,000 households in Long Dinh village live on weaving mats. To better meet market demands, Long Dinh mat weavers have created more products in addition to the traditional sedge mats. Particularly, they are producing a new type of mat made from the dried stalks of water hyacinth, a common material in the Mekong Delta. Thanks to the planning and further investment, the mat weaving occupation has indeed brought in more income for local residents. Their living standards have improved considerably, resulting in better conditions for the whole village.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "As I remember, (36) __________ in the 50s and 60s, Ha Noi was not as crowded as it is today. Bicycles and cyclos were the main means of transport and the few motorbikes that were around were (37) __________ by rich people. It was rare to see cars or jeeps. Meanwhile, the tram was the only method of public transport. An old tram station is now home (38) __________ several retail outlets that look out over the lake in Dinh Tien Hoang Street. At that time, Hanoians always travelled by tram, not only for its (39) __________ but also the price. For just five cents you could travel one-way to it’s terminus in the former Ha Dong Province, (40) __________ is now part of the expanded Ha Noi.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de43": {"title": "Đề 43 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "stamps", "B": "clubs", "C": "weeks", "D": "cats"}, "answer": "B", "section": "sound", "options_html": {"A": "<u>s</u>tamps", "B": "club<u>s</u>", "C": "week<u>s</u>", "D": "cat<u>s</u>"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "provide", "B": "despite", "C": "children", "D": "surprise"}, "answer": "C", "section": "so erior walls, the interior was completely destroyed. It was not until December of 1817 that the following president, James Monroe, was able to move into a rebuilt residence. Since then, the White House has continued to be modified but has been continuously occupied by each succeeding U.S president.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "THE THREAT TO THE ENVIRONMENT Nowadays people are more aware that wildlife all over the world is in danger. Many species of animals are threatened and could (36)______ become extinct if we do not make an effort to (37)______ them. There are many reasons for this. In some cases, animals are hunted for their fur or for other valuable parts of their bodies. Some birds, (38)_____ as parrots, are caught alive and sold as pets. For many animals and birds, the problem is that their habitat - the place where they live - is disappearing. More (39)_______ is used for farms, for houses or industry, and there are fewer open spaces than there once were. Farmers use powerful chemicals to help them grow better crops, but these chemicals pollute the environment and (40)_____ wildlife. The most successful animals on earth - human beings - will soon be the only ones left, unless we can solve this problem.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de44": {"title": "Đề 44 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "passed", "B": "wished", "C": "touched", "D": "moved"}, "answer": "D", "section": "sound", "options_html": {"A": "pass<u>ed</u>", "B": "wish<u>ed</u>", "C": "touch<u>ed</u>", "D": "mov<u>ed</u>"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "blood", "B": "pool", "C": "food", "D": "tool"}, "answer": "A", "section": "sound", "options_html": {"A": "bl<u>oo</u>d", "B": "p<u>oo</u>l", "C": "f<u>oo</u>d", "D": "t<u>oo</u>l"}}, {"id": 3, "type": "mc", "part": "A", "questio llages in Viet Nam, but Quat Dong village in Ha Noi is widely known for its products of high (26) __________. Embroidery has been developing around here since the 17th century. In the past, local skilled artisans were chosen to make sophisticated embroidered (27) __________ for the Vietnamese King, Queen and other Royal family members. The first man who taught the local people how to embroider was Dr. Le Cong Hanh, who lived during the Le dynasty. He learned how to embroider while on a trip to China as an envoy, and taught the villagers of Quat Dong upon his (28) __________. Although these (29) __________ eventually spread across the country, the Quat Dong’s artisans' creations are still the most appreciated. In order to create beautiful embroideries, an artisan must be patient, careful and have an eye for (30) __________, along with clever hands. Nowadays, Quat Dong products may range from clothes, bags, pillowcases, to paintings and decorations, which are exported to many countries.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Martin Luther King, Jf., is well- known for his work in civil rights and for his many famous speeches, among which is his moving “I have a dream” speech. But fewer people know much about King’s childhood. M.L, as he was called, was born in 1929 in Atlanta, Georgia, at the home of his maternal grandfather. M.L.’s grandfather purchased their home on Auburn Avenue in 1909, twenty years before M.L was born. His grandfather allowed the house to be used as a meeting place for a number of organizations dedicated to the education and social advancement of blacks. M.L. grew up in the atmosphere, with his home being used as a community gathering place, and was no doubt influenced by it. M.L.’s childhood was not especially eventfully. His father was a minister and his mother was a musician. He was the second of three children, and he attended all black schools in a black neighborhood. The neighborhood was not poor, however. Auburn Avenue was an area of banks, insurance companies, builders, jewelers, tailors, doctors, lawyers, and other businesses and services. Even in the face of Atlanta’s segregation, the district thrived. Dr. King never forgot the community spirit he had known as a child, nor did he forget the racial prejudice that was a huge barrier keeping black Atlantans from mingling with whites.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Having a relationship with someone is important to people around the world; (36) _______, dating is different from culture to culture. Here are some examples. Group dating is popular among young people in Europe and Australia. Groups as large as 30 people take part in events, such as going camping or having a party. This is seen as a (37) _______ way to spend time together, and to help to (38) _______ tension because people feel more comfortable in the company of friends before deciding whether to go on a one-to-one date. In Singapore, since many young people stay single, the government has tried its best to encourage dating. Dating services are offered to single people. One of them is speed dating, in (39) _______ singles will spend a few minutes talking to one person before moving on to meet the next one. Online dating is a common way of (40) _______ in the United States. Internet companies are now offering a service called ‘online dating assistant’ to help busy people to find a partner. An assistant helps customers to build their profiles, selects potential matches, and then sends several emails to the possible matches until the two people agree to meet face to face.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de45": {"title": "Đề 45 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "layer", "B": "frame", "C": "artisan", "D": "place"}, "answer": "C", "section": "sound", "optio question": "The last Olympic Games were held in Seoul. (TOOK)", "answer": "The last Olympic Games took place in Seoul"}, {"id": 49, "type": "fill", "part": "D", "question": "In the future, some traditional handicraft cooperatives will have no more wood to make wooden furniture. (RUN)", "answer": "In the future, some traditional handicraft cooperatives will run out of wood to make wooden furniture"}, {"id": 50, "type": "fill", "part": "D", "question": "After the trip, you return to the harbor to take a boat trip to Hoi An. (COME) 95", "answer": "After the trip, you come back to the harbor to take a boat trip to Hoi An"}], "passages": {"passage1": "Many COVID-19 cases in Vietnam have reported positive tests after they were deemed to have (26) _______ from the disease. This also happened in other countries such as United States, South Korea and China. Dr. Oh Myoung-don, head of South Korea Central Clinical Committee for Emerging Disease Control rejected the possibility of \"reinfection\", assuming that the patients who tested positive for SARS-CoV-2 virus, most likely due to \"the testing kit collected RNA from the dead virus fragments, these may remain in the body for months\". Vietnam Deputy Minister of Health Nguyen Thanh Long also agreed (27) _______ the above opinion, saying that maybe the patient has not fully recovered during the treatment process so the virus has not been (28) _______ eliminated and still exists in the body, especially in lung mucous cells. In April 2021, the Ministry of Health decided to shorten isolation time at home to 7 days (29) _______ it did not record community infections from relapse cases. Previously, Vietnam forced concentrated quarantine from immigrants for 14 days in the isolation camp and 14 (30) _______ at home.", "passage1_header": "I. Chọn từ thích hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "with completely although days because recovered Recently, we made a trip to visit Dong Ho village with a desire to meet the old artisan – Nguyen Huu Sam. Just when we arrived villagers at the dyke in the village and talked with the villagers about the artisan, they immediately told us about him. The old house owned by the artisan is situated in a long alley of the village. On the walls of the house there are many folk paintings in different genres, from daily life paintings to landscape paintings shown in a set of “four seasons”. Mr. Sam told us about his past. When he was three years old, he was instructed in the craft of making Dong Ho paintings by his father. At five, he could help his father apply the Dong Ho paintings, and learn how to print the paper with proper colours. At seven, he was able to draw with a pen and make the most difficult samples. Years went by and the soul of Dong Ho folk paintings has kept seashell powder paint to the poonah-paper. In the 1940s, this craft flourished. At that time, he was assigned by his parents to take the paintings to the market for sale. Mr. Sam said that 17 families in the village have been engaged in making Dong Ho paintings. Artisan Sam has always been devoted to the making of Dong Ho paintings and has waited for opportunities to restore this traditional craft. In 1967, when the local authorities assigned him to restore the traditional genre of Dong Ho folk paintings, he gathered 50 villagers with professional skills and collected hundreds of woodblocks to establish the Dong Ho Painting Cooperative. Thanks to his efforts, such famous painting as \"Rat's wedding\", “Rooster”, “Scene of jealousy” and “Writing verses about precious flowers\" have been revived. Dong Ho paintings have been available in many parts of the world such as Japan, France, Germany, Singapore and the United States.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "Bau Truc pottery village of Cham ethnic minority is one of the oldest pottery villages in Southeast Asia. It is located about 10 kilometres in the South of Phan Rang town. The small village is home to more than 400 families, (36) _______ 85% are in the traditional pottery business. The style is said to be handed down from Po Klong Chan, one of their ancestors from the immemorial time. People in Bau Truc use their skillful hands, bamboo-made circles and shells to create priceless works. It is (37) _______ that while the Kinh people have switched to using wheel as an indispensable tool, their Cham counterparts, on the contrary, still (38) _______ talent hands and simple tools. To create a pottery product, a Cham craftsman only needs an anvil, not a potter's wheel, and other simple equipment and moulds and then uses hands to shape pieces of clay into the works he wants. The clay is taken from the banks of the Quao River and is very flexible, durable when (39) _______. The skills needed to mix sand with the clay are also various. The amount of sand mixed with the plastic material is dependent on what the pottery used for and the sizes. For these reasons, Bau Truc pottery is quite different from pottery elsewhere. For example, water jars made in Bau Truc are always favoured by people in dry and sunny areas (40) _______ the temperature of the water in the jars is always one centigrade cooler than that outside.", "passage3_header": "III. Chọn đáp án điền vào chỗ trống để hoàn thành đoạn văn"}}, "de46": {"title": "Đề 46 — Sở GD&ĐT Thanh Hóa", "time": 60, "questions": [{"id": 1, "type": "mc", "part": "A", "question": "", "options": {"A": "computer", "B": "uniform", "C": "contribute", "D": "monument"}, "answer": "D", "section": "sound", "options_html": {"A": "c<u>o</u>mputer", "B": "unif<u>o</u>rm", "C": "c<u>o</u>ntribute", "D": "m<u>o</u>nument"}}, {"id": 2, "type": "mc", "part": "A", "question": "", "options": {"A": "constructs", "B": "equips", "C": "travels", "D": "develops"}, "answer": "C", "section": "sound", "options_html": {"A": "con<u>s</u>tructs", "B": "equip<u>s</u>", "C": "travel<u>s</u>", "D": "develop<u>s</u>"}}, {"id": 3, "type": "mc", "par xtbooks. Others send students to the library for assignments. The atmosphere in some classrooms is very formal. Students call their instructors “Professor Smith”, “Mrs. Jones”, and so on. Some teachers wear business clothes and give lectures. Other classrooms have an informal atmosphere. Students and teachers discuss their ideas. Instructors dress informally, and students call them by their first names. American teachers are not alike in their teaching styles. At most American colleges and universities, facilities for learning and recreation are available to students. Students can often use recorders, video machines, and computers at libraries and learning centres. They can buy books, notebooks, and other things at campus stores. They can get advice on their problems from counsellors and individual help with their classes from tutors. Students can relax and have fun on campus, too. Some schools have swimming pools and tennis courts. Most have snack bars or cafeterias. (Source. Adapted from http://www.ukedu.org)", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "BTS, also known as the Bangtan Boys, is a (36) _______ South Korean boy band that began formation in 2010 and debuted in 2013 under Big Hit Entertainment. The septet—composed of Jin, Suga, J-Hope, RM, Jimin, V, and Jungkook — co-writes and co-produces much of their own output. Originally a hip hop group, their musical style has evolved to include a wide range (37) _______ genres. Their lyrics, often focused on personal and social commentary, touch on the themes of mental health, troubles of school-age youth, loss, the journey towards loving oneself, and individualism. Their work features references to literature and psychological concepts and includes an alternative universe storyline. The group (38) _______ released several albums and performed on several world tours. Following the establishment of their Love Myself anti-violence (39) _______ in partnership with UNICEF, BTS addressed t hợp điền vào chỗ trống để hoàn thành đoạn văn", "passage2": "Unlike life in the countryside which is often considered to be simple and traditional, life in the city is modern and complicated. People, from different regions, move to the cities in the hope of having a better life for them and their children. The inhabitants in city work as secretaries, businessmen, teachers, government workers, factory workers and even street vendors or construction workers. The high cost of living requires city dwellers, especially someone with low income, to work harder or to take a part-time job. For many people, an ordinary day starts as usual by getting up in the early morning to do exercise in public parks, preparing for a full day of working and studying, then travelling along crowed boulevards or narrow streets filled with motor scooters and returning home after a busy day. They usually live in large houses, or high-rise apartment blocks or even in a small rental room equipped with modern facilities, like the Internet, telephone, television, and so on. Industrialization and modernization as well as global integration have big impact on lifestyle in the cities. The most noticeable impact is the Western style of clothes. The \"ao dai” - Vietnamese traditional clothes big are no longer regularly worn in Vietnamese women's daily life. Instead, jeans, T-shirts and fashionable clothes are widely preferred.", "passage2_header": "II. Đọc đoạn văn và chọn đáp án đúng", "passage3": "There are 21,900 households in an area of less than 100 hectares of the Old Quarter in Ha Noi. In many houses, an entire family may (36) __________ no more than a single room. A house on Hang Ca Street, built in the 1940s, originally belonged to one wealthy man and his wives, and now there are six households there with about 30 people. Many say the convenience of the Old Quarter (37) __________ compensates for the shortage of facilities. Tradition is also a factor because some residents have bigger houses el let currentExam = null;
let userAnswers = {};
let submitted = false;
let timer = null;

function renderList() {
  currentExam = null;
  submitted = false;
  if (timer) timer.stop();
  document.getElementById('bcTitle').textContent = '50 Đề thi';
  
  let html = '<div class="exam-grid">';
  for (let i = 1; i <= 50; i++) {
    const key = 'de' + i;
    const result = SM.getResult('exam', key);
    const cls = result ? 'done' : '';
    html += '<div class="exam-btn ' + cls + '" onclick="loadExam(\'' + key + '\')">' +
      '<div style="font-weight:700">Đề ' + i + '</div>' +
      (result ? '<div style="font-size:11px;color:var(--success)">' + result.score + '/' + result.total + '</div>' : '') +
      '</div>';
  }
  html += '</div>';
  
  // Stats
  const count = SM.getCount('exam');
  const avg = SM.getAvgScore('exam');
  html += '<div class="card" style="margin-top:20px;text-align:center">' +
    '<p>Đã làm: <strong>' + count + '/50</strong> đề | ' +
    'Điểm TB: <strong>' + (count > 0 ? avg.toFixed(1) + '%' : '-') + '</strong></p></div>';
  
  document.getElementById('mainContent').innerHTML = html;
  
  // Check URL param
  const params = new URLSearchParams(window.location.search);
  const de = params.get('de');
  if (de && DATA['de' + de]) loadExam('de' + de);
}

function loadExam(key) {
  currentExam = key;
  userAnswers = {};
  submitted = false;
  const exam = DATA[key];
  const num = key.replace('de','');
  document.getElementById('bcTitle').innerHTML = '<a href="#" onclick="renderList();return false">50 Đề thi</a> › Đề ' + num;
  
  let html = '<div class="timer-bar">' +
    '<div><strong>' + exam.title + '</strong></div>' +
    '<div class="timer" id="timerDisplay">⏱ 60:00</div>' +
    '<button class="btn btn-danger" id="submitBtn" onclick="submitExam()">📩 NỘP BÀI</button>' +
    '</div>';
  
  // Question nav
  html += '<div class="question-nav" id="qNav">';
  exam.questions.forEach((q, i) => {
    html += '<button class="q-nav-btn" id="qnav' + i + '" onclick="scrollTo(\'q' + i + '\')">' + (i+1) + '</button>';
  });
  html += '</div>';
  
  // Questions grouped by part
  let currentPart = '';
  let currentSection = '';
  let shownPassages = {};
  const passages = exam.passages || {};
  
  exam.questions.forEach((q, i) => {
    if (q.part && q.part !== currentPart) {
      currentPart = q.part;
      currentSection = '';
      html += '<div class="part-header">PHẦN ' + currentPart + '</div>';
    }
    
    // Section dividers for Part A (sound/stress)
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      if (currentSection === 'sound') html += '<div class="section-header">I. Chọn từ có phần gạch chân phát âm khác</div>';
      else if (currentSection === 'stress') html += '<div class="section-header">II. Chọn từ có trọng âm khác</div>';
    }
    
    // Show passage before its question group
    const pKey = q.cloze_passage || q.reading_passage || '';
    if (pKey && passages[pKey] && !shownPassages[pKey]) {
      shownPassages[pKey] = true;
      const hKey = pKey + '_header';
      if (passages[hKey]) html += '<div class="section-header">' + passages[hKey] + '</div>';
      // Highlight blanks like (26) ______ in passage
      let pText = passages[pKey].replace(/\((\d+)\)\s*_+/g, '<strong>($1) ______</strong>');
      html += '<div class="passage-box">' + pText + '</div>';
    }
    
    html += '<div class="question-box" id="q' + i + '">';
    
    // Hide redundant question text for phonetics (section) and cloze (q text = options list)
    const isCloze = q.type === 'mc' && q.question && q.options && q.question.trim().startsWith('A.');
    const hasQuestionText = q.question && q.question.trim() && !q.section && !isCloze;
    
    if (q.type === 'mc' && q.options) {
      html += '<strong>Câu ' + q.id + '.</strong> ' + (hasQuestionText ? q.question : '') + '<div style="margin-top:8px">';
      ['A','B','C','D'].forEach(letter => {
        const useHtml = q.options_html && q.options_html[letter];
        const optText = useHtml ? q.options_html[letter] : (q.options && q.options[letter] || '');
        if (optText) {
          html += '<label class="quiz-option" id="opt' + i + letter + '" onclick="selectAns(' + i + ',\'' + letter + '\')">' +
            letter + '. ' + optText + '</label>';
        }
      });
      html += '</div>';
    } else {
      const qText = q.question || '';
      // Use textarea for long-answer (Part D rewrite) questions
      const isLongAnswer = qText.includes('🡪') || qText.includes('→') || (q.part === 'D' && qText.length > 50);
      html += '<strong>Câu ' + q.id + '.</strong> <span class="fill-question">' + qText + '</span>';
      if (isLongAnswer) {
        html += '<div style="margin-top:8px"><textarea class="fill-input" id="fill' + i + '" rows="2" placeholder="Viết lại câu..." oninput="fillAns(' + i + ')"></textarea></div>';
      } else {
        html += '<div style="margin-top:8px"><input type="text" class="fill-input" id="fill' + i + '" placeholder="Nhập câu trả lời..." oninput="fillAns(' + i + ')"></div>';
      }
    }
    html += '</div>';
  });
  
  html += '<div style="text-align:center;margin:24px 0">' +
    '<button class="btn btn-primary" onclick="submitExam()" style="padding:14px 48px;font-size:16px">📩 NỘP BÀI</button></div>' +
    '<div id="resultArea"></div>';
  
  document.getElementById('mainContent').innerHTML = html;
  
  // Start timer
  timer = new Timer(document.getElementById('timerDisplay'), () => { showToast('⏰ Hết giờ!', 'error'); submitExam(); });
  timer.start(60);
}

function selectAns(qi, letter) {
  if (submitted) return;
  userAnswers[qi] = letter;
  ['A','B','C','D'].forEach(l => {
    const el = document.getElementById('opt' + qi + l);
    if (el) el.classList.toggle('selected', l === letter);
  });
  document.getElementById('qnav' + qi)?.classList.add('answered');
}

function fillAns(qi) {
  if (submitted) return;
  const el = document.getElementById('fill' + qi);
  if (el) {
    userAnswers[qi] = el.value.trim();
    document.getElementById('qnav' + qi)?.classList.add('answered');
  }
}

function submitExam() {
  if (submitted) return;
  const exam = DATA[currentExam];
  const total = exam.questions.length;
  const answered = Object.keys(userAnswers).length;
  if (answered < total && !confirm('Bạn còn ' + (total - answered) + ' câu chưa trả lời. Nộp bài?')) return;
  
  submitted = true;
  if (timer) timer.stop();
  const elapsed = timer ? timer.getElapsed(60) : '';
  
  let score = 0;
  exam.questions.forEach((q, i) => {
    const box = document.getElementById('q' + i);
    const userAns = userAnswers[i];
    const hasAnswer = q.answer && q.answer.trim();
    
    if (q.type === 'mc') {
      if (hasAnswer) {
        if (userAns === q.answer) {
          score++;
          box?.classList.add('correct');
          // Highlight correct option
          const correctEl = document.getElementById('opt' + i + q.answer);
          if (correctEl) correctEl.classList.add('correct');
        } else {
          box?.classList.add(userAns ? 'wrong' : 'skipped');
          // Always highlight correct answer
          const correctEl = document.getElementById('opt' + i + q.answer);
          if (correctEl) correctEl.classList.add('correct');
          // Highlight wrong answer if user picked one
          if (userAns) {
            const wrongEl = document.getElementById('opt' + i + userAns);
            if (wrongEl) wrongEl.classList.add('wrong');
          }
        }
      }
    } else {
      // Fill-in question
      const el = document.getElementById('fill' + i);
      if (el) el.disabled = true;
      if (hasAnswer) {
        const userText = (userAns || '').toLowerCase().trim();
        const correctText = q.answer.toLowerCase().trim();
        if (userText && userText === correctText) {
          score++;
          box?.classList.add('correct');
          if (el) el.insertAdjacentHTML('afterend', '<div class="answer-reveal correct-ans">✅ Chính xác!</div>');
        } else {
          box?.classList.add(userAns ? 'wrong' : 'skipped');
          const label = userAns ? '❌ Đáp án đúng' : '⚠️ Bỏ trống — Đáp án';
          if (el) el.insertAdjacentHTML('afterend', '<div class="answer-reveal ' + (userAns ? 'wrong-ans' : 'skipped-ans') + '">' + label + ': <strong>' + q.answer + '</strong></div>');
        }
      }
    }
  });
  
  SM.saveResult('exam', currentExam, score, total, userAnswers);
  
  const pct = Math.round(score/total*100);
  const cls = pct >= 60 ? 'good' : 'bad';
  document.getElementById('resultArea').innerHTML =
    '<div class="result-box ' + cls + '">' +
    '<div style="font-size:48px">' + (pct >= 60 ? '🎉' : '💪') + '</div>' +
    '<div style="font-size:32px;font-weight:800;margin:8px 0">' + score + '/' + total + '</div>' +
    '<div style="font-size:16px">(' + pct + '% đúng)</div>' +
    (elapsed ? '<div style="font-size:14px;color:var(--text-light);margin-top:4px">⏱ Thời gian: ' + elapsed + '</div>' : '') +
    '<div style="margin-top:16px">' +
    '<button class="btn btn-primary" onclick="loadExam(\'' + currentExam + '\')">🔄 Làm lại</button> ' +
    '<button class="btn btn-outline" onclick="renderList()">📋 Danh sách</button></div></div>';
  
  document.getElementById('submitBtn').style.display = 'none';
  scrollTo('resultArea');
}

renderList();
</script>
</body>
</html>
